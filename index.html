    // ─────────────────────────────────────────────────────────────────────────
    // Exercise frequency engine
    // ─────────────────────────────────────────────────────────────────────────

    function buildExerciseFrequency(workoutsData) {
      const freq = {};
      if (!workoutsData) return freq;
      Object.values(workoutsData).forEach(workout => {
        if (!workout.exercises) return;
        Object.values(workout.exercises).forEach(ex => {
          if (!ex.name) return;
          freq[ex.name] = (freq[ex.name] || 0) + 1;
        });
      });
      return freq;
    }

    function getSuggestions(split, frequency) {
      if (split.id === 'free') return [];

      // All exercises whose muscles overlap with the split's muscles
      const relevant = Object.entries(EXERCISE_MUSCLE_MAP)
        .filter(([, muscles]) => muscles.some(m => split.muscles.includes(m)))
        .map(([name]) => name);

      // Sort by frequency descending, then alphabetically
      const byFreq = [...relevant].sort((a, b) => {
        const fa = frequency[a] || 0, fb = frequency[b] || 0;
        if (fb !== fa) return fb - fa;
        return a.localeCompare(b);
      });

      // Merge: frequency-sorted first, then defaults not already included
      const seen = new Set(byFreq);
      const merged = [...byFreq];
      split.defaults.forEach(d => { if (!seen.has(d)) merged.push(d); });

      return merged.map(name => ({ name, selected: split.defaults.includes(name) }));
    }

    // ─────────────────────────────────────────────────────────────────────────

    function useFirebase(path) {
      const [data, setData]       = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        if (!path) { setLoading(false); return; }
        const ref = db.ref(path);
        ref.on('value', snap => { setData(snap.val()); setLoading(false); });
        return () => ref.off('value');
      }, [path]);
      return [data, loading];
    }

    const fbSet    = (path, value)   => db.ref(path).set(value);
    const fbUpdate = (path, updates) => db.ref(path).update(updates);
    const fbPush   = (path, value)   => db.ref(path).push(value);
    const fbRemove = (path)          => db.ref(path).remove();

    const localGet = (key) => { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } };
    const localSet = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} };

    async function seedExerciseNames() {
      const snap = await db.ref('drea/exerciseNames').once('value');
      if (snap.val()) return;
      const updates = {};
      ALL_EXERCISE_NAMES.forEach(name => {
        updates[db.ref('drea/exerciseNames').push().key] = name;
      });
      await db.ref('drea/exerciseNames').set(updates);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // ExerciseInput — reusable autocomplete
    // ─────────────────────────────────────────────────────────────────────────

    function ExerciseInput({ value, onChange, onSelect, exerciseNames = [], placeholder = 'Exercise name...' }) {
      const [open, setOpen]   = useState(false);
      const [query, setQuery] = useState(value || '');
      const closeTimer        = useRef(null);

      useEffect(() => { setQuery(value || ''); }, [value]);

      const suggestions = useMemo(() => {
        const q = query.trim().toLowerCase();
        const pool = exerciseNames.length ? exerciseNames : ALL_EXERCISE_NAMES;
        if (!q) return pool.slice(0, 10);
        return pool.filter(n => n.toLowerCase().includes(q)).slice(0, 10);
      }, [query, exerciseNames]);

      const handleChange = (e) => {
        const val = e.target.value;
        setQuery(val);
        onChange && onChange(val);
        setOpen(true);
      };

      const handleSelect = (name) => {
        setQuery(name);
        onChange && onChange(name);
        onSelect && onSelect(name);
        setOpen(false);
      };

      return (
        <div style={{ position: 'relative', width: '100%' }}>
          <input
            type="text"
            value={query}
            onChange={handleChange}
            onFocus={() => { clearTimeout(closeTimer.current); setOpen(true); }}
            onBlur={() => { closeTimer.current = setTimeout(() => setOpen(false), 150); }}
            placeholder={placeholder}
            autoComplete="off" autoCorrect="off" autoCapitalize="words" spellCheck="false"
            style={{
              width: '100%', background: '#222', border: '1px solid #2e2e2e',
              borderRadius: 10, padding: '10px 14px', color: '#F0EDE8',
              fontSize: 15, fontWeight: 500, outline: 'none',
            }}
          />
          {open && suggestions.length > 0 && (
            <div style={{
              position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0,
              background: '#1e1e1e', border: '1px solid #2e2e2e', borderRadius: 10,
              overflow: 'hidden', zIndex: 200, boxShadow: '0 8px 24px rgba(0,0,0,0.6)',
            }}>
              {suggestions.map(name => (
                <button key={name} onMouseDown={() => handleSelect(name)}
                  style={{
                    display: 'block', width: '100%', textAlign: 'left',
                    padding: '11px 14px', background: 'none', border: 'none',
                    borderBottom: '1px solid #262626', color: '#F0EDE8',
                    fontSize: 14, cursor: 'pointer',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = '#2a2a2a'}
                  onMouseLeave={e => e.currentTarget.style.background = 'none'}
                >
                  {name}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

      return (
        <div style={{ height: '100dvh', background: '#0f0f0f', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
          <svg className="spin" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D4A574" strokeWidth="2" strokeLinecap="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
          </svg>
          <p style={{ color: '#8A8680', fontSize: 13 }}>Setting up your exercise library...</p>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Today tab — state machine
    // ─────────────────────────────────────────────────────────────────────────

    // Step 1: Choose a split
    function SplitPickerStep1({ onSelect, onCancel }) {
      const FREE = { id: 'free', label: 'Free Workout', muscles: [] };
      return (
        <div className="fade-in" style={{ padding: '20px 20px 32px' }}>
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: '#F0EDE8', lineHeight: 1.2 }}>What are you training?</h2>
              <p style={{ fontSize: 13, color: '#8A8680', marginTop: 4 }}>Pick a split for exercise suggestions.</p>
            </div>
            <button onClick={onCancel} style={{ background: 'none', border: 'none', color: '#8A8680', fontSize: 14, cursor: 'pointer', padding: '4px 0' }}>
              Cancel
            </button>
          </div>

          {/* Split cards */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {SPLITS.map(split => (
              <button
                key={split.id}
                onClick={() => { navigator.vibrate && navigator.vibrate(10); onSelect(split); }}
                className="press-scale"
                style={{
                  background: '#1a1a1a', border: '1px solid #262626', borderRadius: 14,
                  padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 16,
                  cursor: 'pointer', textAlign: 'left', width: '100%',
                }}
              >
                <div style={{ flexShrink: 0 }}>
                  <SplitIcon id={split.id} size={26} color="#D4A574" />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: '#F0EDE8' }}>{split.label}</div>
                  <div style={{ fontSize: 12, color: '#8A8680', marginTop: 3 }}>
                    {split.defaults.slice(0, 3).join(' · ')}
                  </div>
                </div>
                <IconChevronRight size={16} color="#4A4744" />
              </button>
            ))}

            {/* Free workout — dashed border */}
            <button
              onClick={() => { navigator.vibrate && navigator.vibrate(10); onSelect(FREE); }}
              className="press-scale"
              style={{
                background: 'transparent', border: '1.5px dashed #2e2e2e', borderRadius: 14,
                padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 16,
                cursor: 'pointer', textAlign: 'left', width: '100%', marginTop: 4,
              }}
            >
              <div style={{ flexShrink: 0 }}>
                <SplitIcon id="free" size={26} color="#8A8680" />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: '#F0EDE8' }}>Free Workout</div>
                <div style={{ fontSize: 12, color: '#8A8680', marginTop: 3 }}>Log anything — no suggestions</div>
              </div>
              <IconChevronRight size={16} color="#4A4744" />
            </button>
          </div>
        </div>
      );
    }

    // Step 2: Toggle exercises
    function SplitPickerStep2({ split, exercises, onToggle, onBack, onCancel, onStart }) {
      const selectedCount = exercises.filter(e => e.selected).length;
      return (
        <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          {/* Header */}
          <div style={{ padding: '16px 20px 14px', borderBottom: '1px solid #1e1e1e', flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <button onClick={onBack}
                style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'flex', alignItems: 'center', color: '#8A8680' }}>
                <IconChevronLeft size={20} color="#8A8680" />
              </button>
              <div style={{ flex: 1 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: '#F0EDE8' }}>{split.label}</h2>
                <p style={{ fontSize: 12, color: '#8A8680', marginTop: 2 }}>Tap to add or remove exercises.</p>
              </div>
              <button onClick={onCancel} style={{ background: 'none', border: 'none', color: '#8A8680', fontSize: 13, cursor: 'pointer' }}>
                Cancel
              </button>
            </div>
          </div>

          {/* Exercise list */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '12px 20px' }}>
            {exercises.map((ex, i) => (
              <button
                key={ex.name}
                onClick={() => onToggle(i)}
                className="press-scale"
                style={{
                  display: 'flex', alignItems: 'center', gap: 14, width: '100%',
                  padding: '12px 14px', marginBottom: 6,
                  background: ex.selected ? 'rgba(212,165,116,0.07)' : '#1a1a1a',
                  border: `1px solid ${ex.selected ? '#D4A574' : '#262626'}`,
                  borderRadius: 11, cursor: 'pointer', textAlign: 'left',
                  opacity: ex.selected ? 1 : 0.55, transition: 'all 0.15s',
                }}
              >
                {/* Checkbox */}
                <div style={{
                  width: 20, height: 20, borderRadius: 6, flexShrink: 0,
                  background: ex.selected ? '#D4A574' : 'transparent',
                  border: `1.5px solid ${ex.selected ? '#D4A574' : '#3a3a3a'}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  transition: 'all 0.15s',
                }}>
                  {ex.selected && <IconCheck size={11} color="#0f0f0f" />}
                </div>
                <span style={{ fontSize: 14, fontWeight: 500, color: '#F0EDE8' }}>{ex.name}</span>
              </button>
            ))}
            {/* Bottom padding so last item clears the sticky footer */}
            <div style={{ height: 90 }} />
          </div>

          {/* Sticky bottom bar */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            padding: '12px 20px', background: '#0f0f0f',
            borderTop: '1px solid #1e1e1e',
            paddingBottom: 'calc(12px + env(safe-area-inset-bottom, 0px))',
          }}>
            <button
              onClick={() => { navigator.vibrate && navigator.vibrate(20); onStart(); }}
              disabled={selectedCount === 0}
              className="press-scale"
              style={{
                width: '100%', padding: '14px 20px', borderRadius: 12, border: 'none',
                background: selectedCount > 0 ? '#D4A574' : '#2a2a2a',
                color: selectedCount > 0 ? '#0f0f0f' : '#4A4744',
                fontSize: 15, fontWeight: 700, cursor: selectedCount > 0 ? 'pointer' : 'default',
                transition: 'background 0.2s, color 0.2s',
              }}
            >
              {selectedCount > 0 ? `Start Workout (${selectedCount})` : 'Select at least one exercise'}
            </button>
          </div>
        </div>
      );
    }

    // Today home — "Ready to lift?" hero card
    function TodayHome({ onOpenPicker }) {
      return (
        <div className="fade-in" style={{ padding: '28px 20px 0' }}>
          {/* Hero card */}
          <div style={{
            background: '#1a1a1a', border: '1px solid #262626', borderRadius: 18,
            padding: '28px 24px', textAlign: 'center',
          }}>
            <div style={{ marginBottom: 16, display: 'flex', justifyContent: 'center' }}>
              <IconDumbbell size={40} color="#D4A574" />
            </div>
            <h3 style={{ fontSize: 20, fontWeight: 700, color: '#F0EDE8', marginBottom: 8 }}>Ready to lift?</h3>
            <p style={{ fontSize: 14, color: '#8A8680', marginBottom: 24, lineHeight: 1.5 }}>
              Track your exercises, sets, and reps.
            </p>
            <button
              onClick={() => { navigator.vibrate && navigator.vibrate(20); onOpenPicker(); }}
              className="press-scale"
              style={{
                width: '100%', padding: '14px 20px', borderRadius: 12, border: 'none',
                background: '#D4A574', color: '#0f0f0f', fontSize: 15, fontWeight: 700, cursor: 'pointer',
              }}
            >
              Start Workout
            </button>
          </div>
        </div>
      );
    }

    // Main TodayTab — orchestrates the state machine
    function TodayTab({ exerciseNames, workoutsData, onStartWorkout, todayWorkout }) {
      const [step, setStep]                   = useState('home');   // 'home' | 'pick_split' | 'pick_exercises'
      const [selectedSplit, setSelectedSplit] = useState(null);
      const [pickerExercises, setPickerExercises] = useState([]);

      const frequency = useMemo(() => buildExerciseFrequency(workoutsData), [workoutsData]);

      const handleSelectSplit = (split) => {
        setSelectedSplit(split);
        if (split.id === 'free') {
          // Free workout: start immediately with no pre-selected exercises
          onStartWorkout([], split);
        } else {
          setPickerExercises(getSuggestions(split, frequency));
          setStep('pick_exercises');
        }
      };

      const handleToggle = (index) => {
        setPickerExercises(prev => prev.map((ex, i) => i === index ? { ...ex, selected: !ex.selected } : ex));
      };

      const handleStart = () => {
        onStartWorkout(pickerExercises.filter(e => e.selected), selectedSplit);
      };

      const handleCancel = () => {
        setStep('home');
        setSelectedSplit(null);
        setPickerExercises([]);
      };

      if (step === 'pick_split') {
        return (
          <SplitPickerStep1
            onSelect={handleSelectSplit}
            onCancel={handleCancel}
          />
        );
      }

      if (step === 'pick_exercises' && selectedSplit) {
        return (
          <SplitPickerStep2
            split={selectedSplit}
            exercises={pickerExercises}
            onToggle={handleToggle}
            onBack={() => setStep('pick_split')}
            onCancel={handleCancel}
            onStart={handleStart}
          />
        );
      }

      return <TodayHome onOpenPicker={() => setStep('pick_split')} />;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // History + You tabs (placeholder)
    // ─────────────────────────────────────────────────────────────────────────

    function HistoryTab() {
      return (
        <div className="fade-in" style={{ padding: '28px 20px' }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: '#F0EDE8' }}>History</h2>
        </div>
      );
    }

    function YouTab() {
      return (
        <div className="fade-in" style={{ padding: '28px 20px' }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: '#F0EDE8' }}>You</h2>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Bottom nav
    // ─────────────────────────────────────────────────────────────────────────

    const TABS = [
      { id: 'today',   label: 'Today',   Icon: IconToday   },
      { id: 'history', label: 'History', Icon: IconHistory },
      { id: 'you',     label: 'You',     Icon: IconYou     },
    ];

    function BottomNav({ activeTab, onTabPress }) {
      return (
        <nav role="navigation" aria-label="Main navigation" style={{
          position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)',
          width: '100%', maxWidth: 480, background: '#111', borderTop: '1px solid #1e1e1e',
          display: 'flex', paddingBottom: 'env(safe-area-inset-bottom, 0px)', zIndex: 50,
        }}>
          {TABS.map(({ id, label, Icon }) => {
            const active = activeTab === id;
            return (
              <button key={id} onClick={() => onTabPress(id)}
                aria-label={label} aria-current={active ? 'page' : undefined}
                style={{
                  flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
                  justifyContent: 'center', gap: 3, paddingTop: 10, paddingBottom: 10,
                  background: 'none', border: 'none', cursor: 'pointer',
                  color: active ? '#D4A574' : '#4A4744', transition: 'color 0.2s', userSelect: 'none',
                }}>
                <Icon size={22} color={active ? '#D4A574' : '#4A4744'} />
                <span style={{ fontSize: 10, fontWeight: active ? 600 : 400, letterSpacing: '0.03em', lineHeight: 1 }}>
                  {label}
                </span>
                <div style={{ width: 4, height: 4, borderRadius: '50%', background: active ? '#D4A574' : 'transparent', transition: 'background 0.2s' }} />
              </button>
            );
          })}
        </nav>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────────────────────────

    function App() {
      const [activeTab, setActiveTab] = useState('today');
      const [seeding, setSeeding]     = useState(false);

      const [exerciseNamesData] = useFirebase('drea/exerciseNames');
      const [workoutsData]      = useFirebase('drea/workouts');

      const exerciseNames = useMemo(() => {
        if (!exerciseNamesData) return ALL_EXERCISE_NAMES;
        return [...new Set(Object.values(exerciseNamesData))].sort();
      }, [exerciseNamesData]);

      const todayWorkout = workoutsData ? workoutsData[todayKey()] : null;

      useEffect(() => {
        (async () => {
          const snap = await db.ref('drea/exerciseNames').once('value');
          if (!snap.val()) {
            setSeeding(true);
            await seedExerciseNames();
            setSeeding(false);
          }
        })();
      }, []);

      const handleTabPress = (id) => {
        navigator.vibrate && navigator.vibrate(10);
        setActiveTab(id);
      };

      // Called when user confirms exercises and hits "Start Workout (N)"
      // Phase 2b will expand this into a full active logger
      const handleStartWorkout = (exercises, split) => {
        console.log('Starting workout:', split.label, exercises.map(e => e.name));
        // TODO Phase 2b: setActiveWorkout({ exercises, split, startTime: Date.now() })
      };

      if (seeding) return <SeedingScreen />;

      return (
        <div style={{ background: '#0f0f0f', height: '100dvh', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <div style={{ width: '100%', maxWidth: 480, flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
            <main role="main" style={{ flex: 1, overflowY: 'auto', paddingBottom: 'calc(64px + env(safe-area-inset-bottom, 0px))', height: '100%' }}>
              {activeTab === 'today' && (
                <TodayTab
                  key="today"
                  exerciseNames={exerciseNames}
                  workoutsData={workoutsData}
                  todayWorkout={todayWorkout}
                  onStartWorkout={handleStartWorkout}
                />
              )}
              {activeTab === 'history' && <HistoryTab key="history" />}
              {activeTab === 'you'     && <YouTab     key="you"     />}
            </main>
            <BottomNav activeTab={activeTab} onTabPress={handleTabPress} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Service worker + mount
    // ─────────────────────────────────────────────────────────────────────────

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
