    // ─────────────────────────────────────────────────────────────────────────
    // BodyWeightChart — SVG trend line for body weight
    // ─────────────────────────────────────────────────────────────────────────

    function BodyWeightChart({ entries }) {
      // entries: [{weight, date, ...}] sorted ascending, length >= 2
      const W=320, H=130, PL=46, PR=16, PT=20, PB=24;
      const plotW=W-PL-PR, plotH=H-PT-PB;
      const timestamps = entries.map(e => new Date(e.date+'T12:00:00').getTime());
      const yVals = entries.map(e => e.weight);
      const tMin=Math.min(...timestamps), tMax=Math.max(...timestamps);
      const yMin=Math.min(...yVals), yMax=Math.max(...yVals);
      const tRange=tMax-tMin||1;
      const yPad = Math.max(1, (yMax-yMin)*0.2) || 5;
      const yLow=yMin-yPad, yHigh=yMax+yPad, yRange=yHigh-yLow;
      const toX = t => PL + ((t-tMin)/tRange)*plotW;
      const toY = v => PT + ((yHigh-v)/yRange)*plotH;
      const pts = entries.map((e,i) => ({ x:toX(timestamps[i]), y:toY(e.weight), ...e }));
      const linePath = pts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const areaPath = linePath
        + ` L${pts[pts.length-1].x.toFixed(1)},${(PT+plotH).toFixed(1)}`
        + ` L${PL},${(PT+plotH).toFixed(1)} Z`;
      const yGridVals = [0.33,0.66].map(f => (yLow+f*yRange).toFixed(1)*1);
      const last = pts[pts.length-1];
      const labelRight = last.x > W*0.7;
      const dateShort = key => new Date(key+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          {yGridVals.map((v,i) => {
            const gy = toY(v);
            return (
              <g key={i}>
                <line x1={PL} y1={gy.toFixed(1)} x2={W-PR} y2={gy.toFixed(1)} stroke="#262626" strokeWidth="1"/>
                <text x={PL-6} y={(gy+3.5).toFixed(1)} textAnchor="end" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{Math.round(v)}</text>
              </g>
            );
          })}
          <path d={areaPath} fill="rgba(212,165,116,0.06)"/>
          <path d={linePath} fill="none" stroke="#D4A574" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {pts.map((p,i) => <circle key={i} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r="3" fill="#D4A574"/>)}
          {/* Latest weight label */}
          <text x={(last.x + (labelRight?-6:6)).toFixed(1)} y={(last.y-8).toFixed(1)}
            textAnchor={labelRight?'end':'start'} fill="#D4A574" fontSize="10" fontWeight="600"
            fontFamily="-apple-system,sans-serif">{last.weight} lbs</text>
          {/* X-axis: first and last date */}
          <text x={PL} y={H-4} textAnchor="start" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{dateShort(pts[0].date)}</text>
          <text x={W-PR} y={H-4} textAnchor="end" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{dateShort(last.date)}</text>
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // BodyWeightTracker — log form, stats, chart, recent entries
    // ─────────────────────────────────────────────────────────────────────────

    function BodyWeightTracker() {
      const [bwData, bwLoading] = useFirebase('drea/bodyWeights');
      const [inputVal, setInputVal] = useState('');
      const [unit, setUnit]         = useState('lbs');
      const [saving, setSaving]     = useState(false);
      const [saved, setSaved]       = useState(false);
      const savedTimer              = useRef(null);

      // Sorted newest first
      const entries = useMemo(() => {
        if (!bwData) return [];
        return Object.entries(bwData)
          .map(([key, v]) => ({ key, ...v }))
          .sort((a,b) => b.timestamp - a.timestamp);
      }, [bwData]);

      const entriesAsc = useMemo(() => [...entries].reverse(), [entries]);

      // Stats
      const current = entries[0]?.weight ?? null;
      const sevenAgo = Date.now() - 7*24*60*60*1000;
      const avg7 = useMemo(() => {
        const r = entries.filter(e => e.timestamp >= sevenAgo);
        return r.length ? r.reduce((s,e) => s+e.weight, 0) / r.length : null;
      }, [entries]);
      const totalChange = entries.length >= 2
        ? +(entries[0].weight - entries[entries.length-1].weight).toFixed(1)
        : null;

      const handleLog = async () => {
        const raw = parseFloat(inputVal);
        if (isNaN(raw) || !inputVal.trim()) return;
        const minRaw = unit==='kg'?22:50, maxRaw = unit==='kg'?227:500;
        if (raw < minRaw || raw > maxRaw) {
          alert(`Please enter a weight between ${minRaw} and ${maxRaw} ${unit}.`);
          return;
        }
        const weightLbs = unit==='kg' ? Math.round(raw*2.20462*10)/10 : raw;
        setSaving(true);
        try {
          const now = Date.now();
          await fbPush('drea/bodyWeights', { weight: weightLbs, unit:'lbs', date:todayKey(), timestamp:now });
          setInputVal('');
          navigator.vibrate && navigator.vibrate(20);
          setSaved(true);
          clearTimeout(savedTimer.current);
          savedTimer.current = setTimeout(() => setSaved(false), 2200);
        } finally { setSaving(false); }
      };

      const inputStyle = {
        flex:1, background:'#242424', border:'1px solid #2e2e2e', borderRadius:10,
        padding:'11px 14px', color:'#F0EDE8', fontSize:16, fontWeight:600, outline:'none',
        fontVariantNumeric:'tabular-nums', transition:'border-color 0.15s',
      };

      return (
        <div>
          {/* Log form */}
          <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
            padding:'14px 16px',marginBottom:14}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input id="body-weight-input" name="bodyWeight"
                type="number" inputMode="decimal" value={inputVal}
                onChange={e => setInputVal(e.target.value)} placeholder="0.0"
                aria-label="Body weight value"
                style={inputStyle}
                onFocus={e => e.target.style.borderColor='#D4A574'}
                onBlur={e => e.target.style.borderColor='#2e2e2e'}
                onKeyDown={e => { if (e.key==='Enter') handleLog(); }}
              />
              {/* Unit toggle */}
              <div style={{display:'flex',background:'#242424',border:'1px solid #2e2e2e',
                borderRadius:9,overflow:'hidden',flexShrink:0}}>
                {['lbs','kg'].map(u => (
                  <button key={u} onClick={() => setUnit(u)} style={{
                    padding:'11px 13px',border:'none',cursor:'pointer',
                    fontSize:13,fontWeight:600,transition:'all 0.15s',
                    background: unit===u ? '#D4A574' : 'transparent',
                    color: unit===u ? '#0f0f0f' : '#8A8680',
                  }}>{u}</button>
                ))}
              </div>
              <button onClick={handleLog} disabled={saving || !inputVal.trim()} className="press-scale"
                style={{
                  padding:'11px 18px',borderRadius:10,border:'none',flexShrink:0,
                  cursor: inputVal.trim() && !saving ? 'pointer' : 'default',
                  background: saved ? '#7A9E7E' : inputVal.trim() && !saving ? '#D4A574' : '#2a2a2a',
                  color: inputVal.trim() && !saving || saved ? '#0f0f0f' : '#4A4744',
                  fontSize:14,fontWeight:700,transition:'background 0.2s, color 0.2s',
                }}>
                {saved ? 'Logged!' : saving ? '...' : 'Log'}
              </button>
            </div>
          </div>

          {/* Stats row */}
          {entries.length > 0 && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
              {[
                { label:'Current', value: current !== null ? current.toFixed(1) : '—', unit:'lbs', color:'#D4A574' },
                { label:'7-Day Avg', value: avg7 !== null ? avg7.toFixed(1) : '—', unit: avg7!==null?'lbs':'', color:'#D4A574' },
                { label:'Total Change',
                  value: totalChange !== null ? (totalChange > 0 ? `+${totalChange}` : String(totalChange)) : '—',
                  unit: totalChange !== null ? 'lbs' : '',
                  color: totalChange === null ? '#D4A574' : totalChange > 0 ? '#C08B8B' : '#7A9E7E',
                },
              ].map(stat => (
                <div key={stat.label} style={{background:'#1a1a1a',border:'1px solid #262626',
                  borderRadius:12,padding:'12px 10px',textAlign:'center'}}>
                  <div className="tabular" style={{fontSize:17,fontWeight:700,
                    color:stat.color,lineHeight:1,marginBottom:2}}>{stat.value}</div>
                  {stat.unit && <div style={{fontSize:10,color:'#4A4744',marginBottom:4}}>{stat.unit}</div>}
                  <div style={{fontSize:11,color:'#8A8680',marginTop: stat.unit?0:6}}>{stat.label}</div>
                </div>
              ))}
            </div>
          )}

          {/* Trend chart */}
          {entriesAsc.length >= 2 && (
            <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
              padding:'14px 12px 10px',marginBottom:14}}>
              <BodyWeightChart entries={entriesAsc}/>
            </div>
          )}

          {/* Recent entries */}
          {entries.length > 0 && (
            <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
              overflow:'hidden',marginBottom:4}}>
              <div style={{padding:'10px 16px',borderBottom:'1px solid #262626'}}>
                <span style={{fontSize:11,color:'#4A4744',fontWeight:600,
                  letterSpacing:'0.06em',textTransform:'uppercase'}}>Recent entries</span>
              </div>
              {entries.slice(0,10).map((e,i) => (
                <div key={e.key} style={{display:'flex',alignItems:'center',padding:'10px 16px',
                  borderTop: i ? '1px solid #1e1e1e' : undefined}}>
                  <span className="tabular" style={{fontSize:15,fontWeight:600,color:'#F0EDE8',flex:1}}>
                    {e.weight.toFixed(1)}&thinsp;<span style={{fontSize:12,color:'#8A8680',fontWeight:400}}>lbs</span>
                  </span>
                  <span style={{fontSize:13,color:'#8A8680',marginRight:12}}>
                    {new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
                  </span>
                  <button onClick={() => fbRemove(`drea/bodyWeights/${e.key}`)}
                    aria-label={`Delete ${e.weight} lbs entry from ${e.date}`}
                    style={{background:'none',border:'none',cursor:'pointer',color:'#3a3a3a',
                      padding:'4px 6px',borderRadius:6,display:'flex',alignItems:'center',
                      transition:'color 0.15s'}}
                    onMouseEnter={ev => ev.currentTarget.style.color='#C47070'}
                    onMouseLeave={ev => ev.currentTarget.style.color='#3a3a3a'}>
                    <IconX size={13} color="currentColor"/>
                  </button>
                </div>
              ))}
            </div>
          )}

          {/* Empty state */}
          {!bwLoading && entries.length === 0 && (
            <div style={{textAlign:'center',padding:'20px 0 8px',color:'#4A4744',fontSize:13}}>
              Start tracking to see your trend.
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // PRBoard — personal records list (reused in History > PRs and You tab)
    // ─────────────────────────────────────────────────────────────────────────

    function PRBoard({ personalRecordsData }) {
      const prs = personalRecordsData
        ? Object.values(personalRecordsData)
            .filter(pr => pr && pr.name)
            .sort((a,b) => a.name.localeCompare(b.name))
        : null;

      if (prs === null) {
        return (
          <div style={{display:'flex',justifyContent:'center',padding:'40px 0'}}>
            <svg className="spin" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="#3a3a3a" strokeWidth="2" strokeLinecap="round">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </div>
        );
      }

      if (prs.length === 0) {
        return (
          <div style={{textAlign:'center',padding:'48px 0'}}>
            <IconStar size={34} color="#2a2a2a"/>
            <p style={{fontSize:14,fontWeight:600,color:'#4A4744',marginTop:14}}>No personal records yet.</p>
            <p style={{fontSize:13,color:'#3a3a3a',marginTop:6}}>Hit the gym and set some PRs!</p>
          </div>
        );
      }

      return (
        <div>
          {prs.map(pr => (
            <div key={pr.name} style={{
              background:'#1a1a1a',
              border:'1px solid rgba(212,165,116,0.25)',
              borderRadius:14, padding:'14px 16px', marginBottom:10,
              display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
            }}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:'#F0EDE8',
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pr.name}</div>
                <div style={{fontSize:12,color:'#8A8680',marginTop:3}}>{formatDate(pr.date)}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div className="tabular" style={{fontSize:16,fontWeight:700,color:'#D4A574',letterSpacing:'-0.01em'}}>
                  {pr.weight} × {pr.reps}
                </div>
                <div className="tabular" style={{fontSize:12,color:'#8A8680',marginTop:2}}>
                  {pr.est1rm} lbs e1RM
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // MuscleHeatMap — SVG body diagram color-coded by training recency
    // ─────────────────────────────────────────────────────────────────────────

    function MuscleHeatMap({ workoutsData }) {
      const { recency, thisWS, lastWS } = useMemo(() => {
        const r = {};
        if (!workoutsData) return { recency:r, thisWS:'', lastWS:'' };
        const tw = getWeekStart(todayKey());
        const lw = (() => { const d = new Date(tw+'T12:00:00'); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); })();
        Object.entries(workoutsData).forEach(([date, w]) => {
          if (!w.exercises) return;
          const ws = getWeekStart(date);
          Object.values(w.exercises).forEach(ex => {
            (EXERCISE_MUSCLE_MAP[ex.name] || []).forEach(m => {
              if (!r[m] || ws > r[m]) r[m] = ws;
            });
          });
        });
        return { recency:r, thisWS:tw, lastWS:lw };
      }, [workoutsData]);

      const col = (m) => {
        const r = recency[m];
        if (!r) return '#222';
        if (r === thisWS) return 'rgba(122,158,126,0.72)';
        if (r === lastWS) return 'rgba(212,165,116,0.65)';
        return 'rgba(74,71,68,0.75)';
      };

      // Two body figures: front (FX=10) and back (BX=125)
      const FX=10, BX=125;
      const bs = '#2a2a2a', bf = '#161616'; // body stroke / fill

      // Shared body outline path (offset by ox)
      const bodyPath = (ox) =>
        `M${ox+44} 37 Q${ox+38} 39 ${ox+28} 44 L${ox+22} 76 L${ox+32} 76 ` +
        `Q${ox+36} 58 ${ox+38} 50 L${ox+38} 98 L${ox+44} 102 ` +
        `L${ox+42} 152 L${ox+50} 152 L${ox+50} 110 ` +
        `L${ox+50} 152 L${ox+58} 152 L${ox+56} 102 ` +
        `L${ox+62} 98 L${ox+62} 50 Q${ox+64} 58 ${ox+68} 76 L${ox+78} 76 ` +
        `L${ox+72} 44 Q${ox+62} 39 ${ox+56} 37 Z`;

      return (
        <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,padding:'14px 16px'}}>
          <div style={{fontSize:12,color:'#8A8680',marginBottom:12,fontWeight:500}}>Muscle Training Recency</div>
          <svg viewBox="0 0 225 168" width="100%" style={{display:'block'}}>

            {/* Labels */}
            <text x={FX+50} y={10} textAnchor="middle" fill="#4A4744" fontSize="8" fontFamily="-apple-system,sans-serif" fontWeight="600">FRONT</text>
            <text x={BX+50} y={10} textAnchor="middle" fill="#4A4744" fontSize="8" fontFamily="-apple-system,sans-serif" fontWeight="600">BACK</text>

            {/* ── FRONT ── */}
            {/* Head */}
            <circle cx={FX+50} cy={24} r={12} fill={bf} stroke={bs} strokeWidth="1.5"/>
            {/* Body outline */}
            <path d={bodyPath(FX)} fill={bf} stroke={bs} strokeWidth="1.5" strokeLinejoin="round"/>
            {/* Muscle zones — front */}
            <ellipse cx={FX+43} cy={55} rx={11} ry={10} fill={col('chest')}/>
            <ellipse cx={FX+57} cy={55} rx={11} ry={10} fill={col('chest')}/>
            <ellipse cx={FX+28} cy={48} rx={9} ry={8} fill={col('shoulders')}/>
            <ellipse cx={FX+72} cy={48} rx={9} ry={8} fill={col('shoulders')}/>
            <rect x={FX+19} y={55} width={11} height={22} rx={5.5} fill={col('biceps')}/>
            <rect x={FX+70} y={55} width={11} height={22} rx={5.5} fill={col('biceps')}/>
            <rect x={FX+43} y={68} width={14} height={26} rx={5} fill={col('core')}/>
            <rect x={FX+38} y={103} width={11} height={34} rx={5.5} fill={col('legs')}/>
            <rect x={FX+51} y={103} width={11} height={34} rx={5.5} fill={col('legs')}/>

            {/* ── BACK ── */}
            {/* Head */}
            <circle cx={BX+50} cy={24} r={12} fill={bf} stroke={bs} strokeWidth="1.5"/>
            {/* Body outline */}
            <path d={bodyPath(BX)} fill={bf} stroke={bs} strokeWidth="1.5" strokeLinejoin="round"/>
            {/* Muscle zones — back */}
            <ellipse cx={BX+42} cy={48} rx={14} ry={8} fill={col('traps')}/>
            <ellipse cx={BX+58} cy={48} rx={14} ry={8} fill={col('traps')}/>
            <ellipse cx={BX+36} cy={64} rx={12} ry={18} fill={col('back')}/>
            <ellipse cx={BX+64} cy={64} rx={12} ry={18} fill={col('back')}/>
            <rect x={BX+19} y={55} width={11} height={22} rx={5.5} fill={col('triceps')}/>
            <rect x={BX+70} y={55} width={11} height={22} rx={5.5} fill={col('triceps')}/>
            <rect x={BX+38} y={103} width={11} height={34} rx={5.5} fill={col('legs')}/>
            <rect x={BX+51} y={103} width={11} height={34} rx={5.5} fill={col('legs')}/>
          </svg>

          {/* Legend */}
          <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:10,justifyContent:'center'}}>
            {[
              {c:'rgba(122,158,126,0.72)',l:'This week'},
              {c:'rgba(212,165,116,0.65)',l:'Last week'},
              {c:'rgba(74,71,68,0.75)',   l:'Earlier'},
              {c:'#222',                  l:'Not trained'},
            ].map(({c,l}) => (
              <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:c,border:'1px solid #333',flexShrink:0}}/>
                <span style={{fontSize:10,color:'#4A4744'}}>{l}</span>
              </div>
            ))}
          </div>

          {/* Muscle pills */}
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:12,justifyContent:'center'}}>
            {MUSCLE_GROUPS.map(({id,label}) => (
              <div key={id} style={{display:'flex',alignItems:'center',gap:4,
                padding:'3px 9px',borderRadius:20,background:'rgba(255,255,255,0.02)',
                border:'1px solid #222'}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:col(id),
                  border:'1px solid rgba(255,255,255,0.08)',flexShrink:0}}/>
                <span style={{fontSize:10,color:'#8A8680'}}>{label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // CreateSplitModal — build a custom split
    // ─────────────────────────────────────────────────────────────────────────

    function CreateSplitModal({ exerciseNames, onSave, onCancel }) {
      const [name, setName]             = useState('');
      const [selMuscles, setSelMuscles] = useState([]);
      const [selExercises, setSelExes]  = useState([]);
      const [exSearch, setExSearch]     = useState('');

      const toggleMuscle = (id) =>
        setSelMuscles(p => p.includes(id) ? p.filter(m=>m!==id) : [...p, id]);
      const toggleEx = (n) =>
        setSelExes(p => p.includes(n) ? p.filter(x=>x!==n) : [...p, n]);

      const suggestedExs = useMemo(() => {
        if (!selMuscles.length) return [];
        return Object.entries(EXERCISE_MUSCLE_MAP)
          .filter(([,m]) => m.some(g => selMuscles.includes(g)))
          .map(([n]) => n).sort();
      }, [selMuscles]);

      const pool = selMuscles.length ? suggestedExs : (exerciseNames.length ? exerciseNames : ALL_EXERCISE_NAMES);
      const filtered = useMemo(() => {
        const q = exSearch.trim().toLowerCase();
        return q ? pool.filter(n => n.toLowerCase().includes(q)) : pool;
      }, [pool, exSearch]);

      const handleSave = () => {
        const n = sanitize(name.trim()).substring(0, 50);
        if (!n) return;
        onSave({ id:`custom_${Date.now()}`, label:n, muscles:selMuscles, defaults:selExercises, custom:true });
      };

      const iBase = { width:'100%',background:'#1a1a1a',border:'1px solid #2e2e2e',borderRadius:11,
        padding:'11px 14px',color:'#F0EDE8',fontSize:14,outline:'none',fontFamily:'inherit',
        transition:'border-color 0.15s' };

      return (
        <div style={{position:'fixed',inset:0,zIndex:100,background:'rgba(0,0,0,0.72)',
          display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
          <div className="slide-up" style={{width:'100%',maxWidth:480,maxHeight:'90vh',
            background:'#111',borderRadius:'20px 20px 0 0',borderTop:'1px solid #222',
            display:'flex',flexDirection:'column'}}>

            {/* Header */}
            <div style={{padding:'10px 20px 14px',borderBottom:'1px solid #1e1e1e',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
                <div style={{width:36,height:4,borderRadius:2,background:'#2e2e2e'}}/>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <h2 style={{fontSize:17,fontWeight:700,color:'#F0EDE8'}}>Create Split</h2>
                <button onClick={onCancel} style={{background:'none',border:'none',cursor:'pointer',
                  color:'#8A8680',fontSize:13,fontWeight:500}}>Cancel</button>
              </div>
            </div>

            <div style={{flex:1,overflowY:'auto',padding:'16px 20px'}}>
              {/* Name */}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:600,color:'#8A8680',letterSpacing:'0.07em',
                  textTransform:'uppercase',marginBottom:8}}>Split Name</div>
                <input type="text" value={name} onChange={e=>setName(e.target.value)}
                  placeholder="e.g. Push Day, Full Body..." maxLength={50}
                  autoCapitalize="words" autoCorrect="off"
                  style={iBase}
                  onFocus={e=>e.target.style.borderColor='#D4A574'}
                  onBlur={e=>e.target.style.borderColor='#2e2e2e'}/>
              </div>

              {/* Target muscles */}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:600,color:'#8A8680',letterSpacing:'0.07em',
                  textTransform:'uppercase',marginBottom:10}}>Target Muscles</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                  {MUSCLE_GROUPS.map(({id,label}) => {
                    const on = selMuscles.includes(id);
                    return (
                      <button key={id} onClick={()=>toggleMuscle(id)} style={{
                        padding:'7px 14px',borderRadius:20,cursor:'pointer',fontSize:12,fontWeight:600,
                        transition:'all 0.15s',
                        background: on?'rgba(212,165,116,0.18)':'#1e1e1e',
                        color: on?'#D4A574':'#4A4744',
                        border: `1px solid ${on?'rgba(212,165,116,0.4)':'#2a2a2a'}`,
                      }}>{label}</button>
                    );
                  })}
                </div>
              </div>

              {/* Default exercises */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:600,color:'#8A8680',letterSpacing:'0.07em',
                  textTransform:'uppercase',marginBottom:10}}>
                  Default Exercises{selExercises.length > 0 ? ` (${selExercises.length})` : ''}
                </div>
                {selExercises.length > 0 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>
                    {selExercises.map(n => (
                      <button key={n} onClick={()=>toggleEx(n)} style={{
                        padding:'4px 8px 4px 10px',borderRadius:20,border:'none',cursor:'pointer',
                        fontSize:11,fontWeight:500,background:'rgba(212,165,116,0.12)',
                        color:'#D4A574',display:'flex',alignItems:'center',gap:4}}>
                        {n}<IconX size={9} color="currentColor"/>
                      </button>
                    ))}
                  </div>
                )}
                <input type="text" value={exSearch} onChange={e=>setExSearch(e.target.value)}
                  placeholder="Search exercises..."
                  style={{...iBase, padding:'9px 13px', fontSize:13, marginBottom:8}}
                  onFocus={e=>e.target.style.borderColor='#3a3a3a'}
                  onBlur={e=>e.target.style.borderColor='#2e2e2e'}/>
                <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:11,
                  overflow:'hidden',maxHeight:190,overflowY:'auto'}}>
                  {filtered.length === 0 ? (
                    <div style={{padding:'14px 16px',fontSize:13,color:'#4A4744',textAlign:'center'}}>
                      {selMuscles.length===0 ? 'Select muscles to see suggestions' : 'No matches'}
                    </div>
                  ) : filtered.map((n,i) => {
                    const sel = selExercises.includes(n);
                    return (
                      <button key={n} onClick={()=>toggleEx(n)}
                        style={{display:'flex',alignItems:'center',gap:12,width:'100%',
                          padding:'10px 14px',background:sel?'rgba(212,165,116,0.07)':'none',
                          border:'none',borderTop:i?'1px solid #1e1e1e':undefined,
                          cursor:'pointer',textAlign:'left',transition:'background 0.12s'}}>
                        <div style={{width:16,height:16,borderRadius:5,flexShrink:0,
                          background:sel?'#D4A574':'transparent',
                          border:`1.5px solid ${sel?'#D4A574':'#3a3a3a'}`,
                          display:'flex',alignItems:'center',justifyContent:'center'}}>
                          {sel&&<IconCheck size={9} color="#0f0f0f"/>}
                        </div>
                        <span style={{fontSize:13,color:sel?'#F0EDE8':'#8A8680',fontWeight:sel?500:400}}>
                          {n}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>
              <div style={{height:8}}/>
            </div>

            {/* Save */}
            <div style={{padding:'12px 20px',borderTop:'1px solid #1e1e1e',flexShrink:0,
              paddingBottom:'calc(12px + env(safe-area-inset-bottom, 0px))'}}>
              <button onClick={handleSave} disabled={!name.trim()} className="press-scale"
                style={{width:'100%',padding:'14px 0',borderRadius:12,border:'none',
                  background:name.trim()?'#D4A574':'#2a2a2a',
                  color:name.trim()?'#0f0f0f':'#4A4744',
                  fontSize:15,fontWeight:700,cursor:name.trim()?'pointer':'default',
                  transition:'all 0.2s'}}>
                Save Split
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // ExerciseManager — add / search / delete exercises in drea/exerciseNames
    // ─────────────────────────────────────────────────────────────────────────

    function ExerciseManager({ exerciseNamesData }) {
      const [mode, setMode]         = useState('single');
      const [singleInput, setSingleInput] = useState('');
      const [bulkInput, setBulkInput]     = useState('');
      const [search, setSearch]           = useState('');
      const [toast, setToast]             = useState(null);
      const toastTimer                    = useRef(null);
      const debouncedSearch               = useDebounce(search);

      const allEntries = useMemo(() => {
        if (!exerciseNamesData) return [];
        return Object.entries(exerciseNamesData)
          .map(([key, name]) => ({ key, name }))
          .sort((a,b) => a.name.localeCompare(b.name));
      }, [exerciseNamesData]);

      const allNamesLower = useMemo(() => new Set(allEntries.map(e => e.name.toLowerCase())), [allEntries]);

      const filtered = useMemo(() => {
        const q = debouncedSearch.trim().toLowerCase();
        return q ? allEntries.filter(e => e.name.toLowerCase().includes(q)) : allEntries;
      }, [allEntries, debouncedSearch]);

      const showToast = (msg, type='success') => {
        setToast({ msg, type });
        clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToast(null), 2600);
      };

      const handleSingleAdd = async () => {
        const name = sanitize(singleInput.trim()).substring(0, 100);
        if (!name) return;
        if (allNamesLower.has(name.toLowerCase())) {
          showToast(`"${name}" already exists`, 'warn'); return;
        }
        await fbPush('drea/exerciseNames', name);
        setSingleInput('');
        showToast(`Added "${name}"`);
        navigator.vibrate && navigator.vibrate(15);
      };

      const handleBulkAdd = async () => {
        const lines = bulkInput.split('\n').map(l => l.trim()).filter(Boolean);
        if (!lines.length) return;
        const toAdd = lines.filter(n => !allNamesLower.has(n.toLowerCase()));
        const dupeCount = lines.length - toAdd.length;
        if (!toAdd.length) {
          showToast(`All ${dupeCount} already exist`, 'warn'); return;
        }
        const upd = {};
        toAdd.forEach(name => { upd[db.ref('drea/exerciseNames').push().key] = name; });
        await db.ref('drea/exerciseNames').update(upd);
        setBulkInput('');
        showToast(`Added ${toAdd.length}${dupeCount ? ` · ${dupeCount} already existed` : ''}`);
        navigator.vibrate && navigator.vibrate(15);
      };

      const inputBase = {
        width:'100%', background:'#242424', border:'1px solid #2e2e2e', borderRadius:10,
        padding:'11px 14px', color:'#F0EDE8', fontSize:14, outline:'none',
        fontFamily:'inherit', transition:'border-color 0.15s',
      };
      const addBtnBase = (active) => ({
        padding:'11px 18px', borderRadius:10, border:'none', flexShrink:0,
        background: active ? '#D4A574' : '#2a2a2a',
        color: active ? '#0f0f0f' : '#4A4744',
        fontSize:14, fontWeight:700, cursor: active ? 'pointer' : 'default',
        transition:'all 0.2s',
      });

      return (
        <div>
          {/* Section header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <h3 style={{fontSize:12,fontWeight:600,color:'#8A8680',
              letterSpacing:'0.07em',textTransform:'uppercase'}}>
              Exercises {exerciseNamesData ? `(${allEntries.length})` : ''}
            </h3>
            {/* Mode toggle */}
            <div style={{display:'flex',background:'#1e1e1e',border:'1px solid #2a2a2a',
              borderRadius:9,overflow:'hidden'}}>
              {['single','bulk'].map(m => (
                <button key={m} onClick={() => setMode(m)} style={{
                  padding:'6px 14px', border:'none', cursor:'pointer',
                  fontSize:12, fontWeight:600, transition:'all 0.15s',
                  background: mode===m ? 'rgba(212,165,116,0.2)' : 'transparent',
                  color: mode===m ? '#D4A574' : '#4A4744',
                }}>{m==='single'?'Single':'Bulk'}</button>
              ))}
            </div>
          </div>

          {/* Toast */}
          {toast && (
            <div className="fade-in" style={{
              padding:'10px 14px', borderRadius:10, marginBottom:12, fontSize:13,
              background: toast.type==='warn' ? 'rgba(196,112,112,0.15)' : 'rgba(122,158,126,0.15)',
              border: `1px solid ${toast.type==='warn' ? 'rgba(196,112,112,0.35)' : 'rgba(122,158,126,0.35)'}`,
              color: toast.type==='warn' ? '#C47070' : '#7A9E7E',
            }}>{toast.msg}</div>
          )}

          {/* Add form */}
          {mode === 'single' ? (
            <div style={{display:'flex',gap:8,marginBottom:14}}>
              <input id="exercise-add-input" name="exerciseName"
                type="text" value={singleInput}
                onChange={e => setSingleInput(e.target.value)}
                placeholder="Exercise name..."
                autoCapitalize="words" autoCorrect="off" spellCheck="false"
                onKeyDown={e => { if (e.key==='Enter') handleSingleAdd(); }}
                style={inputBase}
                onFocus={e => e.target.style.borderColor='#D4A574'}
                onBlur={e => e.target.style.borderColor='#2e2e2e'}
              />
              <button onClick={handleSingleAdd} disabled={!singleInput.trim()} className="press-scale"
                style={addBtnBase(!!singleInput.trim())}>Add</button>
            </div>
          ) : (
            <div style={{marginBottom:14}}>
              <textarea value={bulkInput} onChange={e => setBulkInput(e.target.value)}
                placeholder={"Paste exercise names,\none per line..."}
                rows={4}
                style={{...inputBase, resize:'none', lineHeight:1.6, marginBottom:8}}
                onFocus={e => e.target.style.borderColor='#D4A574'}
                onBlur={e => e.target.style.borderColor='#2e2e2e'}
              />
              <button onClick={handleBulkAdd} disabled={!bulkInput.trim()} className="press-scale"
                style={{...addBtnBase(!!bulkInput.trim()), width:'100%', padding:'12px 0'}}>
                Add All
              </button>
            </div>
          )}

          {/* Search */}
          <div style={{marginBottom:10}}>
            <input type="text" value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search exercises..." autoCapitalize="off" autoCorrect="off"
              style={{...inputBase}}
              onFocus={e => e.target.style.borderColor='#3a3a3a'}
              onBlur={e => e.target.style.borderColor='#2e2e2e'}
            />
          </div>

          {/* Exercise list */}
          {filtered.length === 0 ? (
            <div style={{textAlign:'center',padding:'24px 0',color:'#4A4744',fontSize:13}}>
              {search ? `No matches for "${search}"` : 'No exercises yet.'}
            </div>
          ) : (
            <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,overflow:'hidden'}}>
              {filtered.map(({key, name}, i) => (
                <div key={key} style={{display:'flex',alignItems:'center',
                  padding:'11px 14px', borderTop: i ? '1px solid #1e1e1e' : undefined}}>
                  <span style={{flex:1,fontSize:13,color:'#F0EDE8',fontWeight:400}}>{name}</span>
                  <button onClick={() => fbRemove(`drea/exerciseNames/${key}`)}
                    aria-label={`Delete ${name}`}
                    style={{background:'none',border:'none',cursor:'pointer',
                      color:'#3a3a3a',padding:'4px 6px',borderRadius:6,
                      display:'flex',alignItems:'center',transition:'color 0.15s'}}
                    onMouseEnter={ev => ev.currentTarget.style.color='#C47070'}
                    onMouseLeave={ev => ev.currentTarget.style.color='#3a3a3a'}>
                    <IconX size={13} color="currentColor"/>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // You tab — body weight + personal records
    // ─────────────────────────────────────────────────────────────────────────

          <div style={{marginBottom:32}}>

          </div>

          {/* Tools */}
          <div style={{marginBottom:32}}>
            <h3 style={{...sectionHead, marginBottom:14}}>Tools</h3>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {/* Plate Calculator */}
              <button onClick={() => setPlateSheetOpen(true)} className="press-scale"
                style={{display:'flex',alignItems:'center',gap:14,background:'#1a1a1a',
                  border:'1px solid #262626',borderRadius:14,padding:'15px 16px',
                  cursor:'pointer',textAlign:'left',width:'100%',transition:'border-color 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='#D4A574'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='#262626'}>
                <div style={{width:36,height:36,borderRadius:10,background:'rgba(212,165,116,0.1)',
                  display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4A574" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M6 4v16M18 4v16"/><path d="M4 7h4M16 7h4M4 17h4M16 17h4"/><line x1="8" y1="12" x2="16" y2="12"/>
                  </svg>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:'#F0EDE8'}}>Plate Calculator</div>

                <IconChevronRight size={15} color="#4A4744"/>

              {/* Data Export */}
              <button onClick={handleExport} className="press-scale"
                disabled={!workoutsData || exportDone}
                style={{display:'flex',alignItems:'center',gap:14,background:'#1a1a1a',
                  border:'1px solid #262626',borderRadius:14,padding:'15px 16px',
                  cursor:(!workoutsData||exportDone)?'default':'pointer',textAlign:'left',
                  width:'100%',transition:'border-color 0.15s',opacity:!workoutsData?0.5:1}}
                onMouseEnter={e=>{if(workoutsData&&!exportDone)e.currentTarget.style.borderColor='#D4A574';}}
                onMouseLeave={e=>e.currentTarget.style.borderColor='#262626'}>
                <div style={{width:36,height:36,borderRadius:10,
                  background:exportDone?'rgba(122,158,126,0.12)':'rgba(212,165,116,0.1)',
                  display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={exportDone?'#7A9E7E':'#D4A574'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">

                    {exportDone ? 'Downloaded!' : 'Export Workout Data'}

          {/* Exercise Manager */}
          <div style={{marginBottom:16}}>
            <ExerciseManager exerciseNamesData={exerciseNamesData}/>

          {plateSheetOpen && <PlateCalcSheet onClose={() => setPlateSheetOpen(false)}/>}
        </div>
      );

    // ─────────────────────────────────────────────────────────────────────────
    // CoachPanel — slide-up AI coaching interface
    // ─────────────────────────────────────────────────────────────────────────

    function CoachPanel({ open, onClose, workoutsData, bodyWeightsData, personalRecordsData }) {
      const [messages, setMessages]   = useState([]);
      const [input, setInput]         = useState('');
      const [loading, setLoading]     = useState(false);
      const [apiKey, setApiKey]       = useState(() => localStorage.getItem(ANTHROPIC_KEY_LS)||'');
      const [keyDraft, setKeyDraft]   = useState('');
      const [keyError, setKeyError]   = useState('');
      const [showSetup, setShowSetup] = useState(() => !localStorage.getItem(ANTHROPIC_KEY_LS));
      const msgsEndRef                = useRef(null);

      useEffect(() => {
        if (open) msgsEndRef.current?.scrollIntoView({ behavior:'smooth' });
      }, [messages, loading, open]);

      const systemPrompt = useMemo(() =>
        buildCoachSystemPrompt(workoutsData, bodyWeightsData, personalRecordsData),
        [workoutsData, bodyWeightsData, personalRecordsData]
      );

      const saveKey = () => {
        const k = keyDraft.trim();
        if (!k) { setKeyError('Please enter your API key.'); return; }
        if (!k.startsWith('sk-ant-')) { setKeyError('Key should start with sk-ant-'); return; }
        localStorage.setItem(ANTHROPIC_KEY_LS, k);
        setApiKey(k); setShowSetup(false); setKeyDraft(''); setKeyError('');
      };

      const sendMsg = async (text) => {
        const t = text.trim();
        if (!t || loading || !apiKey) return;
        const userMsg = { role:'user', content:t };
        const updated = [...messages, userMsg];
        setMessages(updated); setInput(''); setLoading(true);
        try {
          const ctrl = new AbortController();
          const tid  = setTimeout(()=>ctrl.abort(), 15000);
          const res  = await fetch('https://api.anthropic.com/v1/messages', {
            method:'POST',
            headers:{
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-request-origin': 'drea-fitness-pwa',
              'content-type': 'application/json',
            },
            body: JSON.stringify({
              model:'claude-sonnet-4-20250514',
              max_tokens:512,
              system:systemPrompt,
              messages:updated.map(m=>({role:m.role,content:m.content})),
            }),
            signal: ctrl.signal,
          });
          clearTimeout(tid);
          if (!res.ok) {
            const body = await res.json().catch(()=>({}));
            const msg = res.status===401
              ? 'Invalid API key. Tap the key icon to update it.'
              : body.error?.message||`API error (${res.status})`;
            throw new Error(msg);
          }
          const data  = await res.json();
          const reply = data.content?.[0]?.text||'No response received.';
          setMessages(prev=>[...prev,{role:'assistant',content:reply}]);
        } catch(err) {
          let errMsg;
          if (err.name==='AbortError') errMsg='Request timed out. Check your connection.';
          else if (err.message?.includes('Failed to fetch')||err.message?.includes('NetworkError'))
            errMsg='Coaching is offline right now. Try again later.';
          else errMsg = err.message||'Something went wrong.';
          setMessages(prev=>[...prev,{role:'assistant',content:errMsg,isError:true}]);
        } finally { setLoading(false); }
      };

      const QUICK = [
        "What should I train next?",
        "Am I making progress?",
        "What muscles am I neglecting?",
        "Give me a training tip",
      ];

      if (!open) return null;

      return (
        <>
          {/* Backdrop */}
          <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:90}}/>

          {/* Panel */}
          <div className="slide-up" style={{
            position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',
            width:'100%',maxWidth:480,height:'82vh',
            background:'#111',borderRadius:'20px 20px 0 0',
            borderTop:'1px solid #222',
            display:'flex',flexDirection:'column',zIndex:91,
          }}>

            {/* Drag handle */}
            <div style={{display:'flex',justifyContent:'center',padding:'10px 0 2px',flexShrink:0}}>
              <div style={{width:36,height:4,borderRadius:2,background:'#2e2e2e'}}/>
            </div>

            {/* Header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'6px 18px 12px',flexShrink:0,borderBottom:'1px solid #1a1a1a'}}>
              <div style={{display:'flex',alignItems:'center',gap:9}}>
                <IconSparkle size={17} color="#D4A574"/>
                <span style={{fontSize:17,fontWeight:700,color:'#F0EDE8'}}>Coach</span>
              </div>
              <div style={{display:'flex',gap:2,alignItems:'center'}}>
                <button onClick={()=>setShowSetup(true)} title="API key settings"
                  style={{background:'none',border:'none',cursor:'pointer',
                    color:'#3a3a3a',padding:7,borderRadius:7,display:'flex',alignItems:'center',
                    transition:'color 0.15s'}}
                  onMouseEnter={e=>e.currentTarget.style.color='#8A8680'}
                  onMouseLeave={e=>e.currentTarget.style.color='#3a3a3a'}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="7.5" cy="15.5" r="5.5"/>
                    <path d="M21 2l-9.6 9.6M15.5 7.5l5.5.5-.5-5.5"/>
                  </svg>
                </button>
                {messages.length > 0 && (
                  <button onClick={()=>setMessages([])}
                    style={{background:'none',border:'none',cursor:'pointer',
                      color:'#4A4744',padding:'4px 8px',borderRadius:7,fontSize:12,
                      transition:'color 0.15s'}}
                    onMouseEnter={e=>e.currentTarget.style.color='#8A8680'}
                    onMouseLeave={e=>e.currentTarget.style.color='#4A4744'}>
                    Clear
                  </button>
                )}
                <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',
                  color:'#8A8680',padding:7,display:'flex',alignItems:'center'}}>
                  <IconX size={16} color="currentColor"/>
                </button>
              </div>
            </div>

            {showSetup ? (
              /* ── API Key Setup ── */
              <div style={{flex:1,padding:'28px 24px',display:'flex',flexDirection:'column',
                alignItems:'center',justifyContent:'center',gap:18,textAlign:'center'}}>
                <div style={{width:56,height:56,borderRadius:'50%',
                  background:'rgba(212,165,116,0.1)',border:'1px solid rgba(212,165,116,0.25)',
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <IconSparkle size={26} color="#D4A574"/>
                </div>
                <div>
                  <p style={{fontSize:17,fontWeight:700,color:'#F0EDE8',marginBottom:6}}>
                    {apiKey ? 'Update API Key' : 'Set up your Coach'}
                  </p>
                  <p style={{fontSize:13,color:'#8A8680',lineHeight:1.65}}>
                    Enter your Anthropic API key to enable AI coaching.<br/>
                    Stored locally — never leaves your device.
                  </p>
                </div>
                <div style={{width:'100%',maxWidth:320}}>
                  <input type="password" value={keyDraft}
                    onChange={e=>{setKeyDraft(e.target.value);setKeyError('');}}
                    placeholder="sk-ant-..."
                    onKeyDown={e=>{if(e.key==='Enter')saveKey();}}
                    style={{width:'100%',background:'#1a1a1a',
                      border:`1px solid ${keyError?'#C47070':'#2e2e2e'}`,
                      borderRadius:11,padding:'12px 14px',color:'#F0EDE8',fontSize:14,
                      outline:'none',fontFamily:'inherit',transition:'border-color 0.15s'}}
                    onFocus={e=>e.target.style.borderColor=keyError?'#C47070':'#D4A574'}
                    onBlur={e=>e.target.style.borderColor=keyError?'#C47070':'#2e2e2e'}
                  />
                  {keyError && (
                    <p style={{fontSize:12,color:'#C47070',marginTop:5,textAlign:'left'}}>{keyError}</p>
                  )}
                </div>
                <button onClick={saveKey} disabled={!keyDraft.trim()} className="press-scale"
                  style={{padding:'12px 32px',borderRadius:12,border:'none',cursor:'pointer',
                    background:keyDraft.trim()?'#D4A574':'#2a2a2a',
                    color:keyDraft.trim()?'#0f0f0f':'#4A4744',
                    fontSize:15,fontWeight:700,transition:'all 0.2s'}}>
                  Save Key
                </button>
                {apiKey && (
                  <button onClick={()=>{setShowSetup(false);setKeyDraft('');setKeyError('');}}
                    style={{background:'none',border:'none',cursor:'pointer',color:'#4A4744',fontSize:13}}>
                    Cancel
                  </button>
                )}
              </div>
            ) : (
              <>
                {/* ── Messages ── */}
                <div style={{flex:1,overflowY:'auto',padding:'14px 16px 6px'}}>
                  {messages.length === 0 ? (
                    <div style={{paddingTop:8}}>
                      <p style={{fontSize:14,color:'#8A8680',marginBottom:18,lineHeight:1.6,textAlign:'center'}}>
                        Hey Andrea — what's on your mind?
                      </p>
                      <div style={{display:'flex',flexDirection:'column',gap:8}}>
                        {QUICK.map(q => (
                          <button key={q} onClick={()=>sendMsg(q)} className="press-scale"
                            style={{padding:'12px 16px',borderRadius:12,
                              border:'1px solid #262626',background:'#1a1a1a',
                              color:'#F0EDE8',fontSize:14,cursor:'pointer',textAlign:'left',
                              transition:'all 0.15s',width:'100%'}}
                            onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(212,165,116,0.5)';e.currentTarget.style.color='#D4A574';}}
                            onMouseLeave={e=>{e.currentTarget.style.borderColor='#262626';e.currentTarget.style.color='#F0EDE8';}}>
                            {q}
                          </button>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <div style={{display:'flex',flexDirection:'column',gap:10}}>
                      {messages.map((m,i) => (
                        <div key={i} style={{display:'flex',
                          justifyContent:m.role==='user'?'flex-end':'flex-start',
                          alignItems:'flex-start',gap:8}}>
                          {m.role==='assistant' && (
                            <div style={{width:26,height:26,borderRadius:'50%',flexShrink:0,marginTop:1,
                              background:'rgba(212,165,116,0.08)',border:'1px solid rgba(212,165,116,0.22)',
                              display:'flex',alignItems:'center',justifyContent:'center'}}>
                              <IconSparkle size={12} color="#D4A574"/>
                            </div>
                          )}
                          <div style={{
                            maxWidth:'80%',padding:'10px 13px',
                            borderRadius:m.role==='user'?'14px 14px 4px 14px':'4px 14px 14px 14px',
                            background:m.role==='user'?'rgba(212,165,116,0.09)':'#1a1a1a',
                            border:m.role==='user'?'1px solid rgba(212,165,116,0.2)':'1px solid #262626',
                            fontSize:14,color:m.isError?'#C47070':'#F0EDE8',lineHeight:1.55,
                            whiteSpace:'pre-wrap',wordBreak:'break-word',
                          }}>
                            {m.content}
                          </div>
                        </div>
                      ))}
                      {loading && (
                        <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                          <div style={{width:26,height:26,borderRadius:'50%',flexShrink:0,marginTop:1,
                            background:'rgba(212,165,116,0.08)',border:'1px solid rgba(212,165,116,0.22)',
                            display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <IconSparkle size={12} color="#D4A574"/>
                          </div>
                          <div style={{padding:'12px 14px',borderRadius:'4px 14px 14px 14px',
                            background:'#1a1a1a',border:'1px solid #262626'}}>
                            <div style={{display:'flex',gap:4,alignItems:'center'}}>
                              {[0,1,2].map(i=>(
                                <div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#4A4744',
                                  animation:`dotBounce 1.2s ease-in-out ${i*0.15}s infinite`}}/>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                      <div ref={msgsEndRef} style={{height:4}}/>
                    </div>
                  )}
                </div>

                {/* ── Input bar ── */}
                <div style={{padding:'8px 12px',flexShrink:0,borderTop:'1px solid #1a1a1a',
                  display:'flex',gap:8,alignItems:'flex-end',
                  paddingBottom:'max(8px, env(safe-area-inset-bottom, 8px))'}}>
                  <textarea value={input} onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(input);} }}
                    placeholder="Ask your coach..."
                    rows={1}
                    style={{flex:1,background:'#1a1a1a',border:'1px solid #262626',
                      borderRadius:12,padding:'10px 13px',color:'#F0EDE8',fontSize:14,
                      outline:'none',fontFamily:'inherit',resize:'none',lineHeight:1.5,
                      maxHeight:80,overflowY:'auto',transition:'border-color 0.15s'}}
                    onFocus={e=>e.target.style.borderColor='#3a3a3a'}
                    onBlur={e=>e.target.style.borderColor='#262626'}
                  />
                  <button onClick={()=>sendMsg(input)} disabled={loading||!input.trim()} className="press-scale"
                    style={{width:40,height:40,borderRadius:12,border:'none',flexShrink:0,
                      background:input.trim()&&!loading?'#D4A574':'#2a2a2a',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      cursor:input.trim()&&!loading?'pointer':'default',transition:'background 0.2s'}}>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                      stroke={input.trim()&&!loading?'#0f0f0f':'#4A4744'}
                      strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <line x1="22" y1="2" x2="11" y2="13"/>
                      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                  </button>
                </div>
              </>
            )}
          </div>
        </>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Bottom nav
    // ─────────────────────────────────────────────────────────────────────────

    const TABS = [
      {id:'today',label:'Today',Icon:IconToday},
      {id:'history',label:'History',Icon:IconHistory},
      {id:'you',label:'You',Icon:IconYou},
    ];

    function BottomNav({ activeTab, onTabPress }) {
      return (
        <nav role="navigation" aria-label="Main navigation" style={{
          position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',
          width:'100%',maxWidth:480,background:'#111',borderTop:'1px solid #1e1e1e',
          display:'flex',paddingBottom:'env(safe-area-inset-bottom, 0px)',zIndex:50}}>
          {TABS.map(({id,label,Icon})=>{
            const a = activeTab===id;
            return (
              <button key={id} onClick={()=>onTabPress(id)}
                aria-label={label} aria-current={a?'page':undefined}
                style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
                  justifyContent:'center',gap:3,paddingTop:10,paddingBottom:10,
                  background:'none',border:'none',cursor:'pointer',
                  color:a?'#D4A574':'#4A4744',transition:'color 0.2s',userSelect:'none'}}>
                <Icon size={22} color={a?'#D4A574':'#4A4744'}/>
                <span style={{fontSize:10,fontWeight:a?600:400,letterSpacing:'0.03em',lineHeight:1}}>{label}</span>
                <div style={{width:4,height:4,borderRadius:'50%',background:a?'#D4A574':'transparent',transition:'background 0.2s'}}/>
              </button>
            );
          })}
        </nav>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────────────────────────

    function App() {
      const [activeTab, setActiveTab]         = useState('today');
      const [seeding, setSeeding]             = useState(false);
      const [activeWorkout, setActiveWorkout] = useState(null);
      const [newPRs, setNewPRs]               = useState([]);
      const [newMilestone, setNewMilestone]   = useState(null);
      const [coachOpen, setCoachOpen]         = useState(false);
      const isOnline                          = useOnlineStatus();

      const [exerciseNamesData]    = useFirebase('drea/exerciseNames');
      const [workoutsData]         = useFirebase('drea/workouts');
      const [personalRecordsData]  = useFirebase('drea/personalRecords');
      const [bodyWeightsData]      = useFirebase('drea/bodyWeights');
      const [customSplitsData]     = useFirebase('drea/customSplits');
      const [templatesData]        = useFirebase('drea/templates');

      const exerciseNames = useMemo(() => {
        if (!exerciseNamesData) return ALL_EXERCISE_NAMES;
        return [...new Set(Object.values(exerciseNamesData))].sort();
      }, [exerciseNamesData]);

      const allSplits = useMemo(() => {
        const custom = customSplitsData
          ? Object.entries(customSplitsData)
              .filter(([,s]) => s && s.label)
              .map(([fbKey, s]) => ({ ...s, fbKey, custom:true }))
          : [];
        return [...SPLITS, ...custom];
      }, [customSplitsData]);

      const allTemplates = useMemo(() => {
        if (!templatesData) return [];
        return Object.entries(templatesData)
          .filter(([,t]) => t && t.name)
          .map(([fbKey, t]) => ({ ...t, fbKey }))
          .sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
      }, [templatesData]);

      const lastWeightMap   = useMemo(() => buildLastWeightMap(workoutsData), [workoutsData]);
      const lastSessionMap  = useMemo(() => buildLastSessionMap(workoutsData), [workoutsData]);
      const todayWorkout    = workoutsData ? workoutsData[todayKey()] : null;
      const isFirstTime     = workoutsData !== null && Object.keys(workoutsData || {}).length === 0;

      useEffect(() => {
        (async () => {
          const snap = await db.ref('drea/exerciseNames').once('value');
          if (!snap.val()) { setSeeding(true); await seedExerciseNames(); setSeeding(false); }
        })();
      }, []);

      const handleTabPress = (id) => { navigator.vibrate&&navigator.vibrate(10); setActiveTab(id); };

      const handleStartWorkout = (picked, split) => {
        const exercises = picked.length > 0
          ? picked.map(ex => ({
              id: `ex_${uid()}`, name: ex.name,
              sets: [{ id:`set_${uid()}`, weight: lastWeightMap[ex.name] ? String(lastWeightMap[ex.name]) : '', reps:'' }],
            }))
          : [{ id:`ex_${uid()}`, name:'', sets:[{id:`set_${uid()}`,weight:'',reps:''}] }];
        setActiveWorkout({ exercises, split, startTime: Date.now() });
        setActiveTab('today');
      };

      const handleCancelWorkout = () => setActiveWorkout(null);

      const handleFinishWorkout = async (exercises, notes) => {
        navigator.vibrate && navigator.vibrate(50);
        const { newPRs: prs } = await saveWorkout(exercises, notes, activeWorkout.startTime, activeWorkout.split);
        setActiveWorkout(null);
        if (prs.length > 0) {
          navigator.vibrate && navigator.vibrate([50, 50, 100]);
          setNewPRs(prs);
        }
        // Milestone check — compute streak including the just-saved workout
        const updatedWorkouts = { ...(workoutsData||{}), [todayKey()]: { split: activeWorkout.split.id } };
        const streak = computeStreak(updatedWorkouts);
        if (STREAK_MILESTONES.includes(streak)) {
          const mKey = `week_${streak}`;
          const snap = await db.ref(`drea/milestones/${mKey}`).once('value');
          if (!snap.val()) {
            await fbSet(`drea/milestones/${mKey}`, { weeks: streak, date: todayKey() });
            setNewMilestone(streak);
            navigator.vibrate && navigator.vibrate([100, 50, 100, 50, 200]);
          }
        }
      };

      const handleCreateSplit = async (split) => {
        const key = db.ref('drea/customSplits').push().key;
        await fbSet(`drea/customSplits/${key}`, { ...split, id: key });
      };

      const handleDeleteCustomSplit = async (fbKey) => {
        if (!fbKey) return;
        await fbRemove(`drea/customSplits/${fbKey}`);
      };

      const handleSaveTemplate = async (name, split, exercises) => {
        const key = db.ref('drea/templates').push().key;
        await fbSet(`drea/templates/${key}`, {
          name: sanitize(name).slice(0,40),
          split,
          exercises: exercises.map(n => sanitize(n).slice(0,100)),
          createdAt: Date.now(),
        });
      };

      const handleDeleteTemplate = async (fbKey) => {
        if (!fbKey) return;
        await fbRemove(`drea/templates/${fbKey}`);
      };

      if (seeding) return <SeedingScreen/>;

      return (
        <div style={{background:'#0f0f0f',height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center'}}>
          {!isOnline && <OfflineBanner/>}
          <div style={{width:'100%',maxWidth:480,flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
            <main role="main" style={{
              flex:1,overflowY:'auto',height:'100%',
              paddingTop: isOnline ? 0 : 36,
              paddingBottom:'calc(64px + env(safe-area-inset-bottom, 0px))',
            }}>
              {activeTab==='today'&&(
                <TodayTab key="today"
                  exerciseNames={exerciseNames} workoutsData={workoutsData}
                  activeWorkout={activeWorkout} lastWeightMap={lastWeightMap} lastSessionMap={lastSessionMap}
                  onStartWorkout={handleStartWorkout}
                  onCancelWorkout={handleCancelWorkout}
                  onFinishWorkout={handleFinishWorkout}
                  todayWorkout={todayWorkout}
                  newPRs={newPRs} onDismissPRs={()=>setNewPRs([])}
                  isFirstTime={isFirstTime}
                  allSplits={allSplits}
                  onCreateSplit={handleCreateSplit}
                  onDeleteCustomSplit={handleDeleteCustomSplit}
                  newMilestone={newMilestone}
                  onDismissMilestone={()=>setNewMilestone(null)}
                  allTemplates={allTemplates}
                  onSaveTemplate={handleSaveTemplate}
                  onDeleteTemplate={handleDeleteTemplate}
                />
              )}
              {activeTab==='history'&&<HistoryTab key="history" workoutsData={workoutsData} personalRecordsData={personalRecordsData} allSplits={allSplits}/>}
              {activeTab==='you'&&<YouTab key="you" personalRecordsData={personalRecordsData} exerciseNamesData={exerciseNamesData} workoutsData={workoutsData} allSplits={allSplits} allTemplates={allTemplates} onDeleteTemplate={handleDeleteTemplate} onSaveTemplate={handleSaveTemplate} onStartWorkout={(picked,split)=>{handleStartWorkout(picked,split);setActiveTab('today');}}/>}
            </main>
            <BottomNav activeTab={activeTab} onTabPress={handleTabPress}/>
          </div>

          {/* Floating coach button */}
          {!coachOpen && (
            <button
              onClick={()=>{ navigator.vibrate&&navigator.vibrate(15); setCoachOpen(true); }}
              className="press-scale"
              aria-label="Open AI Coach"
              style={{
                position:'fixed',
                bottom:'calc(64px + env(safe-area-inset-bottom, 0px) + 14px)',
                right:16,
                width:52,height:52,borderRadius:'50%',
                background:'#D4A574',border:'none',cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:'0 4px 18px rgba(212,165,116,0.38)',
                zIndex:60,
              }}>
              <IconSparkle size={20} color="#0f0f0f"/>
            </button>
          )}

          <CoachPanel
            open={coachOpen}
            onClose={()=>setCoachOpen(false)}
            workoutsData={workoutsData}
            bodyWeightsData={bodyWeightsData}
            personalRecordsData={personalRecordsData}
          />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SW + mount
    // ─────────────────────────────────────────────────────────────────────────

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', ()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
