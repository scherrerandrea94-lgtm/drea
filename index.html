    // ─────────────────────────────────────────────────────────────────────────
    // Firebase helpers
    // ─────────────────────────────────────────────────────────────────────────

    function useFirebase(path) {
      const [data, setData]       = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!path) { setLoading(false); return; }
        const ref = db.ref(path);
        ref.on('value', snap => {
          setData(snap.val());
          setLoading(false);
        });
        return () => ref.off('value');
      }, [path]);

      return [data, loading];
    }

    const fbSet    = (path, value)   => db.ref(path).set(value);
    const fbUpdate = (path, updates) => db.ref(path).update(updates);
    const fbPush   = (path, value)   => db.ref(path).push(value);
    const fbRemove = (path)          => db.ref(path).remove();

    const localGet = (key) => { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } };
    const localSet = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} };

    // Seed exercise names into Firebase if not already present
    async function seedExerciseNames() {
      const snap = await db.ref('drea/exerciseNames').once('value');
      if (snap.val()) return; // already seeded
      const updates = {};
      ALL_EXERCISE_NAMES.forEach(name => {
        const key = db.ref('drea/exerciseNames').push().key;
        updates[key] = name;
      });
      await db.ref('drea/exerciseNames').set(updates);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // ExerciseInput — reusable autocomplete
    // ─────────────────────────────────────────────────────────────────────────

    function ExerciseInput({ value, onChange, onSelect, exerciseNames = [], placeholder = 'Exercise name...' }) {
      const [open, setOpen]         = useState(false);
      const [query, setQuery]       = useState(value || '');
      const closeTimer              = useRef(null);
      const inputRef                = useRef(null);

      // Keep local query in sync when value prop changes externally
      useEffect(() => { setQuery(value || ''); }, [value]);

      const suggestions = useMemo(() => {
        const q = query.trim().toLowerCase();
        const pool = exerciseNames.length ? exerciseNames : ALL_EXERCISE_NAMES;
        if (!q) return pool.slice(0, 10);
        return pool.filter(n => n.toLowerCase().includes(q)).slice(0, 10);
      }, [query, exerciseNames]);

      const handleChange = (e) => {
        const val = e.target.value;
        setQuery(val);
        onChange && onChange(val);
        setOpen(true);
      };

      const handleSelect = (name) => {
        setQuery(name);
        onChange && onChange(name);
        onSelect && onSelect(name);
        setOpen(false);
      };

      const handleFocus = () => {
        clearTimeout(closeTimer.current);
        setOpen(true);
      };

      const handleBlur = () => {
        // Delay so tap on suggestion registers first
        closeTimer.current = setTimeout(() => setOpen(false), 150);
      };

      return (
        <div style={{ position: 'relative', width: '100%' }}>
          <input
            ref={inputRef}
            type="text"
            value={query}
            onChange={handleChange}
            onFocus={handleFocus}
            onBlur={handleBlur}
            placeholder={placeholder}
            autoComplete="off"
            autoCorrect="off"
            autoCapitalize="words"
            spellCheck="false"
            style={{
              width: '100%',
              background: '#222222',
              border: '1px solid #2e2e2e',
              borderRadius: 10,
              padding: '10px 14px',
              color: '#F0EDE8',
              fontSize: 15,
              fontWeight: 500,
              outline: 'none',
              transition: 'border-color 0.15s',
            }}
            onMouseEnter={e => e.target.style.borderColor = '#D4A574'}
            onMouseLeave={e => { if (document.activeElement !== e.target) e.target.style.borderColor = '#2e2e2e'; }}
          />

          {open && suggestions.length > 0 && (
            <div style={{
              position: 'absolute',
              top: 'calc(100% + 4px)',
              left: 0,
              right: 0,
              background: '#1e1e1e',
              border: '1px solid #2e2e2e',
              borderRadius: 10,
              overflow: 'hidden',
              zIndex: 100,
              boxShadow: '0 8px 24px rgba(0,0,0,0.5)',
            }}>
              {suggestions.map(name => (
                <button
                  key={name}
                  onMouseDown={() => handleSelect(name)}
                  style={{
                    display: 'block',
                    width: '100%',
                    textAlign: 'left',
                    padding: '11px 14px',
                    background: 'none',
                    border: 'none',
                    borderBottom: '1px solid #262626',
                    color: '#F0EDE8',
                    fontSize: 14,
                    cursor: 'pointer',
                    transition: 'background 0.1s',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = '#2a2a2a'}
                  onMouseLeave={e => e.currentTarget.style.background = 'none'}
                >
                  {name}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────────────────────────

    function App() {
      const [activeTab, setActiveTab] = useState('today');
      const [seeding, setSeeding]     = useState(false);

      // Firebase exercise names (live listener)
      const [exerciseNamesData] = useFirebase('drea/exerciseNames');
      const exerciseNames = useMemo(() => {
        if (!exerciseNamesData) return ALL_EXERCISE_NAMES;
        return [...new Set(Object.values(exerciseNamesData))].sort();
      }, [exerciseNamesData]);

      // Seed on first load
      useEffect(() => {
        (async () => {
          const snap = await db.ref('drea/exerciseNames').once('value');
          if (!snap.val()) {
            setSeeding(true);
            await seedExerciseNames();
            setSeeding(false);
          }
        })();
      }, []);

      const handleTabPress = (tabId) => {
        navigator.vibrate && navigator.vibrate(10);
        setActiveTab(tabId);
      };

      if (seeding) return <SeedingScreen />;

      return (
        <div style={{
          background: '#0f0f0f',
          height: '100dvh',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
        }}>
          <div style={{
            width: '100%',
            maxWidth: 480,
            flex: 1,
            display: 'flex',
            flexDirection: 'column',
            overflow: 'hidden',
            position: 'relative',
          }}>
            <main
              role="main"
              style={{
                flex: 1,
                overflowY: 'auto',
                paddingBottom: 'calc(64px + env(safe-area-inset-bottom, 0px))',
                height: '100%',
              }}
            >
              {activeTab === 'today'   && <TodayTab   key="today"   exerciseNames={exerciseNames} />}
              {activeTab === 'history' && <HistoryTab key="history" />}
              {activeTab === 'you'     && <YouTab     key="you"     />}
            </main>

            <BottomNav activeTab={activeTab} onTabPress={handleTabPress} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Service worker registration
    // ─────────────────────────────────────────────────────────────────────────

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
