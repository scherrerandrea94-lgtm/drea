    const ALL_EXERCISE_NAMES = Object.keys(EXERCISE_MUSCLE_MAP).sort();

    // ─────────────────────────────────────────────────────────────────────────

    const SPLITS = [
      { id:'chest_back', label:'Chest / Back', muscles:['chest','back'],
        defaults:['Bench Press','Incline Dumbbell Press','Cable Fly','Lat Pulldown','Seated Cable Row','Dumbbell Pullover'] },

      { id:'shoulders', label:'Shoulders', muscles:['shoulders'],
        defaults:['Overhead Press','Lateral Raise','Front Raise','Face Pulls','Reverse Flyes','Arnold Press','Cable Lateral Raise','Upright Row'] },
      { id:'legs_abs', label:'Legs / Abs', muscles:['legs','core'],
        defaults:['Squat','Leg Press','Romanian Deadlift','Leg Curl','Leg Extension','Calf Raise','Cable Crunch','Hanging Leg Raise','Plank'] },

    const MUSCLE_GROUPS = [
      {id:'chest',label:'Chest'},{id:'back',label:'Back'},
      {id:'shoulders',label:'Shoulders'},{id:'biceps',label:'Biceps'},
      {id:'triceps',label:'Triceps'},{id:'traps',label:'Traps'},

    const STREAK_MILESTONES = [7,14,30,60,90,180,365];

    // ─────────────────────────────────────────────────────────────────────────
    // Utilities
    // ─────────────────────────────────────────────────────────────────────────

    function buildExerciseFrequency(workoutsData) {
      const freq = {};
      if (!workoutsData) return freq;
      Object.values(workoutsData).forEach(w => {
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => { if (ex.name) freq[ex.name] = (freq[ex.name]||0)+1; });
      });
      return freq;
    }

    function getSuggestions(split, frequency) {
      if (split.id === 'free') return [];
      const relevant = Object.entries(EXERCISE_MUSCLE_MAP)
        .filter(([,m]) => m.some(g => split.muscles.includes(g))).map(([n]) => n);
      const byFreq = [...relevant].sort((a,b) => { const d=(frequency[b]||0)-(frequency[a]||0); return d||a.localeCompare(b); });
      const seen = new Set(byFreq), merged = [...byFreq];
      split.defaults.forEach(d => { if (!seen.has(d)) merged.push(d); });
      return merged.map(name => ({ name, selected: split.defaults.includes(name) }));
    }

    function buildLastWeightMap(workoutsData) {
      const map = {};
      if (!workoutsData) return map;
      Object.keys(workoutsData).sort().reverse().forEach(date => {
        const w = workoutsData[date];
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => {
          if (!ex.name || map[ex.name] !== undefined || !ex.sets) return;
          const maxW = Math.max(0, ...Object.values(ex.sets).map(s => parseFloat(s.weight)||0));
          if (maxW > 0) map[ex.name] = maxW;
        });
      });
      return map;
    }

    // Last session map: exercise name → { weight, reps } of best set from most recent workout
    function buildLastSessionMap(workoutsData) {
      const map = {};
      if (!workoutsData) return map;
      Object.keys(workoutsData).sort().reverse().forEach(date => {
        const w = workoutsData[date];
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => {
          if (!ex.name || map[ex.name] !== undefined || !ex.sets) return;
          const sets = Object.values(ex.sets)
            .filter(s => parseFloat(s.weight) > 0 && parseInt(s.reps) > 0);
          if (!sets.length) return;
          // Best set = highest weight
          const best = sets.reduce((b,s) => parseFloat(s.weight) > parseFloat(b.weight) ? s : b);
          map[ex.name] = { weight: parseFloat(best.weight), reps: parseInt(best.reps) };
        });
      });
      return map;
    }

    function getOverloadSuggestion(last) {
      if (!last) return null;
      const { weight, reps } = last;
      if (reps >= 10 && weight > 0) {
        const add = weight < 100 ? 2.5 : 5;
        return { type:'weight', suggestedWeight: weight+add, suggestedReps: reps,
                 hint:`Try ${weight+add} lbs — you hit ${reps} reps last time` };
      }
      if (reps > 0 && reps < 12) {
        return { type:'reps', suggestedWeight: weight, suggestedReps: reps+1,
                 hint:`Try ${reps+1} reps at ${weight} lbs` };
      }
      return { type:'match', suggestedWeight: weight, suggestedReps: reps,
               hint:'Match last session, then push' };
    }

    // Sanitize exercise names for Firebase keys (forbids . # $ / [ ])
    const fbSafeKey = (str) => str.replace(/[.#$/[\]]/g, '_');

    function todayKey() { return new Date().toISOString().slice(0,10); }
    let _uid = 0;
    const uid = () => `${Date.now()}_${++_uid}`;

    function formatDate(key) {
      // key = "YYYY-MM-DD"
      const d = new Date(key + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    }

    // Epley estimated 1-rep max
    const epley = (weight, reps) => reps === 1 ? weight : Math.round(weight * (1 + reps / 30));

    // Plate calculator — returns plates per side for a given target weight
    function calcPlates(targetLbs, barbellLbs = 45) {
      const PLATES = [45, 35, 25, 10, 5, 2.5];
      let rem = Math.round(((targetLbs - barbellLbs) / 2) * 10) / 10;
      if (rem < 0) return null; // below bar weight
      const result = [];
      for (const p of PLATES) {
        const n = Math.floor(rem / p + 0.001); // float tolerance
        if (n > 0) {
          result.push({ weight: p, count: n });
          rem = Math.round((rem - p * n) * 10) / 10;
        }
      }
      // remaining > 0.1 means target isn't achievable with standard plates
      return {
        plates: result,
        achievable: Math.round((targetLbs - rem * 2) * 10) / 10,
        exact: Math.abs(rem) <= 0.1,
      };
    }

    // Return the Sunday that starts the ISO week for a given YYYY-MM-DD key
    function getWeekStart(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() - d.getDay());
      return d.toISOString().slice(0,10);
    }

    function computeWeeklyVolume(workoutsData, numWeeks=8) {
      const today = new Date(); today.setHours(12,0,0,0);
      const curWS = new Date(today); curWS.setDate(today.getDate() - today.getDay());
      const weeks = [];
      for (let i = numWeeks-1; i >= 0; i--) {
        const ws = new Date(curWS); ws.setDate(curWS.getDate() - i*7);
        weeks.push({
          start: ws.toISOString().slice(0,10),
          label: ws.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}),
          volume: 0,
        });
      }
      if (workoutsData) {
        Object.entries(workoutsData).forEach(([date, w]) => {
          const ws = getWeekStart(date);
          const wk = weeks.find(x => x.start === ws);
          if (wk) wk.volume += (w.totalVolume || 0);
        });
      }
      return weeks;
    }

    function computeExerciseHistory(workoutsData, exerciseName) {
      if (!workoutsData || !exerciseName) return [];
      const results = [];
      Object.entries(workoutsData).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, w]) => {
        if (!w.exercises) return;
        const found = Object.values(w.exercises).find(ex =>
          ex.name && ex.name.toLowerCase() === exerciseName.toLowerCase());
        if (!found || !found.sets) return;
        const sets = Object.values(found.sets)
          .filter(s => parseFloat(s.weight) > 0 && parseInt(s.reps) > 0);
        if (!sets.length) return;
        const best1rm = Math.max(...sets.map(s => epley(parseFloat(s.weight), parseInt(s.reps))));
        const bestSet = sets.reduce((b,s) =>
          epley(parseFloat(s.weight),parseInt(s.reps)) > epley(parseFloat(b.weight),parseInt(b.reps)) ? s : b);
        results.push({ date, est1rm: best1rm, weight: parseFloat(bestSet.weight), reps: parseInt(bestSet.reps) });
      });
      return results; // sorted ascending by date
    }

    // Consecutive weeks (ending at current week) that have ≥1 workout
    function computeStreak(workoutsData) {
      if (!workoutsData) return 0;
      const dates = Object.keys(workoutsData);
      if (!dates.length) return 0;
      const weekSet = new Set(dates.map(d => getWeekStart(d)));
      const today = new Date(); today.setHours(12,0,0,0);
      const cur = new Date(today); cur.setDate(today.getDate() - today.getDay());
      // Start from current week if it has a workout, otherwise check last week
      if (!weekSet.has(cur.toISOString().slice(0,10))) {
        cur.setDate(cur.getDate() - 7);
      }
      let streak = 0;
      while (weekSet.has(cur.toISOString().slice(0,10))) {
        streak++;
        cur.setDate(cur.getDate() - 7);
      }
      return streak;
    }

    // Deload detection — returns true when a recovery week looks warranted
    function checkDeloadNeeded(workoutsData) {
      if (!workoutsData) return false;
      const streak = computeStreak(workoutsData);
      if (streak < 4) return false;
      const weeks = computeWeeklyVolume(workoutsData, 8);
      const active = weeks.filter(w => w.volume > 0);
      if (active.length < 4) return false;
      const avg = active.reduce((s, w) => s + w.volume, 0) / active.length;
      if (avg === 0) return false;
      // Any light week in last 6? If so, already had a natural rest
      const hasLight = weeks.slice(-6).some(w => w.volume > 0 && w.volume < avg * 0.5);
      if (hasLight) return false;
      // Last 4 non-zero weeks all at or above 70% of average
      const last4 = weeks.filter(w => w.volume > 0).slice(-4);
      return last4.length >= 4 && last4.every(w => w.volume >= avg * 0.7);
    }

    // Strip HTML tags from user-entered text (security)
    const sanitize = (str) => typeof str === 'string' ? str.replace(/<[^>]*>/g, '') : '';

    // Debounce hook — delays a value update until input settles
    function useDebounce(value, delay=260) {
      const [dv, setDv] = useState(value);
      useEffect(() => {
        const t = setTimeout(() => setDv(value), delay);
        return () => clearTimeout(t);
      }, [value, delay]);
      return dv;

        return () => ref.off('value');

    // AI Coach — context builder
    // ─────────────────────────────────────────────────────────────────────────

    const ANTHROPIC_KEY_LS = 'drea_anthropic_key';

    function buildCoachSystemPrompt(workoutsData, bodyWeightsData, personalRecordsData) {
      const today = new Date().toLocaleDateString('en-US',
        {weekday:'long',month:'long',day:'numeric',year:'numeric'});

      const recentWorkouts = workoutsData
        ? Object.entries(workoutsData).sort(([a],[b])=>b.localeCompare(a)).slice(0,10)
            .map(([date,w]) => {
              const lbl = SPLITS.find(s=>s.id===w.split)?.label||'Free Workout';
              const exs = w.exercises
                ? Object.values(w.exercises).map(e=>e.name).filter(Boolean).join(', ')
                : '—';
              return `  ${date} | ${lbl} | ${(w.totalVolume||0).toLocaleString()} lbs | ${exs}`;
            }).join('\n')
        : '  No workouts yet.';

      const bwStr = bodyWeightsData
        ? Object.values(bodyWeightsData).sort((a,b)=>b.timestamp-a.timestamp).slice(0,5)
            .map(e=>`${e.date}: ${e.weight} lbs`).join(', ')
        : 'None.';

      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
      const cutoffKey = cutoff.toISOString().slice(0,10);
      const mf = {};
      if (workoutsData) {
        Object.entries(workoutsData).filter(([d])=>d>=cutoffKey).forEach(([,w])=>{
          if (!w.exercises) return;
          Object.values(w.exercises).forEach(ex => {
            (EXERCISE_MUSCLE_MAP[ex.name]||[]).forEach(m=>{ mf[m]=(mf[m]||0)+1; });
          });
        });
      }
      const muscleStr = Object.entries(mf).length
        ? Object.entries(mf).sort(([,a],[,b])=>b-a).map(([m,c])=>`${m}(${c}x)`).join(', ')
        : 'No recent data.';

      const prStr = personalRecordsData
        ? Object.values(personalRecordsData).filter(p=>p&&p.name)
            .map(p=>`${p.name}: ${p.weight}×${p.reps} lbs (e1RM ${p.est1rm})`).join('; ')||'None yet.'
        : 'None yet.';

      return `You are Drea, Andrea's personal AI fitness coach. Be warm, direct, and data-driven. Keep responses concise — 2-4 sentences unless deeper detail is needed. Reference her actual data when relevant.

Today: ${today}

Recent workouts (newest first):
${recentWorkouts}

Body weight (last 5 entries): ${bwStr}

Muscle training frequency last 30 days: ${muscleStr}

Be encouraging, specific, and practical. Don't pad responses.`;

    // ─────────────────────────────────────────────────────────────────────────
    // Firebase helpers
    // ─────────────────────────────────────────────────────────────────────────

    function useFirebase(path) {
      const [data, setData]       = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        if (!path) { setLoading(false); return; }
        const ref = db.ref(path);
        ref.on('value', snap => { setData(snap.val()); setLoading(false); });
        return () => ref.off('value');
      }, [path]);
      return [data, loading];
    }

    const fbSet    = (path, v) => db.ref(path).set(v);
    const fbUpdate = (path, v) => db.ref(path).update(v);
    const fbPush   = (path, v) => db.ref(path).push(v);
    const fbRemove = (path)    => db.ref(path).remove();

    const localGet = (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
    const localSet = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

    async function seedExerciseNames() {
      const snap = await db.ref('drea/exerciseNames').once('value');
      if (snap.val()) return;
      const upd = {};
      ALL_EXERCISE_NAMES.forEach(n => { upd[db.ref('drea/exerciseNames').push().key] = n; });
      await db.ref('drea/exerciseNames').set(upd);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // saveWorkout — persists to Firebase and returns newPRs
    // ─────────────────────────────────────────────────────────────────────────

    async function saveWorkout(exercises, notes, startTime, split) {
      const key      = todayKey();
      const duration = Math.max(1, Math.round((Date.now() - startTime) / 60000));

      // Filter to exercises with a name and at least one logged set
      const valid = exercises
        .filter(ex => ex.name.trim())
        .map(ex => ({
          name: sanitize(ex.name.trim()).substring(0, 100),
          sets: ex.sets
            .filter(s => (parseFloat(s.weight)||0) > 0 && (parseInt(s.reps)||0) > 0)
            .map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) })),
        }))
        .filter(ex => ex.sets.length > 0);

      if (valid.length === 0) return { newPRs: [], totalVolume: 0, duration };

      // Build Firebase exercise object (stable keys)
      const exObj = {};
      valid.forEach((ex, i) => {
        const setsObj = {};
        ex.sets.forEach((s, j) => {
          setsObj[`set_${String(j+1).padStart(3,'0')}`] = { weight: s.weight, reps: s.reps };
        });
        exObj[`exercise_${String(i+1).padStart(3,'0')}`] = { name: ex.name, sets: setsObj };
      });

      const totalVolume = valid.reduce((sum, ex) =>
        sum + ex.sets.reduce((s2, s) => s2 + s.weight * s.reps, 0), 0);

      // Persist workout
      await fbSet(`drea/workouts/${key}`, {
        exercises: exObj, totalVolume, duration,
        notes: sanitize(notes.trim()).substring(0, 500),
        split: split.id, timestamp: Date.now(),
      });

      // Stats
      const statsSnap = await db.ref('drea/stats').once('value');
      const stats = statsSnap.val() || {};
      await fbUpdate('drea/stats', {
        totalGymDays: (stats.totalGymDays || 0) + 1,
        lastWorkoutDate: key,
      });

      // PR detection (Epley)
      const newPRs = [];
      for (const ex of valid) {
        const best1RM = Math.max(...ex.sets.map(s => epley(s.weight, s.reps)));
        if (best1RM <= 0) continue;
        const prKey  = fbSafeKey(ex.name);
        const prSnap = await db.ref(`drea/personalRecords/${prKey}`).once('value');
        const prev   = prSnap.val();
        if (!prev || best1RM > (prev.est1rm || 0)) {
          const bestSet = ex.sets.reduce((b, s) => epley(s.weight,s.reps) > epley(b.weight,b.reps) ? s : b);
          await fbSet(`drea/personalRecords/${prKey}`, {
            name: ex.name, weight: bestSet.weight, reps: bestSet.reps, est1rm: best1RM, date: key,
          });
          newPRs.push({ name: ex.name, weight: bestSet.weight, reps: bestSet.reps, est1rm: best1RM });
        }
      }

      // Auto-add any new exercise names to the library
      const namesSnap = await db.ref('drea/exerciseNames').once('value');
      const existing  = new Set(namesSnap.val() ? Object.values(namesSnap.val()).map(n=>n.toLowerCase()) : []);
      for (const ex of valid) {
        if (!existing.has(ex.name.toLowerCase())) await fbPush('drea/exerciseNames', ex.name);
      }

      return { newPRs, totalVolume, duration };
    }

    // ─────────────────────────────────────────────────────────────────────────
    // useRestTimer hook
    // ─────────────────────────────────────────────────────────────────────────

    function useRestTimer() {
      const [timeLeft, setTimeLeft]     = useState(0);
      const [isResting, setIsResting]   = useState(false);
      const [done, setDone]             = useState(false);
      const [defaultDur, setDefaultDur] = useState(90);
      const intervalRef                 = useRef(null);
      const doneTimerRef                = useRef(null);

      const stopTimer = useCallback(() => {
        clearInterval(intervalRef.current);
        clearTimeout(doneTimerRef.current);
        setIsResting(false); setTimeLeft(0); setDone(false);
      }, []);

      const startTimer = useCallback((dur) => {
        clearInterval(intervalRef.current);
        clearTimeout(doneTimerRef.current);
        const d = dur !== undefined ? dur : defaultDur;
        setDefaultDur(d); setDone(false); setTimeLeft(d); setIsResting(true);
        intervalRef.current = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(intervalRef.current);
              setIsResting(false); setDone(true);
              navigator.vibrate && navigator.vibrate(200);
              doneTimerRef.current = setTimeout(() => setDone(false), 2200);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      }, [defaultDur]);

      useEffect(() => () => {
        clearInterval(intervalRef.current);
        clearTimeout(doneTimerRef.current);
      }, []);

      const progress = isResting && defaultDur > 0 ? timeLeft / defaultDur : done ? 0 : 1;
      return { timeLeft, isResting, done, progress, defaultDur, startTimer, stopTimer };
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Elapsed-time hook
    // ─────────────────────────────────────────────────────────────────────────

    function useElapsedMinutes(startTime) {
      const [elapsed, setElapsed] = useState(0);
      useEffect(() => {
        if (!startTime) return;
        const tick = () => setElapsed(Math.floor((Date.now()-startTime)/60000));
        tick();
        const id = setInterval(tick, 15000);
        return () => clearInterval(id);
      }, [startTime]);
      return elapsed;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // useVoiceInput — Web Speech API for hands-free set entry ("185 8")
    // ─────────────────────────────────────────────────────────────────────────

    function useVoiceInput(onResult) {
      const [isListening, setIsListening]         = useState(false);
      const [listeningForId, setListeningForId]   = useState(null);
      const recogRef    = useRef(null);
      const callbackRef = useRef(onResult);
      useEffect(() => { callbackRef.current = onResult; });
      const supported = typeof window !== 'undefined' &&
        !!(window.SpeechRecognition || window.webkitSpeechRecognition);

      const startListening = useCallback((id) => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        recogRef.current?.stop();
        const r = new SR();
        r.continuous = false; r.interimResults = false; r.lang = 'en-US';
        r.onresult = (e) => {
          const text = e.results[0][0].transcript.trim();
          const nums = text.match(/\d+(\.\d+)?/g);
          if (nums && nums.length >= 2)      callbackRef.current(id, { weight: nums[0], reps: nums[1] });
          else if (nums && nums.length === 1) callbackRef.current(id, { weight: nums[0], reps: null });
          setIsListening(false); setListeningForId(null);
        };
        r.onerror = () => { setIsListening(false); setListeningForId(null); };
        r.onend   = () => { setIsListening(false); setListeningForId(null); };
        recogRef.current = r; r.start();
        setIsListening(true); setListeningForId(id);
        navigator.vibrate && navigator.vibrate(15);
      }, []);

      const stopListening = useCallback(() => {
        recogRef.current?.stop();
        setIsListening(false); setListeningForId(null);
      }, []);

      useEffect(() => () => recogRef.current?.stop(), []);
      return { isListening, listeningForId, startListening, stopListening, supported };
    }

    // Share workout card — canvas → PNG → Web Share API
    // ─────────────────────────────────────────────────────────────────────────

    function generateWorkoutShareImage(workout, dateKey, splitLabel) {
      const canvas = document.createElement('canvas');
      const S = 390;
      canvas.width = S; canvas.height = S;
      const ctx = canvas.getContext('2d');
      const sans = '-apple-system, BlinkMacSystemFont, sans-serif';

      // Background
      ctx.fillStyle = '#0f0f0f'; ctx.fillRect(0, 0, S, S);

      // Card (rounded rect)
      ctx.fillStyle = '#1a1a1a';
      const R = 20, m = 20;
      ctx.beginPath();
      ctx.moveTo(m+R, m); ctx.lineTo(S-m-R, m);
      ctx.arcTo(S-m, m, S-m, m+R, R); ctx.lineTo(S-m, S-m-R);
      ctx.arcTo(S-m, S-m, S-m-R, S-m, R); ctx.lineTo(m+R, S-m);
      ctx.arcTo(m, S-m, m, S-m-R, R); ctx.lineTo(m, m+R);
      ctx.arcTo(m, m, m+R, m, R); ctx.closePath();
      ctx.fill();

      // Brand
      ctx.fillStyle = '#D4A574'; ctx.font = `700 13px ${sans}`;
      ctx.fillText('DREA', 40, 56);

      // Split + date
      ctx.fillStyle = '#8A8680'; ctx.font = `500 13px ${sans}`;
      ctx.fillText(splitLabel, 40, 76);
      ctx.fillStyle = '#4A4744'; ctx.font = `400 12px ${sans}`;
      ctx.fillText(formatDate(dateKey), 40, 94);

      // Divider
      ctx.strokeStyle = '#262626'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(40, 108); ctx.lineTo(S-40, 108); ctx.stroke();

      // Volume
      const vol = (workout.totalVolume || 0).toLocaleString();
      ctx.fillStyle = '#F0EDE8'; ctx.font = `700 50px ${sans}`;
      ctx.fillText(vol, 40, 172);
      ctx.fillStyle = '#8A8680'; ctx.font = `500 13px ${sans}`;
      ctx.fillText('lbs total volume', 40, 192);
      ctx.fillStyle = '#4A4744'; ctx.font = `400 12px ${sans}`;
      ctx.fillText(`${workout.duration || 0} minutes`, 40, 210);

      // Exercise list
      ctx.strokeStyle = '#262626'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(40, 226); ctx.lineTo(S-40, 226); ctx.stroke();
      const exs = workout.exercises
        ? Object.values(workout.exercises).filter(e => e.name).slice(0, 7)
        : [];
      exs.forEach((ex, i) => {
        const sets = ex.sets ? Object.values(ex.sets).filter(s => s.weight && s.reps) : [];
        const best = sets.length
          ? sets.reduce((b, s) => parseFloat(s.weight) > parseFloat(b.weight) ? s : b)
          : null;
        const detail = best ? `  ·  ${best.weight} × ${best.reps}` : '';
        ctx.fillStyle = i === 0 ? '#D4A574' : '#8A8680';
        ctx.font = `${i === 0 ? 600 : 400} 12px ${sans}`;
        ctx.fillText((ex.name + detail).slice(0, 46), 40, 244 + i * 18);
      });

      // Footer
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(40, S-46); ctx.lineTo(S-40, S-46); ctx.stroke();
      ctx.fillStyle = '#3a3a3a'; ctx.font = `400 11px ${sans}`;
      ctx.fillText('Logged with Drea', 40, S-26);

      return canvas.toDataURL('image/png');
    }

    function exportWorkoutsCSV(workoutsData, allSplits) {
      if (!workoutsData) return;
      const splits = allSplits || SPLITS;
      const rows = [['Date','Split','Exercise','Set','Weight (lbs)','Reps','Volume (lbs)','Duration (min)','Notes']];
      Object.entries(workoutsData).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, w]) => {
        const splitLabel = splits.find(s => s.id === w.split)?.label || w.split || 'Free Workout';
        const exs = w.exercises ? Object.keys(w.exercises).sort().map(k => w.exercises[k]) : [];
        if (!exs.length) {
          rows.push([date, splitLabel, '', '', '', '', '', w.duration||'', w.notes||'']);
          return;
        }
        exs.forEach(ex => {
          const sets = ex.sets ? Object.keys(ex.sets).sort().map(k => ex.sets[k]) : [];
          if (!sets.length) {
            rows.push([date, splitLabel, ex.name||'', '', '', '', '', w.duration||'', w.notes||'']);
            return;
          }
          sets.forEach((s, i) => {
            const vol = (parseFloat(s.weight)||0) * (parseInt(s.reps)||0);
            rows.push([
              date, splitLabel, ex.name||'', i+1,
              s.weight||'', s.reps||'', vol||'',
              i===0 ? w.duration||'' : '',
              i===0 ? (w.notes||'').replace(/\n/g,' ') : '',
            ]);
          });
        });
      });
      const csv = rows.map(r =>
        r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')
      ).join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'drea-workouts.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    async function shareWorkoutCard(workout, dateKey, splitLabel) {
      try {
        const dataURL = generateWorkoutShareImage(workout, dateKey, splitLabel);
        if (navigator.share) {
          const blob = await (await fetch(dataURL)).blob();
          const file = new File([blob], `drea-${dateKey}.png`, {type:'image/png'});
          if (navigator.canShare && navigator.canShare({files:[file]})) {
            await navigator.share({files:[file], title:'Workout', text:`${formatDate(dateKey)} — ${(workout.totalVolume||0).toLocaleString()} lbs`});
            return;
          }
          await navigator.share({title:'Workout', text:`${formatDate(dateKey)} — ${splitLabel} — ${(workout.totalVolume||0).toLocaleString()} lbs`});
        } else {
          const a = document.createElement('a');
          a.href = dataURL; a.download = `drea-${dateKey}.png`; a.click();
        }
      } catch(err) { if (err.name !== 'AbortError') console.warn('Share error:', err); }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // ProgressionChart — SVG line chart (est. 1RM over time)
    // ─────────────────────────────────────────────────────────────────────────

    function ProgressionChart({ data }) {
      if (!data || data.length < 2) return (
        <div style={{height:120,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:13,color:'#4A4744'}}>
            {data && data.length===1 ? 'Log one more session to see your trend.' : 'No data yet.'}
          </span>
        </div>
      );
      const W=320, H=150, PL=46, PR=12, PT=12, PB=28;
      const plotW=W-PL-PR, plotH=H-PT-PB;
      const timestamps = data.map(d => new Date(d.date+'T12:00:00').getTime());
      const yVals = data.map(d => d.est1rm);
      const tMin=Math.min(...timestamps), tMax=Math.max(...timestamps);
      const yMin=Math.min(...yVals), yMax=Math.max(...yVals);
      const tRange=tMax-tMin||1;
      const yPad = Math.max(5, Math.round((yMax-yMin)*0.18)) || 10;
      const yLow=yMin-yPad, yHigh=yMax+yPad, yRange=yHigh-yLow;
      const toX = t => PL + ((t-tMin)/tRange)*plotW;
      const toY = v => PT + ((yHigh-v)/yRange)*plotH;
      const pts = data.map((d,i) => ({ x:toX(timestamps[i]), y:toY(d.est1rm), ...d }));
      const linePath = pts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const areaPath = linePath
        + ` L${pts[pts.length-1].x.toFixed(1)},${(PT+plotH).toFixed(1)}`
        + ` L${PL},${(PT+plotH).toFixed(1)} Z`;
      const yGridVals = [0.25,0.5,0.75].map(f => Math.round(yLow+f*yRange));
      const xLabelIdxs = data.length<=3
        ? data.map((_,i)=>i)
        : [0,Math.floor((data.length-1)/2),data.length-1];
      const xLabelPts = [...new Set(xLabelIdxs)].map(i => pts[i]);
      const dateShort = key => new Date(key+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          {yGridVals.map((v,i) => {
            const gy = toY(v);
            return (
              <g key={i}>
                <line x1={PL} y1={gy.toFixed(1)} x2={W-PR} y2={gy.toFixed(1)} stroke="#262626" strokeWidth="1"/>
                <text x={PL-6} y={(gy+3.5).toFixed(1)} textAnchor="end" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{v}</text>
              </g>
            );
          })}
          <path d={areaPath} fill="rgba(212,165,116,0.07)"/>
          <path d={linePath} fill="none" stroke="#D4A574" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {pts.map((p,i) => <circle key={i} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r="3.5" fill="#D4A574"/>)}
          {xLabelPts.map((p,i) => (
            <text key={i} x={p.x.toFixed(1)} y={H-4}
              textAnchor={i===0?'start':i===xLabelPts.length-1?'end':'middle'}
              fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">
              {dateShort(p.date)}
            </text>
          ))}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // WeeklyVolumeChart — SVG bar chart (last 8 weeks)
    // ─────────────────────────────────────────────────────────────────────────

    function WeeklyVolumeChart({ weeklyData }) {
      const maxVol = Math.max(...weeklyData.map(w => w.volume), 1);
      const W=320, H=120, PL=4, PR=4, PT=8, PB=28;
      const plotW=W-PL-PR, plotH=H-PT-PB;
      const n=weeklyData.length;
      const barW=plotW/n;
      const barGap=3;
      const actualBarW=barW-barGap;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          {weeklyData.map((wk,i) => {
            const bh = Math.max(wk.volume>0?3:0, (wk.volume/maxVol)*plotH);
            const bx = PL + i*barW + barGap/2;
            const by = PT + plotH - bh;
            const cx = bx + actualBarW/2;
            return (
              <g key={i}>
                <rect x={bx.toFixed(1)} y={by.toFixed(1)} width={actualBarW.toFixed(1)} height={bh.toFixed(1)} rx="3" fill={wk.volume>0?'#D4A574':'#222'}/>
                <text x={cx.toFixed(1)} y={H-8} textAnchor="middle" fill="#4A4744" fontSize="8" fontFamily="-apple-system,sans-serif">{wk.label}</text>
              </g>
            );
          })}
        </svg>
      );
    }

                <span style={{fontSize:12,color:'#8A8680'}}>{splitLabel}</span>
                <span style={{fontSize:12,color:'#8A8680'}}>
                  <span className="tabular" style={{color:'#D4A574',fontWeight:600}}>{exs.length}</span> exercises
                </span>
                <span style={{fontSize:12,color:'#8A8680'}}>
                  <span className="tabular" style={{color:'#D4A574',fontWeight:600}}>{workout.duration||0}</span>m
                </span>
                <span style={{fontSize:12,color:'#8A8680'}}>
                  <span className="tabular" style={{color:'#D4A574',fontWeight:600}}>{(workout.totalVolume||0).toLocaleString()}</span> lbs
                </span>
              </div>
            </div>
            <div style={{color:'#4A4744',transition:'transform 0.2s',
              transform:exp?'rotate(180deg)':'rotate(0deg)',flexShrink:0}}>
              <IconChevronDown size={16} color="currentColor"/>
            </div>
          </button>
          {exp && (
            <div style={{borderTop:'1px solid #262626',padding:'12px 16px 14px'}}>
              {exs.map((ex,i) => {
                const sets = ex.sets ? Object.keys(ex.sets).sort().map(k => ex.sets[k]) : [];
                const isSS = ex.supersetGroup != null;
                return (
                  <div key={i} style={{marginBottom:i<exs.length-1?12:0,
                    paddingLeft: isSS ? 8 : 0,
                    borderLeft: isSS ? '2px solid rgba(212,165,116,0.35)' : 'none'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:600,color:'#D4A574'}}>{ex.name}</span>
                      {isSS && <span style={{fontSize:9,fontWeight:700,color:'#D4A574',
                        background:'rgba(212,165,116,0.12)',border:'1px solid rgba(212,165,116,0.25)',
                        borderRadius:4,padding:'1px 5px',letterSpacing:'0.04em'}}>SS</span>}
                    </div>
                    {sets.map((s,j) => (
                      <div key={j} style={{fontSize:12,color:'#8A8680',paddingLeft:8,
                        fontVariantNumeric:'tabular-nums',lineHeight:1.8}}>
                        Set {j+1}: {s.weight} lbs × {s.reps} reps
                      </div>
                    ))}
                  </div>
                );
              })}
              {workout.notes && (
                <p style={{fontSize:12,color:'#8A8680',fontStyle:'italic',marginTop:10,
                  paddingTop:10,borderTop:'1px solid #262626',lineHeight:1.5}}>{workout.notes}</p>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // PlateCalcSheet — slide-up plate calculator
    // ─────────────────────────────────────────────────────────────────────────

    function PlateCalcSheet({ initialWeight, onClose }) {
      const [weight, setWeight] = useState(initialWeight ? String(Math.round(initialWeight)) : '');
      const [barLbs, setBarLbs] = useState(45);

      const PRESETS = [95, 115, 135, 155, 185, 205, 225, 245, 275, 315, 365];
      const PLATE_COLORS = {45:'#4a4744',35:'#5a3f3f',25:'#3f4f5a',10:'#3a4a3a',5:'#5a4a3a',2.5:'#333'};
      // Widths (px) for visual barbell: proportional to plate thickness
      const PLATE_W = {45:14,35:11,25:9,10:6,5:5,2.5:4};
      // Heights (half-height above/below bar center) proportional to plate size
      const PLATE_H = {45:40,35:36,25:30,10:24,5:20,2.5:17};

      const result = useMemo(() => {
        const w = parseFloat(weight);
        if (!w || isNaN(w)) return null;
        return calcPlates(w, barLbs);
      }, [weight, barLbs]);

      // Build flat plate list for SVG (each plate repeated count times)
      const flatPlates = result
        ? result.plates.flatMap(p => Array(p.count).fill(p.weight))
        : [];

      // SVG dimensions
      const SH = 90; // SVG height
      const centerY = SH / 2;
      const barY = centerY - 3;
      const barH = 6;
      const SVG_W = 300;
      const barX1 = 20, barX2 = SVG_W - 20; // full bar
      const sleeveW = 18; // left/right stub
      const collarX_L = barX1 + sleeveW; // plates start here (left side)
      const collarX_R = barX2 - sleeveW; // right collar

      // Left plates: stack from collarX_L outward (left)
      let leftCursor = collarX_L;
      const leftPlateRects = flatPlates.map(p => {
        const pw = PLATE_W[p] || 6;
        const x = leftCursor - pw;
        leftCursor = x;
        return { x, p };
      });

      // Right plates: mirror (stack from collarX_R outward right)
      let rightCursor = collarX_R;
      const rightPlateRects = flatPlates.map(p => {
        const pw = PLATE_W[p] || 6;
        const x = rightCursor;
        rightCursor += pw;
        return { x, p };
      });

      const inputStyle = {
        background:'#1a1a1a',border:'1px solid #2e2e2e',borderRadius:11,
        padding:'12px 16px',color:'#F0EDE8',fontSize:22,fontWeight:700,
        outline:'none',fontVariantNumeric:'tabular-nums',width:'100%',
        textAlign:'center',transition:'border-color 0.15s',fontFamily:'inherit',
      };

      return (
        <div style={{position:'fixed',inset:0,zIndex:100,background:'rgba(0,0,0,0.7)',
          display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
          <div className="slide-up" style={{width:'100%',maxWidth:480,
            background:'#111',borderRadius:'20px 20px 0 0',borderTop:'1px solid #222',
            paddingBottom:'calc(20px + env(safe-area-inset-bottom, 0px))'}}>

            {/* Handle + header */}
            <div style={{padding:'10px 20px 14px',borderBottom:'1px solid #1e1e1e'}}>
              <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
                <div style={{width:36,height:4,borderRadius:2,background:'#2e2e2e'}}/>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <h2 style={{fontSize:16,fontWeight:700,color:'#F0EDE8'}}>Plate Calculator</h2>
                <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',
                  color:'#8A8680',padding:4}}>
                  <IconX size={16} color="currentColor"/>
                </button>
              </div>
            </div>

            <div style={{padding:'18px 20px'}}>
              {/* Weight input */}
              <input type="number" inputMode="decimal" value={weight}
                onChange={e => setWeight(e.target.value)} placeholder="225"
                style={inputStyle}
                onFocus={e => e.target.style.borderColor='#D4A574'}
                onBlur={e => e.target.style.borderColor='#2e2e2e'}
              />
              <div style={{textAlign:'center',fontSize:11,color:'#4A4744',marginTop:4}}>lbs target weight</div>

              {/* Barbell toggle */}
              <div style={{display:'flex',justifyContent:'center',marginTop:14,gap:6}}>
                {[[45,'Olympic (45 lbs)'],[35,"Women's (35 lbs)"]].map(([w,label]) => (
                  <button key={w} onClick={() => setBarLbs(w)} style={{
                    padding:'6px 14px',borderRadius:20,cursor:'pointer',
                    fontSize:11,fontWeight:600,transition:'all 0.15s',
                    background: barLbs===w ? 'rgba(212,165,116,0.15)' : '#1e1e1e',
                    color: barLbs===w ? '#D4A574' : '#4A4744',
                    border: `1px solid ${barLbs===w ? 'rgba(212,165,116,0.35)' : '#2a2a2a'}`,
                  }}>{label}</button>
                ))}
              </div>

              {/* Preset buttons */}
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:16,justifyContent:'center'}}>
                {PRESETS.map(p => (
                  <button key={p} onClick={() => setWeight(String(p))} style={{
                    padding:'5px 11px',borderRadius:8,border:'1px solid #2e2e2e',
                    background:weight===String(p)?'rgba(212,165,116,0.12)':'transparent',
                    color:weight===String(p)?'#D4A574':'#8A8680',
                    fontSize:12,fontWeight:500,cursor:'pointer',transition:'all 0.15s',
                  }}>{p}</button>
                ))}
              </div>

              {/* Result */}
              {result && (
                <div style={{marginTop:20}}>
                  {/* Plate list text */}
                  <div style={{textAlign:'center',marginBottom:12}}>
                    {result.plates.length === 0 ? (
                      <span style={{fontSize:13,color:'#8A8680'}}>Bar only ({barLbs} lbs)</span>
                    ) : (
                      <>
                        <div style={{fontSize:13,color:'#8A8680',marginBottom:4}}>Each side:</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center'}}>
                          {result.plates.map(({weight:pw, count}) =>
                            Array(count).fill(pw).map((p, i) => (
                              <div key={`${pw}-${i}`} style={{
                                padding:'4px 11px',borderRadius:8,
                                background: PLATE_COLORS[p] || '#333',
                                border:'1px solid rgba(255,255,255,0.06)',
                                fontSize:13,fontWeight:700,
                                color:p>=25?'#F0EDE8':'#D4A574',
                                fontVariantNumeric:'tabular-nums',
                              }}>{p}</div>
                            ))
                          )}
                        </div>
                        <div style={{fontSize:20,fontWeight:700,color:result.exact?'#D4A574':'#C47070',
                          fontVariantNumeric:'tabular-nums',marginTop:10}}>
                          {result.exact ? `= ${result.achievable} lbs ✓` : `≈ ${result.achievable} lbs`}
                        </div>
                        {!result.exact && (
                          <div style={{fontSize:11,color:'#4A4744',marginTop:2}}>
                            Closest achievable with standard plates
                          </div>
                        )}
                      </>
                    )}
                  </div>

                  {/* Visual barbell */}
                  {result.plates.length > 0 && (
                    <svg viewBox={`0 0 ${SVG_W} ${SH}`} width="100%" style={{display:'block',marginTop:4}}>
                      {/* Bar */}
                      <rect x={barX1} y={barY} width={barX2-barX1} height={barH} rx="3" fill="#3a3a3a"/>
                      {/* Sleeves (thicker ends) */}
                      <rect x={barX1} y={centerY-8} width={sleeveW} height={16} rx="2" fill="#4a4744"/>
                      <rect x={barX2-sleeveW} y={centerY-8} width={sleeveW} height={16} rx="2" fill="#4a4744"/>
                      {/* Left plates */}
                      {leftPlateRects.map(({x, p}, i) => {
                        const ph = PLATE_H[p] || 20;
                        const pw = PLATE_W[p] || 6;
                        return (
                          <g key={`l${i}`}>
                            <rect x={x} y={centerY-ph} width={pw} height={ph*2} rx="2"
                              fill={PLATE_COLORS[p]||'#333'} stroke="rgba(255,255,255,0.06)" strokeWidth="0.5"/>
                          </g>
                        );
                      })}
                      {/* Right plates */}
                      {rightPlateRects.map(({x, p}, i) => {
                        const ph = PLATE_H[p] || 20;
                        const pw = PLATE_W[p] || 6;
                        return (
                          <g key={`r${i}`}>
                            <rect x={x} y={centerY-ph} width={pw} height={ph*2} rx="2"
                              fill={PLATE_COLORS[p]||'#333'} stroke="rgba(255,255,255,0.06)" strokeWidth="0.5"/>
                          </g>
                        );
                      })}
                    </svg>
                  )}
                </div>
              )}

              {/* Empty state */}
              {!result && weight && parseFloat(weight) <= barLbs && (
                <div style={{textAlign:'center',marginTop:16,fontSize:13,color:'#4A4744'}}>
                  Enter a weight above {barLbs} lbs
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // RestTimer — circular SVG countdown shown inline during active workout
    // ─────────────────────────────────────────────────────────────────────────

    function RestTimer({ timeLeft, isResting, done, progress, defaultDur, onStart, onStop, onDismiss }) {
      // Auto-dismiss after "Rest done!" finishes
      useEffect(() => {
        if (done) { const t = setTimeout(onDismiss, 2200); return () => clearTimeout(t); }
      }, [done]);

      const SZ=58, R=24;
      const circ = +(2*Math.PI*R).toFixed(2);
      const offset = (circ*(1-Math.max(0,Math.min(1,progress)))).toFixed(2);
      const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
      const PRESETS = [{l:'60s',v:60},{l:'90s',v:90},{l:'2m',v:120},{l:'3m',v:180}];

      return (
        <div className="fade-in" style={{background:'#161616',border:'1px solid #222',
          borderRadius:14,padding:'12px 14px',marginBottom:10,
          display:'flex',alignItems:'center',gap:14}}>

          {/* Circular ring */}
          <div style={{position:'relative',width:SZ,height:SZ,flexShrink:0}}>
            <svg width={SZ} height={SZ} viewBox={`0 0 ${SZ} ${SZ}`}
              style={{transform:'rotate(-90deg)',display:'block'}}>
              <circle cx={SZ/2} cy={SZ/2} r={R} fill="none" stroke="#262626" strokeWidth="3"/>
              <circle cx={SZ/2} cy={SZ/2} r={R} fill="none"
                stroke={done?'#7A9E7E':'#D4A574'} strokeWidth="3.5"
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
                style={{transition: isResting ? 'stroke-dashoffset 0.95s linear' : 'none'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
              justifyContent:'center',textAlign:'center'}}>
              {done
                ? <span style={{fontSize:9,fontWeight:700,color:'#7A9E7E',lineHeight:1.35}}>Rest<br/>done!</span>
                : <span className="tabular" style={{fontSize:12,fontWeight:700,
                    color:isResting?'#F0EDE8':'#4A4744'}}>
                    {fmt(isResting ? timeLeft : defaultDur)}
                  </span>
              }
            </div>
          </div>

          {/* Presets + action */}
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:5,marginBottom:8}}>
              {PRESETS.map(p => (
                <button key={p.v} onClick={() => onStart(p.v)} className="press-scale" style={{
                  padding:'4px 9px',borderRadius:20,border:'none',cursor:'pointer',
                  fontSize:11,fontWeight:600,background:'#242424',color:'#8A8680',
                  transition:'all 0.15s',
                }}
                onMouseEnter={e=>{e.currentTarget.style.background='rgba(212,165,116,0.15)';e.currentTarget.style.color='#D4A574';}}
                onMouseLeave={e=>{e.currentTarget.style.background='#242424';e.currentTarget.style.color='#8A8680';}}>
                  {p.l}
                </button>
              ))}
            </div>
            {isResting ? (
              <button onClick={onStop} style={{padding:'6px 14px',borderRadius:8,
                border:'1px solid #2e2e2e',background:'transparent',
                color:'#8A8680',fontSize:12,fontWeight:600,cursor:'pointer'}}>Stop</button>
            ) : !done && (
              <button onClick={() => onStart()} style={{padding:'6px 14px',borderRadius:8,
                border:'none',background:'rgba(212,165,116,0.15)',
                color:'#D4A574',fontSize:12,fontWeight:600,cursor:'pointer'}}>Start</button>
            )}
          </div>

          {/* Dismiss */}
          <button onClick={onDismiss} style={{background:'none',border:'none',cursor:'pointer',
            color:'#3a3a3a',padding:6,alignSelf:'flex-start',display:'flex',alignItems:'center',
            transition:'color 0.15s'}}
            onMouseEnter={e=>e.currentTarget.style.color='#8A8680'}
            onMouseLeave={e=>e.currentTarget.style.color='#3a3a3a'}>
            <IconX size={13} color="currentColor"/>
          </button>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Split picker — Step 1
    // ─────────────────────────────────────────────────────────────────────────

    function SplitPickerStep1({ onSelect, onCancel, allSplits, onCreateSplit, onDeleteCustomSplit, allTemplates, onUseTemplate }) {
      const FREE = { id:'free', label:'Free Workout', muscles:[] };
      const splits = allSplits || SPLITS;
      const defaultSplits = splits.filter(s => !s.custom);
      const customSplits  = splits.filter(s => s.custom);
      const templates = allTemplates || [];

      return (
        <div className="fade-in" style={{padding:'20px 20px 32px'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:700,color:'#F0EDE8',lineHeight:1.2}}>What are you training?</h2>
              <p style={{fontSize:13,color:'#8A8680',marginTop:4}}>Pick a split for exercise suggestions.</p>
            </div>
            <button onClick={onCancel} style={{background:'none',border:'none',color:'#8A8680',fontSize:14,cursor:'pointer',paddingTop:2}}>Cancel</button>
          </div>

          {/* Quick-start templates */}
          {templates.length > 0 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:600,color:'#4A4744',letterSpacing:'0.07em',
                textTransform:'uppercase',marginBottom:10}}>Quick Start</div>
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {templates.map(t => {
                  const splitLabel = splits.find(s=>s.id===t.split)?.label||'Workout';
                  return (
                    <button key={t.fbKey}
                      onClick={()=>{navigator.vibrate&&navigator.vibrate(10);onUseTemplate&&onUseTemplate(t);}}
                      className="press-scale"
                      style={{background:'rgba(212,165,116,0.06)',
                        border:'1px solid rgba(212,165,116,0.2)',borderRadius:14,
                        padding:'13px 16px',display:'flex',alignItems:'center',gap:14,
                        cursor:'pointer',textAlign:'left',width:'100%',transition:'border-color 0.15s'}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(212,165,116,0.45)'}
                      onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(212,165,116,0.2)'}>
                      <div style={{width:34,height:34,borderRadius:9,
                        background:'rgba(212,165,116,0.1)',
                        display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#D4A574" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:600,color:'#D4A574'}}>{t.name}</div>
                        <div style={{fontSize:11,color:'#8A8680',marginTop:2}}>
                          {splitLabel} · {(t.exercises||[]).slice(0,3).join(', ')}{(t.exercises||[]).length>3?` +${(t.exercises||[]).length-3}`:''}
                        </div>
                      </div>
                      <IconChevronRight size={14} color="#D4A574"/>
                    </button>
                  );
                })}
              </div>
              <div style={{marginTop:16,marginBottom:4,borderTop:'1px solid #1e1e1e',paddingTop:16}}>
                <div style={{fontSize:10,fontWeight:600,color:'#4A4744',letterSpacing:'0.07em',
                  textTransform:'uppercase',marginBottom:10}}>Splits</div>
              </div>
            </div>
          )}

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {defaultSplits.map(split => (
              <button key={split.id}
                onClick={()=>{navigator.vibrate&&navigator.vibrate(10);onSelect(split);}}
                className="press-scale"
                style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
                  padding:'15px 18px',display:'flex',alignItems:'center',gap:16,
                  cursor:'pointer',textAlign:'left',width:'100%'}}>
                <SplitIcon id={split.id} size={26} color="#D4A574"/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:600,color:'#F0EDE8'}}>{split.label}</div>
                  <div style={{fontSize:12,color:'#8A8680',marginTop:3}}>{split.defaults.slice(0,3).join(' · ')}</div>
                </div>
                <IconChevronRight size={16} color="#4A4744"/>

            ))}

            {/* Custom splits */}
            {customSplits.length > 0 && (
              <div style={{borderTop:'1px solid #1e1e1e',paddingTop:10,marginTop:2}}>
                <div style={{fontSize:10,fontWeight:600,color:'#4A4744',letterSpacing:'0.07em',
                  textTransform:'uppercase',marginBottom:8,paddingLeft:2}}>My Splits</div>
                {customSplits.map(split => (
                  <div key={split.id} style={{display:'flex',gap:8,marginBottom:8}}>
                    <button onClick={()=>{navigator.vibrate&&navigator.vibrate(10);onSelect(split);}}
                      className="press-scale"
                      style={{flex:1,background:'rgba(212,165,116,0.05)',
                        border:'1px solid rgba(212,165,116,0.2)',borderRadius:14,
                        padding:'13px 16px',display:'flex',alignItems:'center',gap:14,

                        <div style={{fontSize:11,color:'#8A8680',marginTop:2}}>
                          {split.muscles.join(', ') || 'Custom'}

                      </div>
                      <IconChevronRight size={15} color="#4A4744"/>

                    {onDeleteCustomSplit && (
                      <button onClick={(e)=>{e.stopPropagation();

    const IconMic = ({size=14,color='currentColor',active=false}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        className={active ? 'pulse' : undefined}>
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>

    function SetRow({ setNum, set, onChange, onRemove, autoFocusWeight, isFlashing, onVoiceInput, isVoiceListening }) {
      const weightRef = useRef(null);

        background:'#242424',border:'1px solid #2e2e2e',borderRadius:8,
        color:'#F0EDE8',fontSize:16,fontWeight:600,outline:'none',
        textAlign:'center',minHeight:44,padding:'0 4px',

        <div style={{
          display:'flex',alignItems:'center',gap:8,marginBottom:6,
          borderRadius:8,padding:'2px 0',
          transition:'background 0.3s',

          <span style={{color: isFlashing ? '#7A9E7E' : '#4A4744',fontSize:12,fontWeight:500,width:22,textAlign:'right',flexShrink:0,transition:'color 0.3s'}}>{setNum}</span>

          <input type="number" inputMode="numeric" min="0"

    function OverloadHint({ exerciseName, lastSessionMap, onApply }) {

    function ExerciseBlock({ exercise, onUpdate, onRemove, onSetComplete, exerciseNames, lastWeightMap, lastSessionMap, inSuperset }) {
      const [newSetId, setNewSetId]         = useState(null);
      const [flashSetId, setFlashSetId]     = useState(null);
      const [plateCalcOpen, setPlateCalcOpen] = useState(false);
      const flashTimer                      = useRef(null);
      const onUpdateRef                 = useRef(onUpdate);
      const exerciseRef                 = useRef(exercise);
      useEffect(() => { onUpdateRef.current = onUpdate; exerciseRef.current = exercise; });

      const { listeningForId, startListening, supported: voiceSupported } = useVoiceInput(
        useCallback((setId, { weight, reps }) => {
          const ex = exerciseRef.current;
          onUpdateRef.current({
            ...ex,
            sets: ex.sets.map(s => s.id !== setId ? s : {
              ...s,
              ...(weight !== null ? {weight} : {}),
              ...(reps   !== null ? {reps}   : {}),
            }),
          });
        }, [])
      );
      const exVolume = useMemo(() =>
        exercise.sets.reduce((sum,s)=>sum+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),
        [exercise.sets]);

      const handleSetChange = (setId, field, val) => {
        const updated = exercise.sets.map(s => s.id===setId ? {...s,[field]:val} : s);
        if (field==='reps') {
          const s = updated.find(x=>x.id===setId);
          if (parseInt(val)>0 && parseFloat(s.weight)>0) {
            onSetComplete && onSetComplete(exercise.id);
            // Brief green flash on completed set row
            clearTimeout(flashTimer.current);
            setFlashSetId(setId);
            flashTimer.current = setTimeout(() => setFlashSetId(null), 700);
          }
        }
        onUpdate({...exercise, sets:updated});
      };

      useEffect(() => () => clearTimeout(flashTimer.current), []);

      const handleAddSet = () => {
        const last = exercise.sets[exercise.sets.length-1];
        const w = last ? last.weight : (lastWeightMap[exercise.name] ? String(lastWeightMap[exercise.name]) : '');
        const id = `set_${uid()}`; setNewSetId(id);
        onUpdate({...exercise, sets:[...exercise.sets,{id,weight:w,reps:''}]});
      };
      return (
        <>
          <div style={{background:'#1a1a1a',
            border: inSuperset ? '1px solid rgba(212,165,116,0.35)' : '1px solid #262626',
            borderLeft: inSuperset ? '3px solid rgba(212,165,116,0.6)' : undefined,
            borderRadius:14,padding:'14px 14px 12px',marginBottom:4}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
                <ExerciseInput value={exercise.name}
                  onChange={name=>onUpdate({...exercise,name})}
                  exerciseNames={exerciseNames} placeholder="Exercise name..."/>
                {inSuperset && (
                  <div style={{flexShrink:0,padding:'2px 7px',borderRadius:6,
                    background:'rgba(212,165,116,0.12)',border:'1px solid rgba(212,165,116,0.3)',
                    fontSize:10,fontWeight:700,color:'#D4A574',letterSpacing:'0.04em'}}>SS</div>
                )}
              </div>
              <button onClick={onRemove}
                aria-label={`Remove ${exercise.name || 'exercise'}`}
                style={{background:'#242424',border:'1px solid #2e2e2e',borderRadius:9,
                  color:'#8A8680',cursor:'pointer',padding:'0 10px',display:'flex',
                  alignItems:'center',flexShrink:0,transition:'color 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#C47070'}
                onMouseLeave={e=>e.currentTarget.style.color='#8A8680'}>
                <IconX size={14} color="currentColor"/>
              </button>
            </div>
            {lastSessionMap && (
              <OverloadHint
                exerciseName={exercise.name}
                lastSessionMap={lastSessionMap}
                onApply={() => {
                  const sugg = getOverloadSuggestion(lastSessionMap[exercise.name]);
                  if (!sugg) return;
                  onUpdate({...exercise, sets: exercise.sets.map((s,i) =>
                    i===0 ? {...s, weight:String(sugg.suggestedWeight), reps:String(sugg.suggestedReps)} : s
                  )});
                }}
              />
            )}
            {exercise.sets.map((set,i)=>(
              <SetRow key={set.id} setNum={i+1} set={set}
                onChange={(f,v)=>handleSetChange(set.id,f,v)}
                onRemove={()=>{ if(exercise.sets.length>1) onUpdate({...exercise,sets:exercise.sets.filter(s=>s.id!==set.id)}); }}
                autoFocusWeight={set.id===newSetId}
                isFlashing={set.id===flashSetId}
                onVoiceInput={voiceSupported ? () => startListening(set.id) : undefined}
                isVoiceListening={listeningForId === set.id}
              />
            ))}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6}}>
              <div style={{display:'flex',gap:7}}>
                <button onClick={handleAddSet} className="press-scale"
                  style={{display:'flex',alignItems:'center',gap:6,background:'#242424',
                    border:'1px solid #2e2e2e',borderRadius:8,padding:'7px 12px',
                    color:'#8A8680',fontSize:13,fontWeight:500,cursor:'pointer',
                    transition:'color 0.15s,border-color 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.color='#D4A574';e.currentTarget.style.borderColor='#D4A574';}}
                  onMouseLeave={e=>{e.currentTarget.style.color='#8A8680';e.currentTarget.style.borderColor='#2e2e2e';}}>
                  <IconPlus size={12} color="currentColor"/>Add Set
                </button>
                <button onClick={() => setPlateCalcOpen(true)} className="press-scale"
                  aria-label="Open plate calculator"
                  title="Plate calculator"
                  style={{display:'flex',alignItems:'center',gap:5,background:'#242424',
                    border:'1px solid #2e2e2e',borderRadius:8,padding:'7px 10px',
                    color:'#8A8680',fontSize:12,fontWeight:500,cursor:'pointer',
                    transition:'color 0.15s,border-color 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.color='#D4A574';e.currentTarget.style.borderColor='#D4A574';}}
                  onMouseLeave={e=>{e.currentTarget.style.color='#8A8680';e.currentTarget.style.borderColor='#2e2e2e';}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M6 4v16M18 4v16"/><path d="M4 7h4M16 7h4M4 17h4M16 17h4"/><line x1="8" y1="12" x2="16" y2="12"/>
                  </svg>
                  Plates
                </button>
              </div>
              {exVolume>0&&<span style={{fontSize:12,color:'#4A4744',fontVariantNumeric:'tabular-nums'}}>{exVolume.toLocaleString()} lbs</span>}
            </div>
          </div>
          {plateCalcOpen && (
            <PlateCalcSheet
              initialWeight={exercise.sets.reduce((mx,s) => Math.max(mx, parseFloat(s.weight)||0), 0) || undefined}
              onClose={() => setPlateCalcOpen(false)}
            />
          )}
        </>
      );
    }

    function ActiveWorkoutLogger({ activeWorkout, lastWeightMap, lastSessionMap, exerciseNames, onCancel, onFinish }) {
      const [exercises, setExercises]       = useState(activeWorkout.exercises);
      const [notes, setNotes]               = useState('');
      const [saving, setSaving]             = useState(false);
      const [timerVisible, setTimerVisible] = useState(false);
      const [timerAnchorId, setTimerAnchorId] = useState(null);
      // supersets: Set of "idA|idB" strings (adjacent exercise pairs)
      const [supersets, setSupersets]       = useState(new Set());
      const elapsed = useElapsedMinutes(activeWorkout.startTime);
      const { timeLeft, isResting, done, progress, defaultDur, startTimer, stopTimer } = useRestTimer();

      const totalVolume = useMemo(() =>
        exercises.reduce((sum,ex)=>sum+ex.sets.reduce((s2,s)=>s2+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0),
        [exercises]);

      const isLinked = (idA, idB) => supersets.has(`${idA}|${idB}`) || supersets.has(`${idB}|${idA}`);
      const toggleLink = (idA, idB) => {
        setSupersets(prev => {
          const next = new Set(prev);
          const key1 = `${idA}|${idB}`, key2 = `${idB}|${idA}`;
          if (next.has(key1)) next.delete(key1);
          else if (next.has(key2)) next.delete(key2);
          else next.add(key1);
          return next;
        });
      };
      const exInSuperset = (exId, idx) => {
        const prev = exercises[idx-1], next = exercises[idx+1];
        return (prev && isLinked(prev.id, exId)) || (next && isLinked(exId, next.id));
      };

      const handleSetComplete = (exId) => {
        setTimerAnchorId(exId);
        setTimerVisible(true);
        startTimer(); // default 90s
      };

      const handleFinish = async () => {
        const ok = exercises.some(ex=>ex.name.trim()&&ex.sets.some(s=>(parseFloat(s.weight)||0)>0&&(parseInt(s.reps)||0)>0));
        if (!ok) { alert('Add at least one exercise with a set logged before finishing.'); return; }
        setSaving(true);
        // Annotate supersetGroup on exercises before saving
        const exercisesWithSS = exercises.map((ex, i) => {
          const next = exercises[i+1], prev = exercises[i-1];
          const linkedToNext = next && isLinked(ex.id, next.id);
          const linkedToPrev = prev && isLinked(prev.id, ex.id);
          const groupIdx = linkedToNext ? i : linkedToPrev ? i-1 : null;
          return groupIdx !== null ? {...ex, supersetGroup: groupIdx} : ex;
        });
        try { await onFinish(exercisesWithSS, notes); } finally { setSaving(false); }
      };

      return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',height:'100%'}}>
          <div style={{padding:'14px 20px 12px',borderBottom:'1px solid #1e1e1e',flexShrink:0,
            display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <h2 style={{fontSize:17,fontWeight:700,color:'#F0EDE8'}}>Logging Workout</h2>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div className="pulse" style={{width:7,height:7,borderRadius:'50%',background:'#7A9E7E',flexShrink:0}}/>
              <span className="tabular" style={{fontSize:13,color:'#7A9E7E',fontWeight:600}}>{elapsed}m</span>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'16px 16px 0'}}>
            {exercises.map((ex, idx) => (
              <React.Fragment key={ex.id}>
                <ExerciseBlock exercise={ex}
                  onUpdate={upd=>setExercises(p=>p.map(e=>e.id===upd.id?upd:e))}
                  onRemove={()=>{
                    // clean up any supersets involving this exercise
                    setSupersets(prev => new Set([...prev].filter(k => !k.includes(ex.id))));
                    setExercises(p=>p.length>1?p.filter(e=>e.id!==ex.id):p);
                  }}
                  onSetComplete={handleSetComplete}
                  exerciseNames={exerciseNames} lastWeightMap={lastWeightMap}
                  lastSessionMap={lastSessionMap}
                  inSuperset={exInSuperset(ex.id, idx)}/>
                {timerVisible && timerAnchorId===ex.id && (
                  <RestTimer
                    timeLeft={timeLeft} isResting={isResting} done={done}
                    progress={progress} defaultDur={defaultDur}
                    onStart={startTimer} onStop={stopTimer}
                    onDismiss={() => { stopTimer(); setTimerVisible(false); }}
                  />
                )}
                {/* SupersetLink between consecutive exercise blocks */}
                {idx < exercises.length - 1 && (
                  <SupersetLink
                    linked={isLinked(ex.id, exercises[idx+1].id)}
                    onToggle={() => toggleLink(ex.id, exercises[idx+1].id)}
                  />
                )}

            ))}

    function TodayTab({ exerciseNames, workoutsData, activeWorkout, lastWeightMap, lastSessionMap,

                        todayWorkout, newPRs, onDismissPRs, isFirstTime,
                        allSplits, onCreateSplit, onDeleteCustomSplit,
                        newMilestone, onDismissMilestone,
                        allTemplates, onSaveTemplate, onDeleteTemplate }) {
      const [step, setStep]               = useState('home');
      const [selSplit, setSelSplit]        = useState(null);
      const [pickerEx, setPickerEx]       = useState([]);
      const [showCreateSplit, setShowCS]  = useState(false);
      const [deloadDismissed, setDeloadDismissed] = useState(
        () => localStorage.getItem('drea_deload_dismissed') === '1'
      );
      const freq = useMemo(() => buildExerciseFrequency(workoutsData), [workoutsData]);
      const showDeload = useMemo(
        () => !deloadDismissed && checkDeloadNeeded(workoutsData),
        [deloadDismissed, workoutsData]
      );
      const handleDismissDeload = () => {
        localStorage.setItem('drea_deload_dismissed', '1');
        setDeloadDismissed(true);
      };

      if (activeWorkout) {
        return <ActiveWorkoutLogger activeWorkout={activeWorkout} lastWeightMap={lastWeightMap}
          lastSessionMap={lastSessionMap} exerciseNames={exerciseNames}
          onCancel={onCancelWorkout} onFinish={onFinishWorkout}/>;
      }

      const handleSelectSplit = (split) => {
        setSelSplit(split);
        if (split.id === 'free') { onStartWorkout([], split); }
        else { setPickerEx(getSuggestions(split, freq)); setStep('pick_exercises'); }
      };
      const resetPicker = () => { setStep('home'); setSelSplit(null); setPickerEx([]); };

      const handleUseTemplate = (t) => {
        const splitObj = (allSplits || SPLITS).find(s => s.id === t.split) || { id: t.split, label: t.name, muscles:[], defaults:[] };
        const picked = (t.exercises || []).map(name => ({ name, selected: true }));
        onStartWorkout(picked, splitObj);
      };

      if (showCreateSplit) {
        return <CreateSplitModal
          exerciseNames={exerciseNames}
          onSave={(split) => { onCreateSplit && onCreateSplit(split); setShowCS(false); }}
          onCancel={() => setShowCS(false)}
        />;
      }

      if (step === 'pick_split') {
        return <SplitPickerStep1 onSelect={handleSelectSplit} onCancel={resetPicker}
          allSplits={allSplits}
          onCreateSplit={onCreateSplit ? () => setShowCS(true) : undefined}
          onDeleteCustomSplit={onDeleteCustomSplit}
          allTemplates={allTemplates}
          onUseTemplate={handleUseTemplate}/>;
      }
      if (step === 'pick_exercises' && selSplit) {
        return (
          <SplitPickerStep2
            split={selSplit} exercises={pickerEx}
            onToggle={i=>setPickerEx(p=>p.map((e,j)=>j===i?{...e,selected:!e.selected}:e))}
            onBack={()=>setStep('pick_split')}
            onCancel={resetPicker}
            onStart={()=>onStartWorkout(pickerEx.filter(e=>e.selected),selSplit)}
          />
        );
      }

      return (
        <div className="fade-in">
          <WeeklyStatsRow workoutsData={workoutsData}/>
          {showDeload && <DeloadCard onDismiss={handleDismissDeload}/>}
          {todayWorkout
            ? <TodaySummary workoutKey={todayKey()} workout={todayWorkout}
                newPRs={newPRs} onDismissPRs={onDismissPRs}
                onLogAnother={()=>setStep('pick_split')}
                newMilestone={newMilestone} onDismissMilestone={onDismissMilestone}
                allSplits={allSplits}
                onSaveTemplate={onSaveTemplate}/>
            : <TodayHome onOpenPicker={()=>setStep('pick_split')} isFirstTime={isFirstTime}/>
          }
        </div>
      );
    }
