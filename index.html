    // ─────────────────────────────────────────────────────────────────────────
    // Frequency + suggestion engine
    // ─────────────────────────────────────────────────────────────────────────

    function buildExerciseFrequency(workoutsData) {
      const freq = {};
      if (!workoutsData) return freq;
      Object.values(workoutsData).forEach(w => {
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => {
          if (ex.name) freq[ex.name] = (freq[ex.name] || 0) + 1;
        });
      });
      return freq;
    }

    function getSuggestions(split, frequency) {
      if (split.id === 'free') return [];
      const relevant = Object.entries(EXERCISE_MUSCLE_MAP)
        .filter(([,m]) => m.some(g => split.muscles.includes(g))).map(([n]) => n);
      const byFreq = [...relevant].sort((a,b) => {
        const d = (frequency[b]||0) - (frequency[a]||0);
        return d !== 0 ? d : a.localeCompare(b);
      });
      const seen = new Set(byFreq);
      const merged = [...byFreq];
      split.defaults.forEach(d => { if (!seen.has(d)) merged.push(d); });
      return merged.map(name => ({ name, selected: split.defaults.includes(name) }));
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Last-weight map (for pre-filling sets)
    // ─────────────────────────────────────────────────────────────────────────

    function buildLastWeightMap(workoutsData) {
      const map = {};
      if (!workoutsData) return map;
      // Process dates newest-first so first encounter = most recent
      const dates = Object.keys(workoutsData).sort().reverse();
      dates.forEach(date => {
        const w = workoutsData[date];
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => {
          if (!ex.name || map[ex.name] !== undefined) return;
          if (!ex.sets) return;
          const maxW = Math.max(0, ...Object.values(ex.sets).map(s => parseFloat(s.weight) || 0));
          if (maxW > 0) map[ex.name] = maxW;
        });
      });
      return map;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Firebase helpers
    // ─────────────────────────────────────────────────────────────────────────

    function useFirebase(path) {
      const [data, setData]       = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        if (!path) { setLoading(false); return; }
        const ref = db.ref(path);
        ref.on('value', snap => { setData(snap.val()); setLoading(false); });
        return () => ref.off('value');
      }, [path]);
      return [data, loading];
    }

    const fbSet    = (path, v)   => db.ref(path).set(v);
    const fbUpdate = (path, v)   => db.ref(path).update(v);
    const fbPush   = (path, v)   => db.ref(path).push(v);
    const fbRemove = (path)      => db.ref(path).remove();

    const localGet = (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
    const localSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

    async function seedExerciseNames() {
      const snap = await db.ref('drea/exerciseNames').once('value');
      if (snap.val()) return;
      const upd = {};
      ALL_EXERCISE_NAMES.forEach(n => { upd[db.ref('drea/exerciseNames').push().key] = n; });
      await db.ref('drea/exerciseNames').set(upd);
    }

    function todayKey() { return new Date().toISOString().slice(0, 10); }
    let _uid = 0;
    const uid = () => `${Date.now()}_${++_uid}`;

    // ─────────────────────────────────────────────────────────────────────────
    // Elapsed-time hook
    // ─────────────────────────────────────────────────────────────────────────

    function useElapsedMinutes(startTime) {
      const [elapsed, setElapsed] = useState(0);
      useEffect(() => {
        if (!startTime) return;
        const tick = () => setElapsed(Math.floor((Date.now() - startTime) / 60000));
        tick();
        const id = setInterval(tick, 15000);
        return () => clearInterval(id);
      }, [startTime]);
      return elapsed;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // ExerciseInput — reusable autocomplete
    // ─────────────────────────────────────────────────────────────────────────

    function ExerciseInput({ value, onChange, onSelect, exerciseNames=[], placeholder='Exercise name...' }) {
      const [open, setOpen]   = useState(false);
      const [query, setQuery] = useState(value || '');
      const closeTimer        = useRef(null);

      useEffect(() => { setQuery(value || ''); }, [value]);

      const suggestions = useMemo(() => {
        const q = query.trim().toLowerCase();
        const pool = exerciseNames.length ? exerciseNames : ALL_EXERCISE_NAMES;
        return q ? pool.filter(n => n.toLowerCase().includes(q)).slice(0, 10) : pool.slice(0, 10);
      }, [query, exerciseNames]);

      const handleSelect = (name) => {
        setQuery(name); onChange && onChange(name); onSelect && onSelect(name); setOpen(false);
      };

      return (
        <div style={{ position: 'relative', width: '100%' }}>
          <input type="text" value={query}
            onChange={e => { setQuery(e.target.value); onChange && onChange(e.target.value); setOpen(true); }}
            onFocus={() => { clearTimeout(closeTimer.current); setOpen(true); }}
            onBlur={() => { closeTimer.current = setTimeout(() => setOpen(false), 150); }}
            placeholder={placeholder}
            autoComplete="off" autoCorrect="off" autoCapitalize="words" spellCheck="false"
            style={{ width:'100%', background:'#222', border:'1px solid #2e2e2e', borderRadius:10,
              padding:'9px 13px', color:'#F0EDE8', fontSize:15, fontWeight:500, outline:'none' }}
          />
          {open && suggestions.length > 0 && (
            <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0,
              background:'#1e1e1e', border:'1px solid #2e2e2e', borderRadius:10,
              overflow:'hidden', zIndex:200, boxShadow:'0 8px 24px rgba(0,0,0,0.6)' }}>
              {suggestions.map(name => (
                <button key={name} onMouseDown={() => handleSelect(name)}
                  style={{ display:'block', width:'100%', textAlign:'left',
                    padding:'11px 14px', background:'none', border:'none',
                    borderBottom:'1px solid #262626', color:'#F0EDE8', fontSize:14, cursor:'pointer' }}
                  onMouseEnter={e => e.currentTarget.style.background='#2a2a2a'}
                  onMouseLeave={e => e.currentTarget.style.background='none'}>
                  {name}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

            {SPLITS.map(split => (

                onClick={() => { navigator.vibrate && navigator.vibrate(10); onSelect(split); }}
                className="press-scale"
                style={{ background:'#1a1a1a', border:'1px solid #262626', borderRadius:14,
                  padding:'15px 18px', display:'flex', alignItems:'center', gap:16,
                  cursor:'pointer', textAlign:'left', width:'100%' }}>
                <SplitIcon id={split.id} size={26} color="#D4A574"/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:15, fontWeight:600, color:'#F0EDE8' }}>{split.label}</div>
                  <div style={{ fontSize:12, color:'#8A8680', marginTop:3 }}>{split.defaults.slice(0,3).join(' · ')}</div>
                </div>
                <IconChevronRight size={16} color="#4A4744"/>
              </button>
            ))}
            <button onClick={() => { navigator.vibrate && navigator.vibrate(10); onSelect(FREE); }}
              className="press-scale"
              style={{ background:'transparent', border:'1.5px dashed #2e2e2e', borderRadius:14,
                padding:'15px 18px', display:'flex', alignItems:'center', gap:16,
                cursor:'pointer', textAlign:'left', width:'100%', marginTop:4 }}>
              <SplitIcon id="free" size={26} color="#8A8680"/>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:15, fontWeight:600, color:'#F0EDE8' }}>Free Workout</div>
                <div style={{ fontSize:12, color:'#8A8680', marginTop:3 }}>Log anything — no suggestions</div>
              </div>
              <IconChevronRight size={16} color="#4A4744"/>
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Split picker — Step 2 (toggle exercises)
    // ─────────────────────────────────────────────────────────────────────────

    function SplitPickerStep2({ split, exercises, onToggle, onBack, onCancel, onStart }) {
      const selectedCount = exercises.filter(e => e.selected).length;
      return (
        <div className="fade-in" style={{ display:'flex', flexDirection:'column', height:'100%' }}>
          <div style={{ padding:'16px 20px 14px', borderBottom:'1px solid #1e1e1e', flexShrink:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex', alignItems:'center' }}>
                <IconChevronLeft size={20} color="#8A8680"/>
              </button>
              <div style={{ flex:1 }}>
                <h2 style={{ fontSize:17, fontWeight:700, color:'#F0EDE8' }}>{split.label}</h2>
                <p style={{ fontSize:12, color:'#8A8680', marginTop:2 }}>Tap to add or remove exercises.</p>
              </div>
              <button onClick={onCancel} style={{ background:'none', border:'none', color:'#8A8680', fontSize:13, cursor:'pointer' }}>Cancel</button>
            </div>
          </div>
          <div style={{ flex:1, overflowY:'auto', padding:'12px 20px' }}>
            {exercises.map((ex, i) => (
              <button key={ex.name} onClick={() => onToggle(i)} className="press-scale"
                style={{ display:'flex', alignItems:'center', gap:14, width:'100%',
                  padding:'12px 14px', marginBottom:6,
                  background: ex.selected ? 'rgba(212,165,116,0.07)' : '#1a1a1a',
                  border:`1px solid ${ex.selected ? '#D4A574' : '#262626'}`,
                  borderRadius:11, cursor:'pointer', textAlign:'left',
                  opacity: ex.selected ? 1 : 0.55, transition:'all 0.15s' }}>
                <div style={{ width:20, height:20, borderRadius:6, flexShrink:0,
                  background: ex.selected ? '#D4A574' : 'transparent',
                  border:`1.5px solid ${ex.selected ? '#D4A574' : '#3a3a3a'}`,
                  display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s' }}>
                  {ex.selected && <IconCheck size={11} color="#0f0f0f"/>}
                </div>
                <span style={{ fontSize:14, fontWeight:500, color:'#F0EDE8' }}>{ex.name}</span>
              </button>
            ))}
            <div style={{ height:90 }}/>
          </div>
          <div style={{ position:'absolute', bottom:0, left:0, right:0,
            padding:'12px 20px', background:'#0f0f0f', borderTop:'1px solid #1e1e1e',
            paddingBottom:'calc(12px + env(safe-area-inset-bottom, 0px))' }}>
            <button onClick={() => { navigator.vibrate && navigator.vibrate(20); onStart(); }}
              disabled={selectedCount === 0} className="press-scale"
              style={{ width:'100%', padding:'14px 20px', borderRadius:12, border:'none',
                background: selectedCount > 0 ? '#D4A574' : '#2a2a2a',
                color: selectedCount > 0 ? '#0f0f0f' : '#4A4744',
                fontSize:15, fontWeight:700, cursor: selectedCount > 0 ? 'pointer' : 'default',
                transition:'background 0.2s, color 0.2s' }}>
              {selectedCount > 0 ? `Start Workout (${selectedCount})` : 'Select at least one exercise'}
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Active workout logger
    // ─────────────────────────────────────────────────────────────────────────

    function SetRow({ setNum, set, onChange, onRemove, autoFocusWeight }) {
      const weightRef = useRef(null);
      useEffect(() => {
        if (autoFocusWeight && weightRef.current) {
          weightRef.current.focus();
          weightRef.current.select();
        }
      }, [autoFocusWeight]);

      const inputBase = {
        background:'#242424', border:'1px solid #2e2e2e', borderRadius:8,
        color:'#F0EDE8', fontSize:16, fontWeight:600, outline:'none',
        textAlign:'center', minHeight:44, padding:'0 4px',
        fontVariantNumeric:'tabular-nums',
        transition:'border-color 0.15s',
      };

      return (
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
          {/* Set number */}
          <span style={{ color:'#4A4744', fontSize:12, fontWeight:500, width:22, textAlign:'right', flexShrink:0 }}>
            {setNum}
          </span>

          {/* Weight */}
          <input ref={weightRef} type="number" inputMode="decimal" step="2.5" min="0"
            value={set.weight} placeholder="0"
            onChange={e => onChange('weight', e.target.value)}
            onFocus={e => e.target.select()}
            style={{ ...inputBase, width:72 }}
            onFocus={e => { e.target.select(); e.target.style.borderColor='#D4A574'; }}
            onBlur={e => e.target.style.borderColor='#2e2e2e'}
          />

          {/* Separator */}
          <span style={{ color:'#4A4744', fontSize:14, fontWeight:500, flexShrink:0 }}>×</span>

          {/* Reps */}
          <input type="number" inputMode="numeric" min="0"
            value={set.reps} placeholder="0"
            onChange={e => onChange('reps', e.target.value)}
            onFocus={e => { e.target.select(); e.target.style.borderColor='#D4A574'; }}
            onBlur={e => e.target.style.borderColor='#2e2e2e'}
            style={{ ...inputBase, width:58 }}
          />

          {/* Reps label */}
          <span style={{ color:'#4A4744', fontSize:11, flexShrink:0 }}>reps</span>

          {/* Delete set */}
          <button onClick={onRemove}
            style={{ marginLeft:'auto', background:'none', border:'none', cursor:'pointer',
              color:'#3a3a3a', padding:8, display:'flex', alignItems:'center', flexShrink:0,
              borderRadius:6, transition:'color 0.15s' }}
            onMouseEnter={e => e.currentTarget.style.color='#C47070'}
            onMouseLeave={e => e.currentTarget.style.color='#3a3a3a'}>
            <IconX size={14} color="currentColor"/>
          </button>
        </div>
      );
    }

    function ExerciseBlock({ exercise, onUpdate, onRemove, exerciseNames, lastWeightMap }) {
      const [newSetId, setNewSetId] = useState(null);

      const exVolume = useMemo(() =>
        exercise.sets.reduce((sum, s) => sum + (parseFloat(s.weight)||0) * (parseInt(s.reps)||0), 0),
        [exercise.sets]);

      const handleSetChange = (setId, field, value) => {
        onUpdate({ ...exercise, sets: exercise.sets.map(s => s.id === setId ? { ...s, [field]: value } : s) });
      };

      const handleRemoveSet = (setId) => {
        if (exercise.sets.length <= 1) return;
        onUpdate({ ...exercise, sets: exercise.sets.filter(s => s.id !== setId) });
      };

      const handleAddSet = () => {
        const last = exercise.sets[exercise.sets.length - 1];
        const prefillWeight = last
          ? last.weight
          : (lastWeightMap[exercise.name] ? String(lastWeightMap[exercise.name]) : '');
        const id = `set_${uid()}`;
        setNewSetId(id);
        onUpdate({ ...exercise, sets: [...exercise.sets, { id, weight: prefillWeight, reps: '' }] });
      };

      return (
        <div style={{ background:'#1a1a1a', border:'1px solid #262626', borderRadius:14,
          padding:'14px 14px 12px', marginBottom:12 }}>
          {/* Exercise name + remove button */}
          <div style={{ display:'flex', gap:8, marginBottom:12 }}>
            <div style={{ flex:1 }}>
              <ExerciseInput
                value={exercise.name}
                onChange={name => onUpdate({ ...exercise, name })}
                exerciseNames={exerciseNames}
                placeholder="Exercise name..."
              />
            </div>
            <button onClick={onRemove}
              style={{ background:'#242424', border:'1px solid #2e2e2e', borderRadius:9,
                color:'#8A8680', cursor:'pointer', padding:'0 10px', display:'flex',
                alignItems:'center', flexShrink:0, transition:'color 0.15s' }}
              onMouseEnter={e => e.currentTarget.style.color='#C47070'}
              onMouseLeave={e => e.currentTarget.style.color='#8A8680'}>
              <IconX size={14} color="currentColor"/>
            </button>
          </div>

          {/* Set rows */}
          {exercise.sets.map((set, i) => (
            <SetRow key={set.id} setNum={i + 1} set={set}
              onChange={(f, v) => handleSetChange(set.id, f, v)}
              onRemove={() => handleRemoveSet(set.id)}
              autoFocusWeight={set.id === newSetId}
            />
          ))}

          {/* Add set + volume row */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:6 }}>
            <button onClick={handleAddSet} className="press-scale"
              style={{ display:'flex', alignItems:'center', gap:6, background:'#242424',
                border:'1px solid #2e2e2e', borderRadius:8, padding:'7px 12px',
                color:'#8A8680', fontSize:13, fontWeight:500, cursor:'pointer',
                transition:'color 0.15s, border-color 0.15s' }}
              onMouseEnter={e => { e.currentTarget.style.color='#D4A574'; e.currentTarget.style.borderColor='#D4A574'; }}
              onMouseLeave={e => { e.currentTarget.style.color='#8A8680'; e.currentTarget.style.borderColor='#2e2e2e'; }}>
              <IconPlus size={12} color="currentColor"/>
              Add Set
            </button>
            {exVolume > 0 && (
              <span style={{ fontSize:12, color:'#4A4744', fontVariantNumeric:'tabular-nums' }}>
                {exVolume.toLocaleString()} lbs
              </span>
            )}
          </div>
        </div>
      );
    }

    function ActiveWorkoutLogger({ activeWorkout, lastWeightMap, exerciseNames, onCancel, onFinish }) {
      const [exercises, setExercises] = useState(activeWorkout.exercises);
      const [notes, setNotes]         = useState('');
      const elapsed                   = useElapsedMinutes(activeWorkout.startTime);

      const totalVolume = useMemo(() =>
        exercises.reduce((sum, ex) =>
          sum + ex.sets.reduce((s2, s) => s2 + (parseFloat(s.weight)||0) * (parseInt(s.reps)||0), 0), 0),
        [exercises]);

      const handleUpdateExercise = (updated) =>
        setExercises(prev => prev.map(ex => ex.id === updated.id ? updated : ex));

      const handleRemoveExercise = (id) =>
        setExercises(prev => prev.length > 1 ? prev.filter(ex => ex.id !== id) : prev);

      const handleAddExercise = () => {
        const id = `ex_${uid()}`;
        setExercises(prev => [...prev, { id, name: '', sets: [{ id: `set_${uid()}`, weight: '', reps: '' }] }]);
      };

      const handleFinish = () => {
        const hasContent = exercises.some(ex => ex.name.trim() && ex.sets.some(s => (parseFloat(s.weight)||0) > 0 && (parseInt(s.reps)||0) > 0));
        if (!hasContent) {
          alert('Add at least one exercise with a set logged before finishing.');
          return;
        }
        onFinish(exercises, notes);
      };

      return (
        <div className="fade-in" style={{ display:'flex', flexDirection:'column', height:'100%' }}>

          {/* ── Header ── */}
          <div style={{ padding:'14px 20px 12px', borderBottom:'1px solid #1e1e1e', flexShrink:0,
            display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <h2 style={{ fontSize:17, fontWeight:700, color:'#F0EDE8' }}>Logging Workout</h2>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              {/* Green pulse dot + elapsed */}
              <div className="pulse" style={{ width:7, height:7, borderRadius:'50%', background:'#7A9E7E', flexShrink:0 }}/>
              <span className="tabular" style={{ fontSize:13, color:'#7A9E7E', fontWeight:600 }}>
                {elapsed}m
              </span>
            </div>
          </div>

          {/* ── Scrollable content ── */}
          <div style={{ flex:1, overflowY:'auto', padding:'16px 16px 0' }}>

            {exercises.map(ex => (
              <ExerciseBlock
                key={ex.id}
                exercise={ex}
                onUpdate={handleUpdateExercise}
                onRemove={() => handleRemoveExercise(ex.id)}
                exerciseNames={exerciseNames}
                lastWeightMap={lastWeightMap}
              />
            ))}

            {/* + Add Exercise */}
            <button onClick={handleAddExercise} className="press-scale"
              style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                width:'100%', padding:'13px 20px', marginBottom:16,
                background:'transparent', border:'1.5px dashed #2e2e2e', borderRadius:12,
                color:'#8A8680', fontSize:14, fontWeight:500, cursor:'pointer',
                transition:'color 0.15s, border-color 0.15s' }}
              onMouseEnter={e => { e.currentTarget.style.color='#D4A574'; e.currentTarget.style.borderColor='#D4A574'; }}
              onMouseLeave={e => { e.currentTarget.style.color='#8A8680'; e.currentTarget.style.borderColor='#2e2e2e'; }}>
              <IconPlus size={14} color="currentColor"/>
              Add Exercise
            </button>

            {/* Notes */}
            <div style={{ marginBottom:16 }}>
              <textarea
                value={notes}
                onChange={e => setNotes(e.target.value.slice(0, 500))}
                placeholder="Notes (optional)..."
                maxLength={500}
                rows={2}
                style={{ width:'100%', background:'#1a1a1a', border:'1px solid #262626',
                  borderRadius:12, padding:'12px 14px', color:'#F0EDE8', fontSize:14,
                  resize:'none', outline:'none', fontFamily:'inherit', lineHeight:1.5,
                  transition:'border-color 0.15s' }}
                onFocus={e => e.target.style.borderColor='#3a3a3a'}
                onBlur={e => e.target.style.borderColor='#262626'}
              />
            </div>

            {/* Total volume */}
            {totalVolume > 0 && (
              <div style={{ textAlign:'center', marginBottom:24 }}>
                <div className="tabular" style={{ fontSize:28, fontWeight:700, color:'#F0EDE8', lineHeight:1 }}>
                  {totalVolume.toLocaleString()}
                </div>
                <div style={{ fontSize:12, color:'#8A8680', marginTop:4, letterSpacing:'0.06em', textTransform:'uppercase' }}>
                  lbs total volume
                </div>
              </div>
            )}

            {/* Spacer for bottom bar */}
            <div style={{ height:90 }}/>
          </div>

          {/* ── Sticky bottom bar ── */}
          <div style={{ position:'absolute', bottom:0, left:0, right:0,
            background:'#0a0a0a', borderTop:'1px solid #1e1e1e',
            padding:'10px 16px',
            paddingBottom:'calc(10px + env(safe-area-inset-bottom, 0px))',
            display:'flex', gap:10 }}>
            <button onClick={() => { if (window.confirm('Cancel workout? Your progress will be lost.')) { navigator.vibrate && navigator.vibrate(30); onCancel(); } }}
              style={{ flex:1, padding:'13px 0', borderRadius:11, border:'1px solid #2e2e2e',
                background:'transparent', color:'#8A8680', fontSize:14, fontWeight:600, cursor:'pointer' }}>
              Cancel
            </button>
            <button onClick={handleFinish} className="press-scale"
              style={{ flex:2, padding:'13px 0', borderRadius:11, border:'none',
                background:'#D4A574', color:'#0f0f0f', fontSize:15, fontWeight:700, cursor:'pointer' }}>
              Finish Workout
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Today home — "Ready to lift?" hero card
    // ─────────────────────────────────────────────────────────────────────────

    function TodayHome({ onOpenPicker }) {
      return (
        <div className="fade-in" style={{ padding:'28px 20px 0' }}>
          <div style={{ background:'#1a1a1a', border:'1px solid #262626', borderRadius:18, padding:'28px 24px', textAlign:'center' }}>
            <div style={{ marginBottom:16, display:'flex', justifyContent:'center' }}>
              <IconDumbbell size={40} color="#D4A574"/>
            </div>
            <h3 style={{ fontSize:20, fontWeight:700, color:'#F0EDE8', marginBottom:8 }}>Ready to lift?</h3>
            <p style={{ fontSize:14, color:'#8A8680', marginBottom:24, lineHeight:1.5 }}>
              Track your exercises, sets, and reps.
            </p>
            <button onClick={() => { navigator.vibrate && navigator.vibrate(20); onOpenPicker(); }}
              className="press-scale"
              style={{ width:'100%', padding:'14px 20px', borderRadius:12, border:'none',
                background:'#D4A574', color:'#0f0f0f', fontSize:15, fontWeight:700, cursor:'pointer' }}>
              Start Workout
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // TodayTab — orchestrates home / picker / active logger
    // ─────────────────────────────────────────────────────────────────────────

    function TodayTab({ exerciseNames, workoutsData, activeWorkout, lastWeightMap, onStartWorkout, onCancelWorkout, onFinishWorkout }) {
      const [step, setStep]               = useState('home');
      const [selectedSplit, setSelectedSplit] = useState(null);
      const [pickerExercises, setPickerExercises] = useState([]);

      const frequency = useMemo(() => buildExerciseFrequency(workoutsData), [workoutsData]);

      // Active logger takes over
      if (activeWorkout) {
        return (
          <ActiveWorkoutLogger
            activeWorkout={activeWorkout}
            lastWeightMap={lastWeightMap}
            exerciseNames={exerciseNames}
            onCancel={onCancelWorkout}
            onFinish={onFinishWorkout}
          />
        );
      }

      const handleSelectSplit = (split) => {
        setSelectedSplit(split);
        if (split.id === 'free') {
          onStartWorkout([], split);
        } else {
          setPickerExercises(getSuggestions(split, frequency));
          setStep('pick_exercises');
        }
      };

      const handleCancel = () => { setStep('home'); setSelectedSplit(null); setPickerExercises([]); };

      if (step === 'pick_split') {
        return <SplitPickerStep1 onSelect={handleSelectSplit} onCancel={handleCancel}/>;
      }

      if (step === 'pick_exercises' && selectedSplit) {
        return (
          <SplitPickerStep2
            split={selectedSplit}
            exercises={pickerExercises}
            onToggle={i => setPickerExercises(prev => prev.map((ex, j) => j === i ? { ...ex, selected: !ex.selected } : ex))}
            onBack={() => setStep('pick_split')}
            onCancel={handleCancel}
            onStart={() => onStartWorkout(pickerExercises.filter(e => e.selected), selectedSplit)}
          />
        );
      }

      return <TodayHome onOpenPicker={() => setStep('pick_split')}/>;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // History + You tabs (placeholder)
    // ─────────────────────────────────────────────────────────────────────────

    function HistoryTab() {
      return <div className="fade-in" style={{ padding:'28px 20px' }}>
        <h2 style={{ fontSize:22, fontWeight:700, color:'#F0EDE8' }}>History</h2>
      </div>;
    }

    function YouTab() {
      return <div className="fade-in" style={{ padding:'28px 20px' }}>
        <h2 style={{ fontSize:22, fontWeight:700, color:'#F0EDE8' }}>You</h2>
      </div>;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Bottom nav
    // ─────────────────────────────────────────────────────────────────────────

    const TABS = [
      { id:'today',   label:'Today',   Icon:IconToday   },
      { id:'history', label:'History', Icon:IconHistory },
      { id:'you',     label:'You',     Icon:IconYou     },
    ];

    function BottomNav({ activeTab, onTabPress }) {
      return (
        <nav role="navigation" aria-label="Main navigation" style={{
          position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)',
          width:'100%', maxWidth:480, background:'#111', borderTop:'1px solid #1e1e1e',
          display:'flex', paddingBottom:'env(safe-area-inset-bottom, 0px)', zIndex:50 }}>
          {TABS.map(({ id, label, Icon }) => {
            const active = activeTab === id;
            return (
              <button key={id} onClick={() => onTabPress(id)}
                aria-label={label} aria-current={active ? 'page' : undefined}
                style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center',
                  justifyContent:'center', gap:3, paddingTop:10, paddingBottom:10,
                  background:'none', border:'none', cursor:'pointer',
                  color: active ? '#D4A574' : '#4A4744', transition:'color 0.2s', userSelect:'none' }}>
                <Icon size={22} color={active ? '#D4A574' : '#4A4744'}/>
                <span style={{ fontSize:10, fontWeight: active ? 600 : 400, letterSpacing:'0.03em', lineHeight:1 }}>
                  {label}
                </span>
                <div style={{ width:4, height:4, borderRadius:'50%', background: active ? '#D4A574' : 'transparent', transition:'background 0.2s' }}/>
              </button>
            );
          })}
        </nav>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────────────────────────

    function App() {
      const [activeTab, setActiveTab]       = useState('today');
      const [seeding, setSeeding]           = useState(false);
      const [activeWorkout, setActiveWorkout] = useState(null);

      const [exerciseNamesData] = useFirebase('drea/exerciseNames');
      const [workoutsData]      = useFirebase('drea/workouts');

      const exerciseNames = useMemo(() => {
        if (!exerciseNamesData) return ALL_EXERCISE_NAMES;
        return [...new Set(Object.values(exerciseNamesData))].sort();
      }, [exerciseNamesData]);

      const lastWeightMap = useMemo(() => buildLastWeightMap(workoutsData), [workoutsData]);

      useEffect(() => {
        (async () => {
          const snap = await db.ref('drea/exerciseNames').once('value');
          if (!snap.val()) {
            setSeeding(true);
            await seedExerciseNames();
            setSeeding(false);
          }
        })();
      }, []);

      const handleTabPress = (id) => { navigator.vibrate && navigator.vibrate(10); setActiveTab(id); };

      const handleStartWorkout = (pickerExercises, split) => {
        const exercises = pickerExercises.length > 0
          ? pickerExercises.map((ex, i) => ({
              id: `ex_${uid()}`,
              name: ex.name,
              sets: [{ id: `set_${uid()}`, weight: lastWeightMap[ex.name] ? String(lastWeightMap[ex.name]) : '', reps: '' }],
            }))
          : [{ id: `ex_${uid()}`, name: '', sets: [{ id: `set_${uid()}`, weight: '', reps: '' }] }];

        setActiveWorkout({ exercises, split, startTime: Date.now() });
        setActiveTab('today');
      };

      const handleCancelWorkout = () => setActiveWorkout(null);

      // Phase 2c will implement full save + PR detection; stub for now
      const handleFinishWorkout = (exercises, notes) => {
        // TODO Phase 2c: save to Firebase
        setActiveWorkout(null);
      };

      if (seeding) return <SeedingScreen/>;

      return (
        <div style={{ background:'#0f0f0f', height:'100dvh', display:'flex', flexDirection:'column', alignItems:'center' }}>
          <div style={{ width:'100%', maxWidth:480, flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative' }}>
            <main role="main" style={{ flex:1, overflowY:'auto', paddingBottom:'calc(64px + env(safe-area-inset-bottom, 0px))', height:'100%' }}>
              {activeTab === 'today' && (
                <TodayTab key="today"
                  exerciseNames={exerciseNames}
                  workoutsData={workoutsData}
                  activeWorkout={activeWorkout}
                  lastWeightMap={lastWeightMap}
                  onStartWorkout={handleStartWorkout}
                  onCancelWorkout={handleCancelWorkout}
                  onFinishWorkout={handleFinishWorkout}
                />
              )}
              {activeTab === 'history' && <HistoryTab key="history"/>}
              {activeTab === 'you'     && <YouTab     key="you"/>}
            </main>
            <BottomNav activeTab={activeTab} onTabPress={handleTabPress}/>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Service worker + mount
    // ─────────────────────────────────────────────────────────────────────────

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
