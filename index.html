      'Donkey Calf Raise':['legs'],'Hack Squat':['legs'],'Sumo Squat':['legs'],
      'Walking Lunge':['legs'],'Reverse Lunge':['legs'],'Step Up':['legs'],
      'Hip Thrust':['legs'],'Glute Bridge':['legs'],'Hip Abduction':['legs'],
      'Hip Adduction':['legs'],'Leg Press Calf Raise':['legs'],'Smith Machine Squat':['legs'],
      'Box Squat':['legs'],'Pause Squat':['legs'],'Single Leg Press':['legs'],
      'Cable Pull Through':['legs'],
      'Cable Crunch':['core'],'Hanging Leg Raise':['core'],'Hanging Knee Raise':['core'],
      'Plank':['core'],'Side Plank':['core'],'Ab Wheel Rollout':['core'],'Crunch':['core'],
      'Bicycle Crunch':['core'],'Russian Twist':['core'],'Leg Raise':['core'],
      'Reverse Crunch':['core'],'Dragon Flag':['core'],'Wood Chop':['core'],
      'Pallof Press':['core'],'Dead Bug':['core'],'Bird Dog':['core'],
      'Hollow Body Hold':['core'],'V-Up':['core'],'Sit-Up':['core'],
      'Decline Sit-Up':['core'],'Toe Touch':['core'],'Mountain Climber':['core'],
      'Toes to Bar':['core'],'Cable Woodchop':['core'],
    };

    const ALL_EXERCISE_NAMES = Object.keys(EXERCISE_MUSCLE_MAP).sort();

    // ─────────────────────────────────────────────────────────────────────────
    // Splits
    // ─────────────────────────────────────────────────────────────────────────

    const SPLITS = [
      { id:'chest_back', label:'Chest / Back', muscles:['chest','back'],
        defaults:['Bench Press','Incline Dumbbell Press','Cable Fly','Lat Pulldown','Seated Cable Row','Dumbbell Pullover'] },
      { id:'bis_tris', label:'Biceps / Triceps', muscles:['biceps','triceps'],
        defaults:['Barbell Curl','Hammer Curl','Incline Dumbbell Curl','Preacher Curl','Tricep Pushdown','Skull Crushers','Overhead Tricep Extension','Close Grip Bench Press'] },
      { id:'shoulders', label:'Shoulders', muscles:['shoulders'],
        defaults:['Overhead Press','Lateral Raise','Front Raise','Face Pulls','Reverse Flyes','Arnold Press','Cable Lateral Raise','Upright Row'] },
      { id:'legs_abs', label:'Legs / Abs', muscles:['legs','core'],
        defaults:['Squat','Leg Press','Romanian Deadlift','Leg Curl','Leg Extension','Calf Raise','Cable Crunch','Hanging Leg Raise','Plank'] },
      { id:'back_traps', label:'Back / Traps', muscles:['back','traps'],
        defaults:['Deadlift','Barbell Row','T-Bar Row','Lat Pulldown','Seated Cable Row','Shrugs','Face Pulls'] },
    ];

    // ─────────────────────────────────────────────────────────────────────────
    // Utilities
    // ─────────────────────────────────────────────────────────────────────────

    function buildExerciseFrequency(workoutsData) {
      const freq = {};
      if (!workoutsData) return freq;
      Object.values(workoutsData).forEach(w => {
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => { if (ex.name) freq[ex.name] = (freq[ex.name]||0)+1; });
      });
      return freq;
    }

    function getSuggestions(split, frequency) {
      if (split.id === 'free') return [];
      const relevant = Object.entries(EXERCISE_MUSCLE_MAP)
        .filter(([,m]) => m.some(g => split.muscles.includes(g))).map(([n]) => n);
      const byFreq = [...relevant].sort((a,b) => { const d=(frequency[b]||0)-(frequency[a]||0); return d||a.localeCompare(b); });
      const seen = new Set(byFreq), merged = [...byFreq];
      split.defaults.forEach(d => { if (!seen.has(d)) merged.push(d); });
      return merged.map(name => ({ name, selected: split.defaults.includes(name) }));
    }

    function buildLastWeightMap(workoutsData) {
      const map = {};
      if (!workoutsData) return map;
      Object.keys(workoutsData).sort().reverse().forEach(date => {
        const w = workoutsData[date];
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => {
          if (!ex.name || map[ex.name] !== undefined || !ex.sets) return;
          const maxW = Math.max(0, ...Object.values(ex.sets).map(s => parseFloat(s.weight)||0));
          if (maxW > 0) map[ex.name] = maxW;
        });
      });
      return map;
    }

    // Last session map: exercise name → { weight, reps } of best set from most recent workout
    function buildLastSessionMap(workoutsData) {
      const map = {};
      if (!workoutsData) return map;
      Object.keys(workoutsData).sort().reverse().forEach(date => {
        const w = workoutsData[date];
        if (!w.exercises) return;
        Object.values(w.exercises).forEach(ex => {
          if (!ex.name || map[ex.name] !== undefined || !ex.sets) return;
          const sets = Object.values(ex.sets)
            .filter(s => parseFloat(s.weight) > 0 && parseInt(s.reps) > 0);
          if (!sets.length) return;
          // Best set = highest weight
          const best = sets.reduce((b,s) => parseFloat(s.weight) > parseFloat(b.weight) ? s : b);
          map[ex.name] = { weight: parseFloat(best.weight), reps: parseInt(best.reps) };
        });
      });
      return map;
    }

    function getOverloadSuggestion(last) {
      if (!last) return null;
      const { weight, reps } = last;
      if (reps >= 10 && weight > 0) {
        const add = weight < 100 ? 2.5 : 5;
        return { type:'weight', suggestedWeight: weight+add, suggestedReps: reps,
                 hint:`Try ${weight+add} lbs — you hit ${reps} reps last time` };
      }
      if (reps > 0 && reps < 12) {
        return { type:'reps', suggestedWeight: weight, suggestedReps: reps+1,
                 hint:`Try ${reps+1} reps at ${weight} lbs` };
      }
      return { type:'match', suggestedWeight: weight, suggestedReps: reps,
               hint:'Match last session, then push' };
    }

    // Sanitize exercise names for Firebase keys (forbids . # $ / [ ])
    const fbSafeKey = (str) => str.replace(/[.#$/[\]]/g, '_');

    function todayKey() { return new Date().toISOString().slice(0,10); }
    let _uid = 0;
    const uid = () => `${Date.now()}_${++_uid}`;

    function formatDate(key) {
      // key = "YYYY-MM-DD"
      const d = new Date(key + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    }

    // Epley estimated 1-rep max
    const epley = (weight, reps) => reps === 1 ? weight : Math.round(weight * (1 + reps / 30));

    // Return the Sunday that starts the ISO week for a given YYYY-MM-DD key
    function getWeekStart(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() - d.getDay());
      return d.toISOString().slice(0,10);
    }

    function computeWeeklyVolume(workoutsData, numWeeks=8) {
      const today = new Date(); today.setHours(12,0,0,0);
      const curWS = new Date(today); curWS.setDate(today.getDate() - today.getDay());
      const weeks = [];
      for (let i = numWeeks-1; i >= 0; i--) {
        const ws = new Date(curWS); ws.setDate(curWS.getDate() - i*7);
        weeks.push({
          start: ws.toISOString().slice(0,10),
          label: ws.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}),
          volume: 0,
        });
      }
      if (workoutsData) {
        Object.entries(workoutsData).forEach(([date, w]) => {
          const ws = getWeekStart(date);
          const wk = weeks.find(x => x.start === ws);
          if (wk) wk.volume += (w.totalVolume || 0);
        });
      }
      return weeks;
    }

    function computeExerciseHistory(workoutsData, exerciseName) {
      if (!workoutsData || !exerciseName) return [];
      const results = [];
      Object.entries(workoutsData).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, w]) => {
        if (!w.exercises) return;
        const found = Object.values(w.exercises).find(ex =>
          ex.name && ex.name.toLowerCase() === exerciseName.toLowerCase());
        if (!found || !found.sets) return;
        const sets = Object.values(found.sets)
          .filter(s => parseFloat(s.weight) > 0 && parseInt(s.reps) > 0);
        if (!sets.length) return;
        const best1rm = Math.max(...sets.map(s => epley(parseFloat(s.weight), parseInt(s.reps))));
        const bestSet = sets.reduce((b,s) =>
          epley(parseFloat(s.weight),parseInt(s.reps)) > epley(parseFloat(b.weight),parseInt(b.reps)) ? s : b);
        results.push({ date, est1rm: best1rm, weight: parseFloat(bestSet.weight), reps: parseInt(bestSet.reps) });
      });
      return results; // sorted ascending by date
    }

    // Consecutive weeks (ending at current week) that have ≥1 workout
    function computeStreak(workoutsData) {
      if (!workoutsData) return 0;
      const dates = Object.keys(workoutsData);
      if (!dates.length) return 0;
      const weekSet = new Set(dates.map(d => getWeekStart(d)));
      const today = new Date(); today.setHours(12,0,0,0);
      const cur = new Date(today); cur.setDate(today.getDate() - today.getDay());
      // Start from current week if it has a workout, otherwise check last week
      if (!weekSet.has(cur.toISOString().slice(0,10))) {
        cur.setDate(cur.getDate() - 7);
      }
      let streak = 0;
      while (weekSet.has(cur.toISOString().slice(0,10))) {
        streak++;
        cur.setDate(cur.getDate() - 7);
      }
      return streak;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // AI Coach — context builder
    // ─────────────────────────────────────────────────────────────────────────

    const ANTHROPIC_KEY_LS = 'drea_anthropic_key';

    function buildCoachSystemPrompt(workoutsData, bodyWeightsData, personalRecordsData) {
      const today = new Date().toLocaleDateString('en-US',
        {weekday:'long',month:'long',day:'numeric',year:'numeric'});

      const recentWorkouts = workoutsData
        ? Object.entries(workoutsData).sort(([a],[b])=>b.localeCompare(a)).slice(0,10)
            .map(([date,w]) => {
              const lbl = SPLITS.find(s=>s.id===w.split)?.label||'Free Workout';
              const exs = w.exercises
                ? Object.values(w.exercises).map(e=>e.name).filter(Boolean).join(', ')
                : '—';
              return `  ${date} | ${lbl} | ${(w.totalVolume||0).toLocaleString()} lbs | ${exs}`;
            }).join('\n')
        : '  No workouts yet.';

      const bwStr = bodyWeightsData
        ? Object.values(bodyWeightsData).sort((a,b)=>b.timestamp-a.timestamp).slice(0,5)
            .map(e=>`${e.date}: ${e.weight} lbs`).join(', ')
        : 'None.';

      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
      const cutoffKey = cutoff.toISOString().slice(0,10);
      const mf = {};
      if (workoutsData) {
        Object.entries(workoutsData).filter(([d])=>d>=cutoffKey).forEach(([,w])=>{
          if (!w.exercises) return;
          Object.values(w.exercises).forEach(ex => {
            (EXERCISE_MUSCLE_MAP[ex.name]||[]).forEach(m=>{ mf[m]=(mf[m]||0)+1; });
          });
        });
      }
      const muscleStr = Object.entries(mf).length
        ? Object.entries(mf).sort(([,a],[,b])=>b-a).map(([m,c])=>`${m}(${c}x)`).join(', ')
        : 'No recent data.';

      const prStr = personalRecordsData
        ? Object.values(personalRecordsData).filter(p=>p&&p.name)
            .map(p=>`${p.name}: ${p.weight}×${p.reps} lbs (e1RM ${p.est1rm})`).join('; ')||'None yet.'
        : 'None yet.';

      return `You are Drea, Andrea's personal AI fitness coach. Be warm, direct, and data-driven. Keep responses concise — 2-4 sentences unless deeper detail is needed. Reference her actual data when relevant.

Today: ${today}

Recent workouts (newest first):
${recentWorkouts}

Body weight (last 5 entries): ${bwStr}

Muscle training frequency last 30 days: ${muscleStr}

Personal records: ${prStr}

Be encouraging, specific, and practical. Don't pad responses.`;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Firebase helpers
    // ─────────────────────────────────────────────────────────────────────────

    function useFirebase(path) {
      const [data, setData]       = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        if (!path) { setLoading(false); return; }
        const ref = db.ref(path);
        ref.on('value', snap => { setData(snap.val()); setLoading(false); });
        return () => ref.off('value');
      }, [path]);
      return [data, loading];
    }

    const fbSet    = (path, v) => db.ref(path).set(v);
    const fbUpdate = (path, v) => db.ref(path).update(v);
    const fbPush   = (path, v) => db.ref(path).push(v);
    const fbRemove = (path)    => db.ref(path).remove();

    const localGet = (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
    const localSet = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

    async function seedExerciseNames() {
      const snap = await db.ref('drea/exerciseNames').once('value');
      if (snap.val()) return;
      const upd = {};
      ALL_EXERCISE_NAMES.forEach(n => { upd[db.ref('drea/exerciseNames').push().key] = n; });
      await db.ref('drea/exerciseNames').set(upd);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // saveWorkout — persists to Firebase and returns newPRs
    // ─────────────────────────────────────────────────────────────────────────

    async function saveWorkout(exercises, notes, startTime, split) {
      const key      = todayKey();
      const duration = Math.max(1, Math.round((Date.now() - startTime) / 60000));

      // Filter to exercises with a name and at least one logged set
      const valid = exercises
        .filter(ex => ex.name.trim())
        .map(ex => ({
          name: ex.name.trim(),
          sets: ex.sets
            .filter(s => (parseFloat(s.weight)||0) > 0 && (parseInt(s.reps)||0) > 0)
            .map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) })),
        }))
        .filter(ex => ex.sets.length > 0);

      if (valid.length === 0) return { newPRs: [], totalVolume: 0, duration };

      // Build Firebase exercise object (stable keys)
      const exObj = {};
      valid.forEach((ex, i) => {
        const setsObj = {};
        ex.sets.forEach((s, j) => {
          setsObj[`set_${String(j+1).padStart(3,'0')}`] = { weight: s.weight, reps: s.reps };
        });
        exObj[`exercise_${String(i+1).padStart(3,'0')}`] = { name: ex.name, sets: setsObj };
      });

      const totalVolume = valid.reduce((sum, ex) =>
        sum + ex.sets.reduce((s2, s) => s2 + s.weight * s.reps, 0), 0);

      // Persist workout
      await fbSet(`drea/workouts/${key}`, {
        exercises: exObj, totalVolume, duration,
        notes: notes.trim(), split: split.id, timestamp: Date.now(),
      });

      // Stats
      const statsSnap = await db.ref('drea/stats').once('value');
      const stats = statsSnap.val() || {};
      await fbUpdate('drea/stats', {
        totalGymDays: (stats.totalGymDays || 0) + 1,
        lastWorkoutDate: key,
      });

      // PR detection (Epley)
      const newPRs = [];
      for (const ex of valid) {
        const best1RM = Math.max(...ex.sets.map(s => epley(s.weight, s.reps)));
        if (best1RM <= 0) continue;
        const prKey  = fbSafeKey(ex.name);
        const prSnap = await db.ref(`drea/personalRecords/${prKey}`).once('value');
        const prev   = prSnap.val();
        if (!prev || best1RM > (prev.est1rm || 0)) {
          const bestSet = ex.sets.reduce((b, s) => epley(s.weight,s.reps) > epley(b.weight,b.reps) ? s : b);
          await fbSet(`drea/personalRecords/${prKey}`, {
            name: ex.name, weight: bestSet.weight, reps: bestSet.reps, est1rm: best1RM, date: key,
          });
          newPRs.push({ name: ex.name, weight: bestSet.weight, reps: bestSet.reps, est1rm: best1RM });
        }
      }

      // Auto-add any new exercise names to the library
      const namesSnap = await db.ref('drea/exerciseNames').once('value');
      const existing  = new Set(namesSnap.val() ? Object.values(namesSnap.val()).map(n=>n.toLowerCase()) : []);
      for (const ex of valid) {
        if (!existing.has(ex.name.toLowerCase())) await fbPush('drea/exerciseNames', ex.name);
      }

      return { newPRs, totalVolume, duration };
    }

    // ─────────────────────────────────────────────────────────────────────────
    // useRestTimer hook
    // ─────────────────────────────────────────────────────────────────────────

    function useRestTimer() {
      const [timeLeft, setTimeLeft]     = useState(0);
      const [isResting, setIsResting]   = useState(false);
      const [done, setDone]             = useState(false);
      const [defaultDur, setDefaultDur] = useState(90);
      const intervalRef                 = useRef(null);
      const doneTimerRef                = useRef(null);

      const stopTimer = useCallback(() => {
        clearInterval(intervalRef.current);
        clearTimeout(doneTimerRef.current);
        setIsResting(false); setTimeLeft(0); setDone(false);
      }, []);

      const startTimer = useCallback((dur) => {
        clearInterval(intervalRef.current);
        clearTimeout(doneTimerRef.current);
        const d = dur !== undefined ? dur : defaultDur;
        setDefaultDur(d); setDone(false); setTimeLeft(d); setIsResting(true);
        intervalRef.current = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(intervalRef.current);
              setIsResting(false); setDone(true);
              navigator.vibrate && navigator.vibrate(200);
              doneTimerRef.current = setTimeout(() => setDone(false), 2200);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      }, [defaultDur]);

      useEffect(() => () => {
        clearInterval(intervalRef.current);
        clearTimeout(doneTimerRef.current);
      }, []);

      const progress = isResting && defaultDur > 0 ? timeLeft / defaultDur : done ? 0 : 1;
      return { timeLeft, isResting, done, progress, defaultDur, startTimer, stopTimer };
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Elapsed-time hook
    // ─────────────────────────────────────────────────────────────────────────

    function useElapsedMinutes(startTime) {
      const [elapsed, setElapsed] = useState(0);
      useEffect(() => {
        if (!startTime) return;
        const tick = () => setElapsed(Math.floor((Date.now()-startTime)/60000));
        tick();
        const id = setInterval(tick, 15000);
        return () => clearInterval(id);
      }, [startTime]);
      return elapsed;
    }

    function ExerciseInput({ value, onChange, onSelect, exerciseNames=[], placeholder='Exercise name...' }) {
      const [open, setOpen]   = useState(false);

        const q = query.trim().toLowerCase(), pool = exerciseNames.length ? exerciseNames : ALL_EXERCISE_NAMES;
        return q ? pool.filter(n=>n.toLowerCase().includes(q)).slice(0,10) : pool.slice(0,10);
      }, [query, exerciseNames]);
      const pick = (name) => { setQuery(name); onChange&&onChange(name); onSelect&&onSelect(name); setOpen(false); };

        <div style={{ position:'relative', width:'100%' }}>
          <input type="text" value={query}
            onChange={e=>{setQuery(e.target.value);onChange&&onChange(e.target.value);setOpen(true);}}
            onFocus={()=>{clearTimeout(closeTimer.current);setOpen(true);}}
            onBlur={()=>{closeTimer.current=setTimeout(()=>setOpen(false),150);}}
            placeholder={placeholder} autoComplete="off" autoCorrect="off" autoCapitalize="words" spellCheck="false"

    // ─────────────────────────────────────────────────────────────────────────
    // ProgressionChart — SVG line chart (est. 1RM over time)
    // ─────────────────────────────────────────────────────────────────────────

    function ProgressionChart({ data }) {
      if (!data || data.length < 2) return (
        <div style={{height:120,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:13,color:'#4A4744'}}>
            {data && data.length===1 ? 'Log one more session to see your trend.' : 'No data yet.'}
          </span>
        </div>
      );
      const W=320, H=150, PL=46, PR=12, PT=12, PB=28;
      const plotW=W-PL-PR, plotH=H-PT-PB;
      const timestamps = data.map(d => new Date(d.date+'T12:00:00').getTime());
      const yVals = data.map(d => d.est1rm);
      const tMin=Math.min(...timestamps), tMax=Math.max(...timestamps);
      const yMin=Math.min(...yVals), yMax=Math.max(...yVals);
      const tRange=tMax-tMin||1;
      const yPad = Math.max(5, Math.round((yMax-yMin)*0.18)) || 10;
      const yLow=yMin-yPad, yHigh=yMax+yPad, yRange=yHigh-yLow;
      const toX = t => PL + ((t-tMin)/tRange)*plotW;
      const toY = v => PT + ((yHigh-v)/yRange)*plotH;
      const pts = data.map((d,i) => ({ x:toX(timestamps[i]), y:toY(d.est1rm), ...d }));
      const linePath = pts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const areaPath = linePath
        + ` L${pts[pts.length-1].x.toFixed(1)},${(PT+plotH).toFixed(1)}`
        + ` L${PL},${(PT+plotH).toFixed(1)} Z`;
      const yGridVals = [0.25,0.5,0.75].map(f => Math.round(yLow+f*yRange));
      const xLabelIdxs = data.length<=3
        ? data.map((_,i)=>i)
        : [0,Math.floor((data.length-1)/2),data.length-1];
      const xLabelPts = [...new Set(xLabelIdxs)].map(i => pts[i]);
      const dateShort = key => new Date(key+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          {yGridVals.map((v,i) => {
            const gy = toY(v);
            return (
              <g key={i}>
                <line x1={PL} y1={gy.toFixed(1)} x2={W-PR} y2={gy.toFixed(1)} stroke="#262626" strokeWidth="1"/>
                <text x={PL-6} y={(gy+3.5).toFixed(1)} textAnchor="end" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{v}</text>
              </g>
            );
          })}
          <path d={areaPath} fill="rgba(212,165,116,0.07)"/>
          <path d={linePath} fill="none" stroke="#D4A574" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {pts.map((p,i) => <circle key={i} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r="3.5" fill="#D4A574"/>)}
          {xLabelPts.map((p,i) => (
            <text key={i} x={p.x.toFixed(1)} y={H-4}
              textAnchor={i===0?'start':i===xLabelPts.length-1?'end':'middle'}
              fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">
              {dateShort(p.date)}
            </text>
          ))}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // WeeklyVolumeChart — SVG bar chart (last 8 weeks)
    // ─────────────────────────────────────────────────────────────────────────

    function WeeklyVolumeChart({ weeklyData }) {
      const maxVol = Math.max(...weeklyData.map(w => w.volume), 1);
      const W=320, H=120, PL=4, PR=4, PT=8, PB=28;
      const plotW=W-PL-PR, plotH=H-PT-PB;
      const n=weeklyData.length;
      const barW=plotW/n;
      const barGap=3;
      const actualBarW=barW-barGap;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          {weeklyData.map((wk,i) => {
            const bh = Math.max(wk.volume>0?3:0, (wk.volume/maxVol)*plotH);
            const bx = PL + i*barW + barGap/2;
            const by = PT + plotH - bh;
            const cx = bx + actualBarW/2;
            return (
              <g key={i}>
                <rect x={bx.toFixed(1)} y={by.toFixed(1)} width={actualBarW.toFixed(1)} height={bh.toFixed(1)} rx="3" fill={wk.volume>0?'#D4A574':'#222'}/>
                <text x={cx.toFixed(1)} y={H-8} textAnchor="middle" fill="#4A4744" fontSize="8" fontFamily="-apple-system,sans-serif">{wk.label}</text>
              </g>
            );
          })}
        </svg>
      );
    }

              {exs.map((ex,i) => {
                const sets = ex.sets ? Object.keys(ex.sets).sort().map(k => ex.sets[k]) : [];
                return (
                  <div key={i} style={{marginBottom:i<exs.length-1?12:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#D4A574',marginBottom:3}}>{ex.name}</div>
                    {sets.map((s,j) => (
                      <div key={j} style={{fontSize:12,color:'#8A8680',paddingLeft:8,
                        fontVariantNumeric:'tabular-nums',lineHeight:1.8}}>
                        Set {j+1}: {s.weight} lbs × {s.reps} reps
                      </div>
                    ))}
                  </div>
                );
              })}
              {workout.notes && (
                <p style={{fontSize:12,color:'#8A8680',fontStyle:'italic',marginTop:10,
                  paddingTop:10,borderTop:'1px solid #262626',lineHeight:1.5}}>{workout.notes}</p>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Seeding screen
    // ─────────────────────────────────────────────────────────────────────────

    function SeedingScreen() {
      return (
        <div style={{height:'100dvh',background:'#0f0f0f',display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:16}}>
          <svg className="spin" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="#D4A574" strokeWidth="2" strokeLinecap="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>

          <p style={{color:'#8A8680',fontSize:13}}>Setting up your exercise library...</p>
        </div>
      );

    // ─────────────────────────────────────────────────────────────────────────
    // RestTimer — circular SVG countdown shown inline during active workout
    // ─────────────────────────────────────────────────────────────────────────

    function RestTimer({ timeLeft, isResting, done, progress, defaultDur, onStart, onStop, onDismiss }) {
      // Auto-dismiss after "Rest done!" finishes
      useEffect(() => {
        if (done) { const t = setTimeout(onDismiss, 2200); return () => clearTimeout(t); }
      }, [done]);

      const SZ=58, R=24;
      const circ = +(2*Math.PI*R).toFixed(2);
      const offset = (circ*(1-Math.max(0,Math.min(1,progress)))).toFixed(2);
      const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
      const PRESETS = [{l:'60s',v:60},{l:'90s',v:90},{l:'2m',v:120},{l:'3m',v:180}];

      return (
        <div className="fade-in" style={{background:'#161616',border:'1px solid #222',
          borderRadius:14,padding:'12px 14px',marginBottom:10,
          display:'flex',alignItems:'center',gap:14}}>

          {/* Circular ring */}
          <div style={{position:'relative',width:SZ,height:SZ,flexShrink:0}}>
            <svg width={SZ} height={SZ} viewBox={`0 0 ${SZ} ${SZ}`}
              style={{transform:'rotate(-90deg)',display:'block'}}>
              <circle cx={SZ/2} cy={SZ/2} r={R} fill="none" stroke="#262626" strokeWidth="3"/>
              <circle cx={SZ/2} cy={SZ/2} r={R} fill="none"
                stroke={done?'#7A9E7E':'#D4A574'} strokeWidth="3.5"
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
                style={{transition: isResting ? 'stroke-dashoffset 0.95s linear' : 'none'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
              justifyContent:'center',textAlign:'center'}}>
              {done
                ? <span style={{fontSize:9,fontWeight:700,color:'#7A9E7E',lineHeight:1.35}}>Rest<br/>done!</span>
                : <span className="tabular" style={{fontSize:12,fontWeight:700,
                    color:isResting?'#F0EDE8':'#4A4744'}}>
                    {fmt(isResting ? timeLeft : defaultDur)}
                  </span>
              }
            </div>
          </div>

          {/* Presets + action */}
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:5,marginBottom:8}}>
              {PRESETS.map(p => (
                <button key={p.v} onClick={() => onStart(p.v)} className="press-scale" style={{
                  padding:'4px 9px',borderRadius:20,border:'none',cursor:'pointer',
                  fontSize:11,fontWeight:600,background:'#242424',color:'#8A8680',
                  transition:'all 0.15s',
                }}
                onMouseEnter={e=>{e.currentTarget.style.background='rgba(212,165,116,0.15)';e.currentTarget.style.color='#D4A574';}}
                onMouseLeave={e=>{e.currentTarget.style.background='#242424';e.currentTarget.style.color='#8A8680';}}>
                  {p.l}
                </button>
              ))}
            </div>
            {isResting ? (
              <button onClick={onStop} style={{padding:'6px 14px',borderRadius:8,
                border:'1px solid #2e2e2e',background:'transparent',
                color:'#8A8680',fontSize:12,fontWeight:600,cursor:'pointer'}}>Stop</button>
            ) : !done && (
              <button onClick={() => onStart()} style={{padding:'6px 14px',borderRadius:8,
                border:'none',background:'rgba(212,165,116,0.15)',
                color:'#D4A574',fontSize:12,fontWeight:600,cursor:'pointer'}}>Start</button>
            )}
          </div>

          {/* Dismiss */}
          <button onClick={onDismiss} style={{background:'none',border:'none',cursor:'pointer',
            color:'#3a3a3a',padding:6,alignSelf:'flex-start',display:'flex',alignItems:'center',
            transition:'color 0.15s'}}
            onMouseEnter={e=>e.currentTarget.style.color='#8A8680'}
            onMouseLeave={e=>e.currentTarget.style.color='#3a3a3a'}>
            <IconX size={13} color="currentColor"/>
          </button>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Split picker — Step 1
    // ─────────────────────────────────────────────────────────────────────────

    function SplitPickerStep1({ onSelect, onCancel }) {
      const FREE = { id:'free', label:'Free Workout', muscles:[] };
      return (
        <div className="fade-in" style={{padding:'20px 20px 32px'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:700,color:'#F0EDE8',lineHeight:1.2}}>What are you training?</h2>
              <p style={{fontSize:13,color:'#8A8680',marginTop:4}}>Pick a split for exercise suggestions.</p>
            </div>
            <button onClick={onCancel} style={{background:'none',border:'none',color:'#8A8680',fontSize:14,cursor:'pointer',paddingTop:2}}>Cancel</button>

            {SPLITS.map(split => (

                style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
                  padding:'15px 18px',display:'flex',alignItems:'center',gap:16,
                  cursor:'pointer',textAlign:'left',width:'100%'}}>
                <SplitIcon id={split.id} size={26} color="#D4A574"/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:600,color:'#F0EDE8'}}>{split.label}</div>
                  <div style={{fontSize:12,color:'#8A8680',marginTop:3}}>{split.defaults.slice(0,3).join(' · ')}</div>
                </div>
                <IconChevronRight size={16} color="#4A4744"/>
              </button>
            ))}
            <button onClick={()=>{navigator.vibrate&&navigator.vibrate(10);onSelect(FREE);}}
              className="press-scale"
              style={{background:'transparent',border:'1.5px dashed #2e2e2e',borderRadius:14,
                padding:'15px 18px',display:'flex',alignItems:'center',gap:16,
                cursor:'pointer',textAlign:'left',width:'100%',marginTop:4}}>
              <SplitIcon id="free" size={26} color="#8A8680"/>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:600,color:'#F0EDE8'}}>Free Workout</div>
                <div style={{fontSize:12,color:'#8A8680',marginTop:3}}>Log anything — no suggestions</div>
              </div>
              <IconChevronRight size={16} color="#4A4744"/>
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Split picker — Step 2
    // ─────────────────────────────────────────────────────────────────────────

    function SplitPickerStep2({ split, exercises, onToggle, onBack, onCancel, onStart }) {
      const n = exercises.filter(e=>e.selected).length;
      return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',height:'100%'}}>
          <div style={{padding:'16px 20px 14px',borderBottom:'1px solid #1e1e1e',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex',alignItems:'center'}}>
                <IconChevronLeft size={20} color="#8A8680"/>
              </button>
              <div style={{flex:1}}>
                <h2 style={{fontSize:17,fontWeight:700,color:'#F0EDE8'}}>{split.label}</h2>
                <p style={{fontSize:12,color:'#8A8680',marginTop:2}}>Tap to add or remove exercises.</p>
              </div>
              <button onClick={onCancel} style={{background:'none',border:'none',color:'#8A8680',fontSize:13,cursor:'pointer'}}>Cancel</button>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'12px 20px'}}>
            {exercises.map((ex,i) => (
              <button key={ex.name} onClick={()=>onToggle(i)} className="press-scale"
                style={{display:'flex',alignItems:'center',gap:14,width:'100%',
                  padding:'12px 14px',marginBottom:6,
                  background:ex.selected?'rgba(212,165,116,0.07)':'#1a1a1a',
                  border:`1px solid ${ex.selected?'#D4A574':'#262626'}`,
                  borderRadius:11,cursor:'pointer',textAlign:'left',
                  opacity:ex.selected?1:0.55,transition:'all 0.15s'}}>
                <div style={{width:20,height:20,borderRadius:6,flexShrink:0,
                  background:ex.selected?'#D4A574':'transparent',
                  border:`1.5px solid ${ex.selected?'#D4A574':'#3a3a3a'}`,
                  display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>
                  {ex.selected&&<IconCheck size={11} color="#0f0f0f"/>}
                </div>
                <span style={{fontSize:14,fontWeight:500,color:'#F0EDE8'}}>{ex.name}</span>
              </button>
            ))}
            <div style={{height:90}}/>
          </div>
          <div style={{position:'absolute',bottom:0,left:0,right:0,
            padding:'12px 20px',background:'#0f0f0f',borderTop:'1px solid #1e1e1e',
            paddingBottom:'calc(12px + env(safe-area-inset-bottom, 0px))'}}>
            <button onClick={()=>{navigator.vibrate&&navigator.vibrate(20);onStart();}}
              disabled={n===0} className="press-scale"
              style={{width:'100%',padding:'14px 20px',borderRadius:12,border:'none',
                background:n>0?'#D4A574':'#2a2a2a',color:n>0?'#0f0f0f':'#4A4744',
                fontSize:15,fontWeight:700,cursor:n>0?'pointer':'default',
                transition:'background 0.2s,color 0.2s'}}>

    // ─────────────────────────────────────────────────────────────────────────
    // Active workout logger
    // ─────────────────────────────────────────────────────────────────────────

    function SetRow({ setNum, set, onChange, onRemove, autoFocusWeight }) {
      const weightRef = useRef(null);
      useEffect(() => {
        if (autoFocusWeight && weightRef.current) { weightRef.current.focus(); weightRef.current.select(); }
      }, [autoFocusWeight]);
      const inputBase = {
        background:'#242424',border:'1px solid #2e2e2e',borderRadius:8,
        color:'#F0EDE8',fontSize:16,fontWeight:600,outline:'none',
        textAlign:'center',minHeight:44,padding:'0 4px',
        fontVariantNumeric:'tabular-nums',transition:'border-color 0.15s',
      };
      return (
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
          <span style={{color:'#4A4744',fontSize:12,fontWeight:500,width:22,textAlign:'right',flexShrink:0}}>{setNum}</span>
          <input ref={weightRef} type="number" inputMode="decimal" step="2.5" min="0"
            value={set.weight} placeholder="0" onChange={e=>onChange('weight',e.target.value)}
            onFocus={e=>{e.target.select();e.target.style.borderColor='#D4A574';}}
            onBlur={e=>e.target.style.borderColor='#2e2e2e'}
            style={{...inputBase,width:72}}/>
          <span style={{color:'#4A4744',fontSize:14,fontWeight:500,flexShrink:0}}>×</span>
          <input type="number" inputMode="numeric" min="0"
            value={set.reps} placeholder="0" onChange={e=>onChange('reps',e.target.value)}
            onFocus={e=>{e.target.select();e.target.style.borderColor='#D4A574';}}
            onBlur={e=>e.target.style.borderColor='#2e2e2e'}
            style={{...inputBase,width:58}}/>
          <span style={{color:'#4A4744',fontSize:11,flexShrink:0}}>reps</span>
          <button onClick={onRemove}
            style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',
              color:'#3a3a3a',padding:8,display:'flex',alignItems:'center',flexShrink:0,
              borderRadius:6,transition:'color 0.15s'}}
            onMouseEnter={e=>e.currentTarget.style.color='#C47070'}
            onMouseLeave={e=>e.currentTarget.style.color='#3a3a3a'}>
            <IconX size={14} color="currentColor"/>
          </button>
        </div>
      );
    }

    function OverloadHint({ exerciseName, lastSessionMap, onApply }) {
      if (!exerciseName.trim()) return null;
      const last = lastSessionMap[exerciseName];
      if (!last) {
        return (
          <p style={{fontSize:12,color:'#4A4744',fontStyle:'italic',marginBottom:10,paddingLeft:2}}>
            First time logging this one
          </p>
        );
      }
      const sugg = getOverloadSuggestion(last);
      return (
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,
          padding:'7px 10px',background:'rgba(122,158,126,0.07)',
          border:'1px solid rgba(122,158,126,0.18)',borderRadius:9}}>
          <div style={{flex:1,minWidth:0,fontSize:11,lineHeight:1.45}}>
            <span style={{color:'#8A8680'}}>Last: </span>
            <span className="tabular" style={{color:'#8A8680',fontWeight:500}}>
              {last.weight} × {last.reps}
            </span>
            {sugg.type !== 'match'
              ? <span style={{color:'#7A9E7E',fontWeight:500}}> — {sugg.hint}</span>
              : <span style={{color:'#4A4744',fontStyle:'italic'}}> — {sugg.hint}</span>
            }
          </div>
          {sugg.type !== 'match' && (
            <button onClick={onApply} style={{
              padding:'4px 10px',borderRadius:7,border:'none',cursor:'pointer',flexShrink:0,
              background:'rgba(122,158,126,0.18)',color:'#7A9E7E',fontSize:11,fontWeight:600,
              transition:'all 0.15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(122,158,126,0.32)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(122,158,126,0.18)'}>
              Use this
            </button>
          )}
        </div>
      );
    }

    function ExerciseBlock({ exercise, onUpdate, onRemove, onSetComplete, exerciseNames, lastWeightMap, lastSessionMap }) {
      const [newSetId, setNewSetId] = useState(null);
      const exVolume = useMemo(() =>
        exercise.sets.reduce((sum,s)=>sum+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),
        [exercise.sets]);

      const handleSetChange = (setId, field, val) => {
        const updated = exercise.sets.map(s => s.id===setId ? {...s,[field]:val} : s);
        // Auto-trigger rest timer when reps field is filled (typically last)
        if (field==='reps') {
          const s = updated.find(x=>x.id===setId);
          if (parseInt(val)>0 && parseFloat(s.weight)>0) onSetComplete && onSetComplete(exercise.id);
        }
        onUpdate({...exercise, sets:updated});
      };

      const handleAddSet = () => {
        const last = exercise.sets[exercise.sets.length-1];
        const w = last ? last.weight : (lastWeightMap[exercise.name] ? String(lastWeightMap[exercise.name]) : '');
        const id = `set_${uid()}`; setNewSetId(id);
        onUpdate({...exercise, sets:[...exercise.sets,{id,weight:w,reps:''}]});
      };
      return (
        <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,padding:'14px 14px 12px',marginBottom:12}}>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <ExerciseInput value={exercise.name}
                onChange={name=>onUpdate({...exercise,name})}
                exerciseNames={exerciseNames} placeholder="Exercise name..."/>
            </div>
            <button onClick={onRemove}
              style={{background:'#242424',border:'1px solid #2e2e2e',borderRadius:9,
                color:'#8A8680',cursor:'pointer',padding:'0 10px',display:'flex',
                alignItems:'center',flexShrink:0,transition:'color 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.color='#C47070'}
              onMouseLeave={e=>e.currentTarget.style.color='#8A8680'}>
              <IconX size={14} color="currentColor"/>
            </button>
          </div>
          {lastSessionMap && (
            <OverloadHint
              exerciseName={exercise.name}
              lastSessionMap={lastSessionMap}
              onApply={() => {
                const sugg = getOverloadSuggestion(lastSessionMap[exercise.name]);
                if (!sugg) return;
                onUpdate({...exercise, sets: exercise.sets.map((s,i) =>
                  i===0 ? {...s, weight:String(sugg.suggestedWeight), reps:String(sugg.suggestedReps)} : s
                )});
              }}
            />
          )}
          {exercise.sets.map((set,i)=>(
            <SetRow key={set.id} setNum={i+1} set={set}
              onChange={(f,v)=>handleSetChange(set.id,f,v)}
              onRemove={()=>{ if(exercise.sets.length>1) onUpdate({...exercise,sets:exercise.sets.filter(s=>s.id!==set.id)}); }}
              autoFocusWeight={set.id===newSetId}
            />
          ))}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6}}>
            <button onClick={handleAddSet} className="press-scale"
              style={{display:'flex',alignItems:'center',gap:6,background:'#242424',
                border:'1px solid #2e2e2e',borderRadius:8,padding:'7px 12px',
                color:'#8A8680',fontSize:13,fontWeight:500,cursor:'pointer',
                transition:'color 0.15s,border-color 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.color='#D4A574';e.currentTarget.style.borderColor='#D4A574';}}
              onMouseLeave={e=>{e.currentTarget.style.color='#8A8680';e.currentTarget.style.borderColor='#2e2e2e';}}>
              <IconPlus size={12} color="currentColor"/>Add Set
            </button>
            {exVolume>0&&<span style={{fontSize:12,color:'#4A4744',fontVariantNumeric:'tabular-nums'}}>{exVolume.toLocaleString()} lbs</span>}
          </div>
        </div>
      );
    }

    function ActiveWorkoutLogger({ activeWorkout, lastWeightMap, lastSessionMap, exerciseNames, onCancel, onFinish }) {
      const [exercises, setExercises]       = useState(activeWorkout.exercises);
      const [notes, setNotes]               = useState('');
      const [saving, setSaving]             = useState(false);
      const [timerVisible, setTimerVisible] = useState(false);
      const [timerAnchorId, setTimerAnchorId] = useState(null);
      const elapsed = useElapsedMinutes(activeWorkout.startTime);
      const { timeLeft, isResting, done, progress, defaultDur, startTimer, stopTimer } = useRestTimer();

      const totalVolume = useMemo(() =>
        exercises.reduce((sum,ex)=>sum+ex.sets.reduce((s2,s)=>s2+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0),
        [exercises]);

      const handleSetComplete = (exId) => {
        setTimerAnchorId(exId);
        setTimerVisible(true);
        startTimer(); // default 90s
      };

      const handleFinish = async () => {
        const ok = exercises.some(ex=>ex.name.trim()&&ex.sets.some(s=>(parseFloat(s.weight)||0)>0&&(parseInt(s.reps)||0)>0));
        if (!ok) { alert('Add at least one exercise with a set logged before finishing.'); return; }
        setSaving(true);
        try { await onFinish(exercises, notes); } finally { setSaving(false); }
      };

      return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',height:'100%'}}>
          <div style={{padding:'14px 20px 12px',borderBottom:'1px solid #1e1e1e',flexShrink:0,
            display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <h2 style={{fontSize:17,fontWeight:700,color:'#F0EDE8'}}>Logging Workout</h2>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div className="pulse" style={{width:7,height:7,borderRadius:'50%',background:'#7A9E7E',flexShrink:0}}/>
              <span className="tabular" style={{fontSize:13,color:'#7A9E7E',fontWeight:600}}>{elapsed}m</span>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'16px 16px 0'}}>
            {exercises.map(ex=>(
              <React.Fragment key={ex.id}>
                <ExerciseBlock exercise={ex}
                  onUpdate={upd=>setExercises(p=>p.map(e=>e.id===upd.id?upd:e))}
                  onRemove={()=>setExercises(p=>p.length>1?p.filter(e=>e.id!==ex.id):p)}
                  onSetComplete={handleSetComplete}
                  exerciseNames={exerciseNames} lastWeightMap={lastWeightMap}
                  lastSessionMap={lastSessionMap}/>
                {timerVisible && timerAnchorId===ex.id && (
                  <RestTimer
                    timeLeft={timeLeft} isResting={isResting} done={done}
                    progress={progress} defaultDur={defaultDur}
                    onStart={startTimer} onStop={stopTimer}
                    onDismiss={() => { stopTimer(); setTimerVisible(false); }}
                  />
                )}
              </React.Fragment>
            ))}
            <button onClick={()=>setExercises(p=>[...p,{id:`ex_${uid()}`,name:'',sets:[{id:`set_${uid()}`,weight:'',reps:''}]}])}
              className="press-scale"
              style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                width:'100%',padding:'13px 20px',marginBottom:16,
                background:'transparent',border:'1.5px dashed #2e2e2e',borderRadius:12,
                color:'#8A8680',fontSize:14,fontWeight:500,cursor:'pointer',
                transition:'color 0.15s,border-color 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.color='#D4A574';e.currentTarget.style.borderColor='#D4A574';}}
              onMouseLeave={e=>{e.currentTarget.style.color='#8A8680';e.currentTarget.style.borderColor='#2e2e2e';}}>
              <IconPlus size={14} color="currentColor"/>Add Exercise
            </button>
            <div style={{marginBottom:16}}>
              <textarea value={notes} onChange={e=>setNotes(e.target.value.slice(0,500))}
                placeholder="Notes (optional)..." maxLength={500} rows={2}
                style={{width:'100%',background:'#1a1a1a',border:'1px solid #262626',
                  borderRadius:12,padding:'12px 14px',color:'#F0EDE8',fontSize:14,
                  resize:'none',outline:'none',fontFamily:'inherit',lineHeight:1.5,transition:'border-color 0.15s'}}
                onFocus={e=>e.target.style.borderColor='#3a3a3a'}

          : [];

          gymDays:   thisWeek.length,

        { label:'Gym Days',     value: gymDays,                    sub:'this week' },
        { label:'Volume',       value: weeklyVol.toLocaleString(), sub:'lbs this week' },

        <div style={{display:'flex',gap:8,padding:'16px 20px 0',overflowX:'auto',

    // TodayTab — state machine
    // ─────────────────────────────────────────────────────────────────────────

    function TodayTab({ exerciseNames, workoutsData, activeWorkout, lastWeightMap, lastSessionMap,
                        onStartWorkout, onCancelWorkout, onFinishWorkout,
                        todayWorkout, newPRs, onDismissPRs }) {
      const [step, setStep]           = useState('home');
      const [selSplit, setSelSplit]    = useState(null);
      const [pickerEx, setPickerEx]   = useState([]);
      const freq = useMemo(() => buildExerciseFrequency(workoutsData), [workoutsData]);

      if (activeWorkout) {
        return <ActiveWorkoutLogger activeWorkout={activeWorkout} lastWeightMap={lastWeightMap}
          lastSessionMap={lastSessionMap} exerciseNames={exerciseNames}
          onCancel={onCancelWorkout} onFinish={onFinishWorkout}/>;
      }

      const handleSelectSplit = (split) => {
        setSelSplit(split);
        if (split.id === 'free') { onStartWorkout([], split); }
        else { setPickerEx(getSuggestions(split, freq)); setStep('pick_exercises'); }
      };
      const resetPicker = () => { setStep('home'); setSelSplit(null); setPickerEx([]); };

      if (step === 'pick_split') {
        return <SplitPickerStep1 onSelect={handleSelectSplit} onCancel={resetPicker}/>;
      }
      if (step === 'pick_exercises' && selSplit) {
        return (
          <SplitPickerStep2
            split={selSplit} exercises={pickerEx}
            onToggle={i=>setPickerEx(p=>p.map((e,j)=>j===i?{...e,selected:!e.selected}:e))}
            onBack={()=>setStep('pick_split')}
            onCancel={resetPicker}
            onStart={()=>onStartWorkout(pickerEx.filter(e=>e.selected),selSplit)}
          />
        );
      }

      return (
        <div className="fade-in">
          <WeeklyStatsRow workoutsData={workoutsData}/>
          {todayWorkout
            ? <TodaySummary workoutKey={todayKey()} workout={todayWorkout}
                newPRs={newPRs} onDismissPRs={onDismissPRs}
                onLogAnother={()=>setStep('pick_split')}/>
            : <TodayHome onOpenPicker={()=>setStep('pick_split')}/>
          }
        </div>
      );

    // ─────────────────────────────────────────────────────────────────────────
    // BodyWeightChart — SVG trend line for body weight
    // ─────────────────────────────────────────────────────────────────────────

    function BodyWeightChart({ entries }) {
      // entries: [{weight, date, ...}] sorted ascending, length >= 2
      const W=320, H=130, PL=46, PR=16, PT=20, PB=24;
      const plotW=W-PL-PR, plotH=H-PT-PB;
      const timestamps = entries.map(e => new Date(e.date+'T12:00:00').getTime());
      const yVals = entries.map(e => e.weight);
      const tMin=Math.min(...timestamps), tMax=Math.max(...timestamps);
      const yMin=Math.min(...yVals), yMax=Math.max(...yVals);
      const tRange=tMax-tMin||1;
      const yPad = Math.max(1, (yMax-yMin)*0.2) || 5;
      const yLow=yMin-yPad, yHigh=yMax+yPad, yRange=yHigh-yLow;
      const toX = t => PL + ((t-tMin)/tRange)*plotW;
      const toY = v => PT + ((yHigh-v)/yRange)*plotH;
      const pts = entries.map((e,i) => ({ x:toX(timestamps[i]), y:toY(e.weight), ...e }));
      const linePath = pts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const areaPath = linePath
        + ` L${pts[pts.length-1].x.toFixed(1)},${(PT+plotH).toFixed(1)}`
        + ` L${PL},${(PT+plotH).toFixed(1)} Z`;
      const yGridVals = [0.33,0.66].map(f => (yLow+f*yRange).toFixed(1)*1);
      const last = pts[pts.length-1];
      const labelRight = last.x > W*0.7;
      const dateShort = key => new Date(key+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          {yGridVals.map((v,i) => {
            const gy = toY(v);
            return (
              <g key={i}>
                <line x1={PL} y1={gy.toFixed(1)} x2={W-PR} y2={gy.toFixed(1)} stroke="#262626" strokeWidth="1"/>
                <text x={PL-6} y={(gy+3.5).toFixed(1)} textAnchor="end" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{Math.round(v)}</text>
              </g>
            );
          })}
          <path d={areaPath} fill="rgba(212,165,116,0.06)"/>
          <path d={linePath} fill="none" stroke="#D4A574" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {pts.map((p,i) => <circle key={i} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r="3" fill="#D4A574"/>)}
          {/* Latest weight label */}
          <text x={(last.x + (labelRight?-6:6)).toFixed(1)} y={(last.y-8).toFixed(1)}
            textAnchor={labelRight?'end':'start'} fill="#D4A574" fontSize="10" fontWeight="600"
            fontFamily="-apple-system,sans-serif">{last.weight} lbs</text>
          {/* X-axis: first and last date */}
          <text x={PL} y={H-4} textAnchor="start" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{dateShort(pts[0].date)}</text>
          <text x={W-PR} y={H-4} textAnchor="end" fill="#4A4744" fontSize="9" fontFamily="-apple-system,sans-serif">{dateShort(last.date)}</text>
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // BodyWeightTracker — log form, stats, chart, recent entries
    // ─────────────────────────────────────────────────────────────────────────

    function BodyWeightTracker() {
      const [bwData, bwLoading] = useFirebase('drea/bodyWeights');
      const [inputVal, setInputVal] = useState('');
      const [unit, setUnit]         = useState('lbs');
      const [saving, setSaving]     = useState(false);
      const [saved, setSaved]       = useState(false);
      const savedTimer              = useRef(null);

      // Sorted newest first
      const entries = useMemo(() => {
        if (!bwData) return [];
        return Object.entries(bwData)
          .map(([key, v]) => ({ key, ...v }))
          .sort((a,b) => b.timestamp - a.timestamp);
      }, [bwData]);

      const entriesAsc = useMemo(() => [...entries].reverse(), [entries]);

      // Stats
      const current = entries[0]?.weight ?? null;
      const sevenAgo = Date.now() - 7*24*60*60*1000;
      const avg7 = useMemo(() => {
        const r = entries.filter(e => e.timestamp >= sevenAgo);
        return r.length ? r.reduce((s,e) => s+e.weight, 0) / r.length : null;
      }, [entries]);
      const totalChange = entries.length >= 2
        ? +(entries[0].weight - entries[entries.length-1].weight).toFixed(1)
        : null;

      const handleLog = async () => {
        const raw = parseFloat(inputVal);
        if (isNaN(raw) || !inputVal.trim()) return;
        const minRaw = unit==='kg'?22:50, maxRaw = unit==='kg'?227:500;
        if (raw < minRaw || raw > maxRaw) {
          alert(`Please enter a weight between ${minRaw} and ${maxRaw} ${unit}.`);
          return;
        }
        const weightLbs = unit==='kg' ? Math.round(raw*2.20462*10)/10 : raw;
        setSaving(true);
        try {
          const now = Date.now();
          await fbPush('drea/bodyWeights', { weight: weightLbs, unit:'lbs', date:todayKey(), timestamp:now });
          setInputVal('');
          navigator.vibrate && navigator.vibrate(20);
          setSaved(true);
          clearTimeout(savedTimer.current);
          savedTimer.current = setTimeout(() => setSaved(false), 2200);
        } finally { setSaving(false); }
      };

      const inputStyle = {
        flex:1, background:'#242424', border:'1px solid #2e2e2e', borderRadius:10,
        padding:'11px 14px', color:'#F0EDE8', fontSize:16, fontWeight:600, outline:'none',
        fontVariantNumeric:'tabular-nums', transition:'border-color 0.15s',
      };

      return (
        <div>
          {/* Log form */}
          <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
            padding:'14px 16px',marginBottom:14}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type="number" inputMode="decimal" value={inputVal}
                onChange={e => setInputVal(e.target.value)} placeholder="0.0"
                style={inputStyle}
                onFocus={e => e.target.style.borderColor='#D4A574'}
                onBlur={e => e.target.style.borderColor='#2e2e2e'}
                onKeyDown={e => { if (e.key==='Enter') handleLog(); }}
              />
              {/* Unit toggle */}
              <div style={{display:'flex',background:'#242424',border:'1px solid #2e2e2e',
                borderRadius:9,overflow:'hidden',flexShrink:0}}>
                {['lbs','kg'].map(u => (
                  <button key={u} onClick={() => setUnit(u)} style={{
                    padding:'11px 13px',border:'none',cursor:'pointer',
                    fontSize:13,fontWeight:600,transition:'all 0.15s',
                    background: unit===u ? '#D4A574' : 'transparent',
                    color: unit===u ? '#0f0f0f' : '#8A8680',
                  }}>{u}</button>
                ))}
              </div>
              <button onClick={handleLog} disabled={saving || !inputVal.trim()} className="press-scale"
                style={{
                  padding:'11px 18px',borderRadius:10,border:'none',flexShrink:0,
                  cursor: inputVal.trim() && !saving ? 'pointer' : 'default',
                  background: saved ? '#7A9E7E' : inputVal.trim() && !saving ? '#D4A574' : '#2a2a2a',
                  color: inputVal.trim() && !saving || saved ? '#0f0f0f' : '#4A4744',
                  fontSize:14,fontWeight:700,transition:'background 0.2s, color 0.2s',
                }}>
                {saved ? 'Logged!' : saving ? '...' : 'Log'}
              </button>
            </div>
          </div>

          {/* Stats row */}
          {entries.length > 0 && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
              {[
                { label:'Current', value: current !== null ? current.toFixed(1) : '—', unit:'lbs', color:'#D4A574' },
                { label:'7-Day Avg', value: avg7 !== null ? avg7.toFixed(1) : '—', unit: avg7!==null?'lbs':'', color:'#D4A574' },
                { label:'Total Change',
                  value: totalChange !== null ? (totalChange > 0 ? `+${totalChange}` : String(totalChange)) : '—',
                  unit: totalChange !== null ? 'lbs' : '',
                  color: totalChange === null ? '#D4A574' : totalChange > 0 ? '#C08B8B' : '#7A9E7E',
                },
              ].map(stat => (
                <div key={stat.label} style={{background:'#1a1a1a',border:'1px solid #262626',
                  borderRadius:12,padding:'12px 10px',textAlign:'center'}}>
                  <div className="tabular" style={{fontSize:17,fontWeight:700,
                    color:stat.color,lineHeight:1,marginBottom:2}}>{stat.value}</div>
                  {stat.unit && <div style={{fontSize:10,color:'#4A4744',marginBottom:4}}>{stat.unit}</div>}
                  <div style={{fontSize:11,color:'#8A8680',marginTop: stat.unit?0:6}}>{stat.label}</div>
                </div>
              ))}
            </div>
          )}

          {/* Trend chart */}
          {entriesAsc.length >= 2 && (
            <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
              padding:'14px 12px 10px',marginBottom:14}}>
              <BodyWeightChart entries={entriesAsc}/>
            </div>
          )}

          {/* Recent entries */}
          {entries.length > 0 && (
            <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,
              overflow:'hidden',marginBottom:4}}>
              <div style={{padding:'10px 16px',borderBottom:'1px solid #262626'}}>
                <span style={{fontSize:11,color:'#4A4744',fontWeight:600,
                  letterSpacing:'0.06em',textTransform:'uppercase'}}>Recent entries</span>
              </div>
              {entries.slice(0,10).map((e,i) => (
                <div key={e.key} style={{display:'flex',alignItems:'center',padding:'10px 16px',
                  borderTop: i ? '1px solid #1e1e1e' : undefined}}>
                  <span className="tabular" style={{fontSize:15,fontWeight:600,color:'#F0EDE8',flex:1}}>
                    {e.weight.toFixed(1)}&thinsp;<span style={{fontSize:12,color:'#8A8680',fontWeight:400}}>lbs</span>
                  </span>
                  <span style={{fontSize:13,color:'#8A8680',marginRight:12}}>
                    {new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}

                  <button onClick={() => fbRemove(`drea/bodyWeights/${e.key}`)}

                      padding:'4px 6px',borderRadius:6,display:'flex',alignItems:'center',

    // ─────────────────────────────────────────────────────────────────────────
    // ExerciseManager — add / search / delete exercises in drea/exerciseNames
    // ─────────────────────────────────────────────────────────────────────────

    function ExerciseManager({ exerciseNamesData }) {
      const [mode, setMode]         = useState('single');
      const [singleInput, setSingleInput] = useState('');
      const [bulkInput, setBulkInput]     = useState('');
      const [search, setSearch]           = useState('');
      const [toast, setToast]             = useState(null);
      const toastTimer                    = useRef(null);

      const allEntries = useMemo(() => {
        if (!exerciseNamesData) return [];
        return Object.entries(exerciseNamesData)
          .map(([key, name]) => ({ key, name }))
          .sort((a,b) => a.name.localeCompare(b.name));
      }, [exerciseNamesData]);

      const allNamesLower = useMemo(() => new Set(allEntries.map(e => e.name.toLowerCase())), [allEntries]);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return q ? allEntries.filter(e => e.name.toLowerCase().includes(q)) : allEntries;
      }, [allEntries, search]);

      const showToast = (msg, type='success') => {
        setToast({ msg, type });
        clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToast(null), 2600);
      };

      const handleSingleAdd = async () => {
        const name = singleInput.trim();
        if (!name) return;
        if (allNamesLower.has(name.toLowerCase())) {
          showToast(`"${name}" already exists`, 'warn'); return;
        }
        await fbPush('drea/exerciseNames', name);
        setSingleInput('');
        showToast(`Added "${name}"`);
        navigator.vibrate && navigator.vibrate(15);
      };

      const handleBulkAdd = async () => {
        const lines = bulkInput.split('\n').map(l => l.trim()).filter(Boolean);
        if (!lines.length) return;
        const toAdd = lines.filter(n => !allNamesLower.has(n.toLowerCase()));
        const dupeCount = lines.length - toAdd.length;
        if (!toAdd.length) {
          showToast(`All ${dupeCount} already exist`, 'warn'); return;
        }
        const upd = {};
        toAdd.forEach(name => { upd[db.ref('drea/exerciseNames').push().key] = name; });
        await db.ref('drea/exerciseNames').update(upd);
        setBulkInput('');
        showToast(`Added ${toAdd.length}${dupeCount ? ` · ${dupeCount} already existed` : ''}`);
        navigator.vibrate && navigator.vibrate(15);
      };

      const inputBase = {
        width:'100%', background:'#242424', border:'1px solid #2e2e2e', borderRadius:10,
        padding:'11px 14px', color:'#F0EDE8', fontSize:14, outline:'none',
        fontFamily:'inherit', transition:'border-color 0.15s',
      };
      const addBtnBase = (active) => ({
        padding:'11px 18px', borderRadius:10, border:'none', flexShrink:0,
        background: active ? '#D4A574' : '#2a2a2a',
        color: active ? '#0f0f0f' : '#4A4744',
        fontSize:14, fontWeight:700, cursor: active ? 'pointer' : 'default',
        transition:'all 0.2s',
      });

      return (
        <div>
          {/* Section header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <h3 style={{fontSize:12,fontWeight:600,color:'#8A8680',
              letterSpacing:'0.07em',textTransform:'uppercase'}}>
              Exercises {exerciseNamesData ? `(${allEntries.length})` : ''}
            </h3>
            {/* Mode toggle */}
            <div style={{display:'flex',background:'#1e1e1e',border:'1px solid #2a2a2a',
              borderRadius:9,overflow:'hidden'}}>
              {['single','bulk'].map(m => (
                <button key={m} onClick={() => setMode(m)} style={{
                  padding:'6px 14px', border:'none', cursor:'pointer',
                  fontSize:12, fontWeight:600, transition:'all 0.15s',
                  background: mode===m ? 'rgba(212,165,116,0.2)' : 'transparent',
                  color: mode===m ? '#D4A574' : '#4A4744',
                }}>{m==='single'?'Single':'Bulk'}</button>
              ))}
            </div>
          </div>

          {/* Toast */}
          {toast && (
            <div className="fade-in" style={{
              padding:'10px 14px', borderRadius:10, marginBottom:12, fontSize:13,
              background: toast.type==='warn' ? 'rgba(196,112,112,0.15)' : 'rgba(122,158,126,0.15)',
              border: `1px solid ${toast.type==='warn' ? 'rgba(196,112,112,0.35)' : 'rgba(122,158,126,0.35)'}`,
              color: toast.type==='warn' ? '#C47070' : '#7A9E7E',
            }}>{toast.msg}</div>
          )}

          {/* Add form */}
          {mode === 'single' ? (
            <div style={{display:'flex',gap:8,marginBottom:14}}>
              <input type="text" value={singleInput}
                onChange={e => setSingleInput(e.target.value)}
                placeholder="Exercise name..."
                autoCapitalize="words" autoCorrect="off" spellCheck="false"
                onKeyDown={e => { if (e.key==='Enter') handleSingleAdd(); }}
                style={inputBase}
                onFocus={e => e.target.style.borderColor='#D4A574'}
                onBlur={e => e.target.style.borderColor='#2e2e2e'}
              />
              <button onClick={handleSingleAdd} disabled={!singleInput.trim()} className="press-scale"
                style={addBtnBase(!!singleInput.trim())}>Add</button>
            </div>
          ) : (
            <div style={{marginBottom:14}}>
              <textarea value={bulkInput} onChange={e => setBulkInput(e.target.value)}
                placeholder={"Paste exercise names,\none per line..."}
                rows={4}
                style={{...inputBase, resize:'none', lineHeight:1.6, marginBottom:8}}
                onFocus={e => e.target.style.borderColor='#D4A574'}
                onBlur={e => e.target.style.borderColor='#2e2e2e'}
              />
              <button onClick={handleBulkAdd} disabled={!bulkInput.trim()} className="press-scale"
                style={{...addBtnBase(!!bulkInput.trim()), width:'100%', padding:'12px 0'}}>
                Add All
              </button>
            </div>
          )}

          {/* Search */}
          <div style={{marginBottom:10}}>
            <input type="text" value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search exercises..." autoCapitalize="off" autoCorrect="off"
              style={{...inputBase}}
              onFocus={e => e.target.style.borderColor='#3a3a3a'}
              onBlur={e => e.target.style.borderColor='#2e2e2e'}
            />
          </div>

          {/* Exercise list */}
          {filtered.length === 0 ? (
            <div style={{textAlign:'center',padding:'24px 0',color:'#4A4744',fontSize:13}}>
              {search ? `No matches for "${search}"` : 'No exercises yet.'}
            </div>
          ) : (
            <div style={{background:'#1a1a1a',border:'1px solid #262626',borderRadius:14,overflow:'hidden'}}>
              {filtered.map(({key, name}, i) => (
                <div key={key} style={{display:'flex',alignItems:'center',
                  padding:'11px 14px', borderTop: i ? '1px solid #1e1e1e' : undefined}}>
                  <span style={{flex:1,fontSize:13,color:'#F0EDE8',fontWeight:400}}>{name}</span>
                  <button onClick={() => fbRemove(`drea/exerciseNames/${key}`)}
                    style={{background:'none',border:'none',cursor:'pointer',
                      color:'#3a3a3a',padding:'4px 6px',borderRadius:6,
                      display:'flex',alignItems:'center',transition:'color 0.15s'}}
                    onMouseEnter={ev => ev.currentTarget.style.color='#C47070'}
                    onMouseLeave={ev => ev.currentTarget.style.color='#3a3a3a'}>
                    <IconX size={13} color="currentColor"/>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // You tab — body weight + personal records
    // ─────────────────────────────────────────────────────────────────────────

      const sectionHead = {

      };
      return (
        <div className="fade-in" style={{padding:'20px 20px 8px'}}>
          <h2 style={{fontSize:22,fontWeight:700,color:'#F0EDE8',marginBottom:24}}>You</h2>

          {/* Body Weight */}
          <div style={{marginBottom:32}}>
            <h3 style={{...sectionHead, marginBottom:14}}>Body Weight</h3>

          </div>

          {/* Personal Records */}

              {prCount > 0 && (
                <span style={{fontSize:12,color:'#4A4744'}}>{prCount} {prCount===1?'record':'records'}</span>
